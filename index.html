<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Evaluación - CGB</title>
    <!-- Tailwind CSS para diseño rápido y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos de FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Fuente Inter de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#1e40af', 
                        secondary: '#3b82f6',
                        accent: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .toast-enter { animation: toastSlideIn 0.3s forwards; }
        .toast-exit { animation: toastSlideOut 0.3s forwards; }
        @keyframes toastSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes toastSlideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            100% { opacity: 1; transform: scale(1) rotate(-12deg); }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        
        /* Animaciones para la cortinilla */
        @keyframes scaleUp {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }
            50% { filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.8)); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <!-- Encabezado de la Aplicación -->
    <header id="main-header" class="bg-primary text-white shadow-md z-10 hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-graduation-cap text-2xl text-accent"></i>
                <div class="flex items-baseline">
                    <h1 class="font-bold text-xl tracking-tight">CGB Evalúa</h1>
                    <span class="text-[10px] bg-blue-800 text-blue-200 px-1.5 py-0.5 rounded ml-2 font-mono uppercase tracking-wide">v1.0</span>
                </div>
            </div>
            <div id="user-info" class="hidden flex items-center gap-4">
                <span id="header-role" class="text-sm bg-blue-800 px-3 py-1 rounded-full font-medium"></span>
                <span id="header-email" class="text-sm hidden sm:block"></span>
                <button onclick="app.logout()" class="text-sm hover:text-red-300 transition-colors flex items-center gap-1">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </div>
    </header>

    <!-- Contenedor Principal Dinámico -->
    <main id="app-container" class="flex-grow overflow-y-auto relative">
    </main>

    <!-- Contenedor de Notificaciones (Toasts) -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <script>
        // =====================================================================
        // --- CONFIGURACIÓN DE GOOGLE SHEETS ---
        // =====================================================================
        const GOOGLE_SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbzURUJkqQoSBEH_mFxYIRvY8g2skF26v3dw0IG6VW0FBGQdSzvDMbgaq18S3Fip1tSR/exec'; 

        // --- DATOS GLOBALES ---
        let appTeachers = []; 
        let appEmails = [];   
        
        // --- PLAN B (MOCK DATA / DATOS DE RESPALDO) ---
        const FALLBACK_TEACHERS = [
            { id: 1, name: "Ana Martínez", gender: "F", levels: ['primaria_baja', 'primaria_alta'] },
            { id: 2, name: "Carlos López", gender: "M", levels: ['primaria_alta'] },
            { id: 3, name: "María Fernández", gender: "F", levels: ['secundaria', 'bachillerato'] },
            { id: 4, name: "Roberto Gómez", gender: "M", levels: ['secundaria'] },
            { id: 5, name: "Elena Rojas", gender: "F", levels: ['bachillerato'] },
            { id: 6, name: "Laura Sánchez", gender: "F", levels: ['personal_cgb'] }
        ];

        const SUBJECT_OPTIONS_BAJA = [
            { label: 'Español', emoji: '📖' },
            { label: 'Inglés', emoji: '🗣️' },
            { label: 'Cultura Física', emoji: '⚽' },
            { label: 'Música', emoji: '🎵' },
            { label: 'Arte', emoji: '🎨' }
        ];

        const SUBJECT_OPTIONS_ALTA = [
            { label: 'Español', emoji: '📖' },
            { label: 'Inglés', emoji: '🗣️' },
            { label: 'Cultura Física', emoji: '⚽' },
            { label: 'Música', emoji: '🎵' },
            { label: 'Escultura', emoji: '🗿' },
            { label: 'Baile', emoji: '🩰' },
            { label: 'Teatro', emoji: '🎭' }
        ];

        // Preguntas configuradas para cada perfil
        const MOCK_QUESTIONS = {
            primaria_baja: [
                { id: 1, type: 'faces', text: "1. Sí le entiendo a su clase y cuando me cuesta trabajo, me explica." },
                { id: 2, type: 'faces', text: "2. La tarea que me deja se me hace fácil porque ya lo vi en clase." },
                { id: 3, type: 'faces', text: "3. Sí me alcanza el tiempo para hacer la tarea." },
                { id: 4, type: 'faces', text: "4. Califica los trabajos y tareas." },
                { id: 5, type: 'faces', text: "5. Siempre está conmigo en el salón y me acompaña a mis actividades." },
                { id: 6, type: 'faces', text: "6. Hacemos muchas cosas diferentes en la clase y me gustan." },
                { id: 7, type: 'faces', text: "7. Me trata siempre con respeto." },
                { id: 8, type: 'faces', text: "8. Me dice lo que tengo que estudiar más para mejorar y cómo voy en clase." },
                { id: 9, type: 'faces', text: "9. Me invita a vivir los valores de honestidad, respeto, amistad, justicia y compromiso." },
                { id: 10, type: 'subjects', text: "10. La clase que más me gusta es:", isGeneral: true, options: SUBJECT_OPTIONS_BAJA },
                { id: 11, type: 'subjects', text: "11. La clase que no me gusta mucho es:", isGeneral: true, options: SUBJECT_OPTIONS_BAJA },
                { id: 12, type: 'textarea', text: "12. Escribe algo que le quieras decir a uno de tus maestros o maestras.", isGeneral: true }
            ],
            primaria_alta: [
                { id: 1, type: 'faces', text: "1. Sí le entiendo a su clase y cuando me cuesta trabajo, me explica." },
                { id: 2, type: 'faces', text: "2. La tarea que me deja se me hace fácil porque ya lo vi en clase." },
                { id: 3, type: 'faces', text: "3. Sí me alcanza el tiempo para hacer la tarea." },
                { id: 4, type: 'faces', text: "4. Califica los trabajos y tareas." },
                { id: 5, type: 'faces', text: "5. Siempre está conmigo en el salón y me acompaña a mis actividades." },
                { id: 6, type: 'faces', text: "6. Hacemos muchas cosas diferentes en la clase y me gustan." },
                { id: 7, type: 'faces', text: "7. Me trata siempre con respeto." },
                { id: 8, type: 'faces', text: "8. Me dice lo que tengo que estudiar más para mejorar y cómo voy en clase." },
                { id: 9, type: 'faces', text: "9. Me invita a vivir los valores de honestidad, respeto, amistad, justicia y compromiso." },
                { id: 10, type: 'subjects', text: "10. La clase que más me gusta es:", isGeneral: true, options: SUBJECT_OPTIONS_ALTA },
                { id: 11, type: 'subjects', text: "11. La clase que no me gusta mucho es:", isGeneral: true, options: SUBJECT_OPTIONS_ALTA },
                { id: 12, type: 'textarea', text: "12. Escribe algo que le quieras decir a uno de tus maestros o maestras.", isGeneral: true }
            ],
            secundaria: [
                { id: 1, type: 'numbers', text: "1. El docente domina los temas de la asignatura." },
                { id: 2, type: 'numbers', text: "2. Fomenta la participación activa y el pensamiento crítico." },
                { id: 3, type: 'numbers', text: "3. Utiliza herramientas y recursos didácticos variados." },
                { id: 4, type: 'numbers', text: "4. La evaluación es justa y acorde a lo enseñado." },
                { id: 5, type: 'numbers', text: "5. El trato es respetuoso y fomenta un buen ambiente." },
                { id: 6, type: 'textarea', text: "6. Comentarios adicionales o sugerencias de mejora:" }
            ],
            bachillerato: [
                { id: 1, type: 'numbers', text: "1. Demuestra un alto nivel de dominio en su disciplina." },
                { id: 2, type: 'numbers', text: "2. Promueve el análisis, la investigación y el debate en clase." },
                { id: 3, type: 'numbers', text: "3. Proporciona retroalimentación útil y oportuna en los trabajos." },
                { id: 4, type: 'numbers', text: "4. Las metodologías empleadas son adecuadas para el nivel educativo." },
                { id: 5, type: 'numbers', text: "5. Muestra disposición para asesorías y resolución de dudas." },
                { id: 6, type: 'textarea', text: "6. Comentarios o sugerencias para el docente:" }
            ],
            personal_cgb: [
                { id: 1, type: 'numbers', text: "1. ¿Muestra liderazgo y organización en sus actividades cotidianas?" },
                { id: 2, type: 'numbers', text: "2. ¿La comunicación con el equipo de trabajo es efectiva y constante?" },
                { id: 3, type: 'numbers', text: "3. ¿Cumple con los objetivos y tiempos establecidos en el plan de trabajo?" },
                { id: 4, type: 'numbers', text: "4. ¿Fomenta un clima laboral positivo, colaborativo y de apoyo mutuo?" },
                { id: 5, type: 'textarea', text: "5. Comentarios adicionales sobre el desempeño de este integrante del personal:" }
            ]
        };

        // Arreglo para almacenar temporalmente los envíos locales
        let MOCK_SUBMISSIONS = [];

        // --- ESTADO DE LA APLICACIÓN ---
        const app = {
            currentUser: null,
            currentView: 'splash', // Inicia en la cortinilla de presentación
            lastView: null,       // Rastrea la última pantalla para controlar el scroll de forma inteligente
            selectedTeacher: null,
            hasAnsweredGeneralQuestions: false, 
            hiddenTeachers: [],
            evaluatedTeachers: [],
            showCompletionCelebration: false,
            hasSeenCelebration: false,
            adminFilterLevel: 'todos',
            adminFilterTeacher: 'todos', 
            formResponses: {}, // Almacena respuestas temporales del formulario activo

            async init() {
                this.render(); // Mostramos la cortinilla de inmediato
                await this.fetchInitialData(); // Cargamos datos en segundo plano
            },

            async fetchInitialData() {
                if (!GOOGLE_SHEETS_API_URL) {
                    console.warn("Modo local (Sin URL de Sheets). Usando datos predeterminados.");
                    appTeachers = FALLBACK_TEACHERS;
                    appEmails = []; 
                    return;
                }
                try {
                    const response = await fetch(GOOGLE_SHEETS_API_URL + "?action=getInitialData");
                    const data = await response.json();
                    if (data && data.teachers) {
                        appTeachers = data.teachers;
                        appEmails = data.emails || [];
                    } else {
                        throw new Error("Formato de respuesta incorrecto de la API.");
                    }
                } catch (error) {
                    console.error("Error cargando de Google Sheets, usando Fallback:", error);
                    appTeachers = FALLBACK_TEACHERS;
                    appEmails = [];
                }
            },

            navigate(view) {
                this.currentView = view;
                this.render();
            },

            handleRoleChange() {
                const role = document.getElementById('login-role').value;
                const emailContainer = document.getElementById('email-container');
                if (['secundaria', 'bachillerato', 'personal_cgb', 'admin'].includes(role)) {
                    emailContainer.classList.remove('hidden');
                } else {
                    emailContainer.classList.add('hidden');
                }
            },

            processLogin() {
                const role = document.getElementById('login-role').value;
                const email = document.getElementById('login-email')?.value.trim() || "";

                if (!role) {
                    showToast("Por favor selecciona tu nivel o perfil", "error");
                    return;
                }

                if (['secundaria', 'bachillerato', 'personal_cgb', 'admin'].includes(role) && !email) {
                    showToast("El correo electrónico es requerido para este perfil", "error");
                    return;
                }

                // Simulación o validación de correo si fuera necesario
                this.currentUser = { role, email };
                
                showToast("¡Sesión iniciada con éxito!", "success");

                if (role === 'admin') {
                    this.navigate('admin');
                } else if (['primaria_baja', 'primaria_alta'].includes(role)) {
                    this.navigate('welcome'); // Bretax saluda a los pequeños
                } else {
                    this.navigate('portal'); // Entrada directa al portal para mayores
                }
            },

            logout() {
                this.currentUser = null;
                this.selectedTeacher = null;
                this.hasAnsweredGeneralQuestions = false; 
                this.hiddenTeachers = []; 
                this.evaluatedTeachers = []; 
                this.showCompletionCelebration = false;
                this.hasSeenCelebration = false;
                this.formResponses = {};
                this.lastView = null;
                this.navigate('splash');
                showToast('Sesión cerrada correctamente', 'info');
            },

            toggleTeacher(id) {
                if (this.hiddenTeachers.includes(id)) {
                    this.hiddenTeachers = this.hiddenTeachers.filter(tId => tId !== id);
                } else {
                    this.hiddenTeachers.push(id);
                }
                this.render();
            },

            startEvaluation(teacherId) {
                this.selectedTeacher = teacherId;
                this.formResponses = {}; // Limpiar respuestas previas
                this.navigate('form');
            },

            selectFaceOption(questionId, val) {
                this.formResponses[questionId] = val;
                // Renderizar únicamente para actualizar el estado visual de los botones de esa pregunta
                const faceButtons = document.querySelectorAll(`[data-question-face="${questionId}"]`);
                faceButtons.forEach(btn => {
                    const btnVal = btn.getAttribute('data-value');
                    if (btnVal === val) {
                        btn.classList.add('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.remove('border-gray-200', 'bg-white');
                    } else {
                        btn.classList.remove('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.add('border-gray-200', 'bg-white');
                    }
                });
            },

            selectNumberOption(questionId, val) {
                this.formResponses[questionId] = parseInt(val);
                const numButtons = document.querySelectorAll(`[data-question-num="${questionId}"]`);
                numButtons.forEach(btn => {
                    const btnVal = parseInt(btn.getAttribute('data-value'));
                    if (btnVal === parseInt(val)) {
                        btn.classList.add('bg-primary', 'text-white', 'scale-105');
                        btn.classList.remove('bg-gray-100', 'text-gray-700', 'hover:bg-gray-200');
                    } else {
                        btn.classList.remove('bg-primary', 'text-white', 'scale-105');
                        btn.classList.add('bg-gray-100', 'text-gray-700', 'hover:bg-gray-200');
                    }
                });
            },

            selectSubjectOption(questionId, val) {
                this.formResponses[questionId] = val;
                const subButtons = document.querySelectorAll(`[data-question-sub="${questionId}"]`);
                subButtons.forEach(btn => {
                    const btnVal = btn.getAttribute('data-value');
                    if (btnVal === val) {
                        btn.classList.add('border-primary', 'bg-blue-50', 'scale-105');
                        btn.classList.remove('border-gray-200', 'bg-white');
                    } else {
                        btn.classList.remove('border-primary', 'bg-blue-50', 'scale-105');
                        btn.classList.add('border-gray-200', 'bg-white');
                    }
                });
            },

            async submitEvaluation() {
                const teacher = appTeachers.find(t => t.id === this.selectedTeacher);
                const questions = MOCK_QUESTIONS[this.currentUser.role];

                // Filtramos las preguntas activas según si ya se contestaron las generales
                const activeQuestions = questions.filter(q => {
                    if (q.isGeneral && this.hasAnsweredGeneralQuestions) {
                        return false;
                    }
                    return true;
                });

                // Validación de respuestas
                for (let q of activeQuestions) {
                    // Si es de tipo textarea opcional en primaria u otros, permitimos saltar o guardamos vacío
                    if (q.type === 'textarea') {
                        const val = document.getElementById(`text-q-${q.id}`).value.trim();
                        this.formResponses[q.id] = val;
                        continue;
                    }
                    if (this.formResponses[q.id] === undefined) {
                        showToast(`Por favor responde la pregunta: "${q.text.substring(0, 30)}..."`, "error");
                        return;
                    }
                }

                // Generamos payload de envío
                const payload = {
                    studentEmail: this.currentUser.email || "Anónimo",
                    studentRole: this.currentUser.role,
                    teacherId: teacher.id,
                    teacherName: teacher.name,
                    responses: this.formResponses,
                    timestamp: new Date().toISOString()
                };

                // Guardado Local Fallback
                MOCK_SUBMISSIONS.push(payload);

                // Intento de envío a Google Sheets API si está configurado
                if (GOOGLE_SHEETS_API_URL) {
                    showToast("Enviando evaluación a la nube...", "info");
                    try {
                        const response = await fetch(GOOGLE_SHEETS_API_URL, {
                            method: 'POST',
                            mode: 'no-cors', // Evita problemas de CORS comunes con Apps Script redirection
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        showToast("¡Evaluación enviada con éxito!", "success");
                    } catch (err) {
                        console.error("Error al sincronizar con Sheets:", err);
                        showToast("Guardado localmente. Se sincronizará más tarde.", "info");
                    }
                } else {
                    showToast("¡Evaluación completada con éxito (Local)!", "success");
                }

                // Si contestó las preguntas generales por primera vez, marcamos como completado para futuras evaluaciones
                if (!this.hasAnsweredGeneralQuestions) {
                    this.hasAnsweredGeneralQuestions = true;
                }

                // Marcamos docente como evaluado
                this.evaluatedTeachers.push(teacher.id);

                // Comprobar si se han evaluado todos los maestros activos
                const activeTeachers = appTeachers.filter(t => t.levels.includes(this.currentUser.role) && !this.hiddenTeachers.includes(t.id));
                const allDone = activeTeachers.every(t => this.evaluatedTeachers.includes(t.id));

                if (allDone && activeTeachers.length > 0) {
                    this.showCompletionCelebration = true;
                }

                this.navigate('portal');
            },

            closeCelebration() {
                this.showCompletionCelebration = false;
                this.hasSeenCelebration = true;
                this.render();
            },

            // --- SECCIÓN DE ADMINISTRADOR ---
            adminSubmissions: [],
            async fetchAdminData() {
                if (GOOGLE_SHEETS_API_URL) {
                    try {
                        const response = await fetch(GOOGLE_SHEETS_API_URL + "?action=getSubmissions");
                        const data = await response.json();
                        if (data && data.submissions) {
                            this.adminSubmissions = data.submissions;
                        } else {
                            this.adminSubmissions = MOCK_SUBMISSIONS;
                        }
                    } catch (e) {
                        this.adminSubmissions = MOCK_SUBMISSIONS;
                    }
                } else {
                    this.adminSubmissions = MOCK_SUBMISSIONS;
                }
                this.renderAdminCharts();
            },

            renderAdminCharts() {
                const resultsContainer = document.getElementById('admin-results');
                if (!resultsContainer) return;

                let filtered = this.adminSubmissions;
                if (this.adminFilterLevel !== 'todos') {
                    filtered = filtered.filter(s => s.studentRole === this.adminFilterLevel);
                }
                if (this.adminFilterTeacher !== 'todos') {
                    filtered = filtered.filter(s => s.teacherId == this.adminFilterTeacher);
                }

                if (filtered.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="p-12 text-center bg-gray-50 rounded-xl border border-gray-100">
                            <i class="fas fa-chart-bar text-4xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium">No hay evaluaciones registradas con los filtros seleccionados.</p>
                        </div>
                    `;
                    return;
                }

                // Generar reporte simple consolidado
                let html = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                            <h3 class="font-bold text-lg text-gray-800">Registros Encontrados (${filtered.length})</h3>
                            <button onclick="app.downloadCSV()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold py-1.5 px-3 rounded flex items-center gap-1.5 transition-colors">
                                <i class="fas fa-file-excel"></i> Exportar CSV
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-50 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-gray-100">
                                        <th class="py-3 px-6">Evaluado</th>
                                        <th class="py-3 px-6">Evaluador / Nivel</th>
                                        <th class="py-3 px-6">Respuestas</th>
                                        <th class="py-3 px-6">Fecha</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100 text-sm text-gray-700">
                `;

                filtered.forEach(sub => {
                    const cleanRole = sub.studentRole.replace('_', ' ').toUpperCase();
                    const responsesStr = Object.entries(sub.responses || {})
                        .map(([qId, val]) => `Q${qId}: ${val}`)
                        .join(', ');

                    html += `
                        <tr class="hover:bg-slate-50/50">
                            <td class="py-3.5 px-6 font-medium text-slate-900">${sub.teacherName}</td>
                            <td class="py-3.5 px-6">
                                <span class="block font-medium">${sub.studentEmail}</span>
                                <span class="text-xs text-slate-400">${cleanRole}</span>
                            </td>
                            <td class="py-3.5 px-6 text-xs text-slate-500 max-w-xs truncate" title="${responsesStr}">${responsesStr}</td>
                            <td class="py-3.5 px-6 text-xs text-slate-400">${new Date(sub.timestamp).toLocaleDateString()}</td>
                        </tr>
                    `;
                });

                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;

                resultsContainer.innerHTML = html;
            },

            downloadCSV() {
                if (this.adminSubmissions.length === 0) return;
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "Fecha,Evaluador,Nivel,Docente,Respuestas\n";
                
                this.adminSubmissions.forEach(sub => {
                    const row = [
                        sub.timestamp,
                        sub.studentEmail,
                        sub.studentRole,
                        sub.teacherName,
                        JSON.stringify(sub.responses).replace(/"/g, '""')
                    ].join(",");
                    csvContent += row + "\n";
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `evaluaciones_cgb_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            },

            render() {
                const container = document.getElementById('app-container');
                const header = document.getElementById('main-header');
                const userInfo = document.getElementById('user-info');
                
                // GUARDAR POSICIÓN DE SCROLL PREVIA antes de limpiar y regenerar el HTML
                const previousScrollTop = container ? container.scrollTop : 0;
                const previousWindowY = window.scrollY;
                
                // Comprobamos si la pantalla ha cambiado realmente
                const viewChanged = this.currentView !== this.lastView;
                this.lastView = this.currentView;

                container.innerHTML = '';

                // Ocultar cabecera en vistas iniciales
                if (this.currentView === 'splash') {
                    header.classList.add('hidden');
                } else {
                    header.classList.remove('hidden');
                }

                switch(this.currentView) {
                    case 'splash': container.innerHTML = this.views.splash(); break;
                    case 'login': container.innerHTML = this.views.login(); break;
                    case 'welcome': container.innerHTML = this.views.welcome(); break;
                    case 'portal': container.innerHTML = this.views.portal(); break;
                    case 'form': container.innerHTML = this.views.form(); break;
                    case 'admin': container.innerHTML = this.views.admin(); this.fetchAdminData(); break;
                }

                // GESTIÓN INTELIGENTE DE SCROLL:
                // Si cambiamos de pantalla (ej. Portal -> Formulario), reseteamos scroll a 0.
                // Si seguimos en la misma pantalla (ej. cambiando un switch de maestro), restauramos el scroll previo.
                if (viewChanged) {
                    if (container) {
                        container.scrollTop = 0;
                    }
                    window.scrollTo(0, 0);
                } else {
                    if (container) {
                        container.scrollTop = previousScrollTop;
                    }
                    window.scrollTo(0, previousWindowY);
                }

                if (this.currentUser && this.currentView !== 'splash') {
                    userInfo.classList.remove('hidden');
                    const roleNames = {
                        'primaria_baja': 'Primaria Baja', 'primaria_alta': 'Primaria Alta',
                        'secundaria': 'Secundaria', 'bachillerato': 'Bachillerato',
                        'personal_cgb': 'Personal CGB', 'admin': 'Administrador'
                    };
                    document.getElementById('header-role').innerText = roleNames[this.currentUser.role] || this.currentUser.role;
                    document.getElementById('header-email').innerText = this.currentUser.email || '';
                } else {
                    userInfo.classList.add('hidden');
                }
            },

            views: {
                splash: () => `
                    <div class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-br from-[#0b132b] via-[#1e3a8a] to-[#0f172a] overflow-hidden">
                        <!-- Luces de fondo dinámicas -->
                        <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-30 pointer-events-none">
                            <div class="absolute -top-24 -left-24 w-[30rem] h-[30rem] bg-blue-500 rounded-full mix-blend-screen filter blur-[100px] animate-pulse"></div>
                            <div class="absolute top-1/2 -right-20 w-[25rem] h-[25rem] bg-orange-600 rounded-full mix-blend-screen filter blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
                        </div>

                        <div class="relative z-10 flex flex-col items-center px-4 w-full" style="animation: scaleUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
                            <!-- Escudo -->
                            <div class="w-64 sm:w-80 md:w-96 mb-8" style="animation: pulseGlow 3s infinite alternate;">
                                <img src="./guardianes.png" alt="Escudo Guardianes CGB" class="w-full h-auto object-contain drop-shadow-2xl" onerror="this.src='https://placehold.co/400x400/1e3a8a/ffffff?text=CGB+Guardianes'">
                            </div>
                            
                            <!-- Textos Institucionales -->

                                PORTAL DE EVALUACIÓN
                            </h1>

                                Colegio Gran Bretaña
                            </p>
                            
                            <!-- Botón de Ingreso -->
                            <button onclick="app.navigate('login')" class="group relative px-10 py-4 bg-transparent overflow-hidden rounded-full border border-white/50 text-white font-bold text-lg tracking-widest uppercase hover:border-white hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-all duration-300">
                                <div class="absolute inset-0 w-0 bg-white transition-all duration-[400ms] ease-out group-hover:w-full"></div>
                                <span class="relative group-hover:text-primary transition-colors duration-300 flex items-center gap-3">
                                    Ingresar <i class="fas fa-chevron-right transform group-hover:translate-x-2 transition-transform"></i>
                                </span>
                            </button>
                        </div>
                    </div>
                `,

                login: () => `
                    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden fade-in mt-16 md:mt-24 p-1">
                        <div class="bg-primary p-6 text-center text-white rounded-t-2xl">
                            <i class="fas fa-user-circle text-5xl mb-3"></i>
                            <h2 class="text-2xl font-bold">Selección de Nivel</h2>

                                <label class="block text-sm font-medium text-gray-700 mb-1">Nivel Educativo</label>

                                    <option value="" disabled selected>Selecciona un perfil...</option>
                                    <option value="primaria_baja">Primaria Baja (1º a 3º)</option>
                                    <option value="primaria_alta">Primaria Alta (4º a 6º)</option>
                                    <option value="secundaria">Secundaria</option>

                                    <option value="admin">Administrador (Resultados)</option>

                            </div>

                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-envelope text-gray-400"></i>
                                    </div>
                                    <input type="email" id="login-email" placeholder="tu.nombre@cgb.edu.mx" class="w-full pl-10 border-gray-300 rounded-lg shadow-sm focus:border-primary focus:ring-primary p-2.5 border outline-none">

                `,

                welcome: () => `
                    <div class="max-w-2xl mx-auto text-center fade-in py-8 flex flex-col items-center justify-center min-h-[80vh]">
                        <h2 class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary mb-6" style="animation: popIn 0.6s ease-out forwards;">
                            ¡Hola! Soy Bretax
                        </h2>
                        
                        <div class="w-64 h-64 sm:w-72 sm:h-72 mx-auto mb-8 relative z-10 animate-bounce" style="animation: float 3.5s ease-in-out infinite;">
                            <img src="./bretax_sonrie.png" alt="Bretax Sonríe" class="w-full h-full object-contain drop-shadow-2xl" onerror="this.src='https://placehold.co/250x250/e2e8f0/64748b?text=BRETAX'">

                            <p class="text-lg sm:text-xl text-gray-700 font-medium">

                portal: () => {
                    const role = app.currentUser.role;
                    const availableTeachers = appTeachers.filter(t => t.levels.includes(role));

                    let html = `
                        <div class="max-w-5xl mx-auto py-8 px-4 fade-in">

                            cardClasses += 'border-gray-200 bg-gray-50 opacity-75';
                        } else {
                            cardClasses += 'border-gray-100 hover:shadow-md hover:border-blue-200';
                        }
                        
                        html += `
                            <div class="${cardClasses}">
                                ${isEvaluated ? `
                                <div class="absolute inset-0 z-10 flex items-center justify-center bg-white/60 backdrop-blur-[1px] rounded-xl">
                                    <div class="transform -rotate-12 bg-green-500 text-white font-bold py-2 px-6 rounded-lg shadow-lg border-2 border-white text-xl">
                                        <i class="fas fa-check-circle mr-1"></i> ¡LISTO!
                                    </div>
                                </div>
                                ` : ''}

                                <div class="w-full flex justify-between items-center bg-gray-50 px-3 py-2 rounded-lg mb-4 border border-gray-100 relative z-0">
                                    <span class="text-xs font-medium ${isHidden ? 'text-gray-400' : 'text-gray-700'}">¿Me da clases?</span>
                                    <label class="flex items-center ${isEvaluated ? 'cursor-not-allowed opacity-50' : 'cursor-pointer'}">
                                        <div class="relative">
                                            <input type="checkbox" class="sr-only peer" ${!isHidden ? 'checked' : ''} ${isEvaluated ? 'disabled' : ''} onchange="app.toggleTeacher(${teacher.id})">
                                            <div class="block bg-gray-300 peer-checked:bg-green-500 w-9 h-5 rounded-full transition-colors"></div>
                                            <div class="absolute left-[2px] top-[2px] bg-white w-4 h-4 rounded-full transition-transform peer-checked:translate-x-4 shadow-sm"></div>
                                        </div>
                                    </label>
                                </div>

                                <div class="w-20 h-20 ${isHidden ? 'bg-gray-100' : 'bg-blue-50'} border ${isHidden ? 'border-gray-200' : 'border-blue-100'} rounded-full flex items-center justify-center text-5xl mb-3 transition-transform ${isHidden || isEvaluated ? '' : 'group-hover:scale-110 cursor-pointer'}" ${isHidden || isEvaluated ? '' : `onclick="app.startEvaluation(${teacher.id})"`}>
                                    <span class="${isHidden ? 'grayscale opacity-50' : ''}">${avatarEmoji}</span>
                                </div>
                                <h3 class="font-semibold text-lg ${isHidden ? 'text-gray-400 line-through' : 'text-gray-800'} relative z-0">${teacher.name}</h3>
                                
                                <div class="w-full mt-4 relative z-0">
                                ${isEvaluated ? 
                                    `<button disabled class="w-full bg-green-100 text-green-700 py-2 rounded-lg text-sm font-bold cursor-not-allowed border border-green-200">Completado</button>`
                                : isHidden ? 
                                    `<button disabled class="w-full bg-gray-200 text-gray-400 py-2 rounded-lg text-sm font-medium cursor-not-allowed">Omitido</button>` 
                                : 
                                    `<button onclick="app.startEvaluation(${teacher.id})" class="w-full bg-blue-50 text-primary hover:bg-primary hover:text-white py-2 rounded-lg text-sm font-medium transition-colors">Evaluar</button>`
                                }

                            </div>
                        `;

                        html += `
                            <div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/80 backdrop-blur-sm fade-in">
                                <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center relative mx-4">
                                    <h2 class="text-3xl font-extrabold text-green-600 mb-2">¡Misión Cumplida!</h2>

                                    </button>
                                </div>
                            </div>
                        `;
                    }

                },

                form: () => {
                    const teacher = appTeachers.find(t => t.id === app.selectedTeacher);
                    const questions = MOCK_QUESTIONS[app.currentUser.role];
                    
                    // CORRECCIÓN CLAVE: Filtrar preguntas de tipo isGeneral si ya han sido contestadas anteriormente
                    const filteredQuestions = questions.filter(q => {

                    });
                    
                    let html = `
                        <div class="max-w-3xl mx-auto py-8 px-4 fade-in">
                            <button onclick="app.navigate('portal')" class="text-gray-500 hover:text-primary mb-4 flex items-center gap-2 transition-colors font-medium">

                                    <span class="text-4xl">${teacher.gender === 'F' ? '👩‍🏫' : '👨‍🏫'}</span>

                        if (q.type === 'faces') {
                            html += `
                                <div class="flex justify-around items-center max-w-md mx-auto gap-4 mt-2">
                                    <button data-question-face="${q.id}" data-value="si" onclick="app.selectFaceOption(${q.id}, 'si')" class="flex flex-col items-center p-3 border border-gray-200 rounded-2xl bg-white hover:border-green-300 hover:bg-green-50 transition-all w-24">
                                        <span class="text-4xl mb-1">😊</span>
                                        <span class="text-xs font-bold text-green-700">SÍ</span>
                                    </button>
                                    <button data-question-face="${q.id}" data-value="a_veces" onclick="app.selectFaceOption(${q.id}, 'a_veces')" class="flex flex-col items-center p-3 border border-gray-200 rounded-2xl bg-white hover:border-yellow-300 hover:bg-yellow-50 transition-all w-24">
                                        <span class="text-4xl mb-1">😐</span>
                                        <span class="text-xs font-bold text-yellow-700">A veces</span>
                                    </button>
                                    <button data-question-face="${q.id}" data-value="no" onclick="app.selectFaceOption(${q.id}, 'no')" class="flex flex-col items-center p-3 border border-gray-200 rounded-2xl bg-white hover:border-red-300 hover:bg-red-50 transition-all w-24">
                                        <span class="text-4xl mb-1">🙁</span>
                                        <span class="text-xs font-bold text-red-700">NO</span>
                                    </button>
                                </div>
                            `;
                        } else if (q.type === 'numbers') {
                            html += `
                                <div class="flex flex-wrap gap-2 justify-between mt-2 max-w-lg">
                                    ${[1, 2, 3, 4, 5].map(num => `
                                        <button data-question-num="${q.id}" data-value="${num}" onclick="app.selectNumberOption(${q.id}, ${num})" class="w-12 h-12 rounded-full bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition-all flex items-center justify-center">
                                            ${num}
                                        </button>
                                    `).join('')}
                                </div>
                                <div class="flex justify-between text-xs text-gray-400 max-w-lg px-1 mt-1">
                                    <span>Totalmente en desacuerdo</span>
                                    <span>Totalmente de acuerdo</span>
                                </div>
                            `;
                        } else if (q.type === 'subjects') {
                            html += `
                                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-2">
                                    ${q.options.map(opt => `
                                        <button data-question-sub="${q.id}" data-value="${opt.label}" onclick="app.selectSubjectOption(${q.id}, '${opt.label}')" class="flex items-center gap-2 p-3 border border-gray-200 rounded-xl bg-white hover:bg-blue-50/50 hover:border-blue-300 transition-all">
                                            <span class="text-2xl">${opt.emoji}</span>
                                            <span class="text-sm font-medium text-gray-700">${opt.label}</span>
                                        </button>
                                    `).join('')}
                                </div>
                            `;
                        } else if (q.type === 'textarea') {
                            html += `
                                <textarea id="text-q-${q.id}" placeholder="Escribe aquí de forma libre y respetuosa..." rows="4" class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm"></textarea>
                            `;
                        }

                        html += `</div>`;
                    });

                    html += `
                                </div>
                                <div class="bg-gray-50 px-6 py-4 flex justify-end border-t border-gray-100">
                                    <button onclick="app.submitEvaluation()" class="bg-primary hover:bg-blue-800 text-white font-semibold px-6 py-2.5 rounded-xl shadow transition-colors flex items-center gap-2">

                            </div>

                `
            }
        };

        // --- SISTEMA DE TOASTS ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColors = {
                success: 'bg-emerald-600',
                error: 'bg-rose-600',
                info: 'bg-slate-800'
            };
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            toast.className = `${bgColors[type] || bgColors.info} text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 text-sm font-semibold toast-enter`;
            toast.innerHTML = `
                <i class="fas ${icons[type] || icons.info} text-base"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                toast.addEventListener('animationend', () => toast.remove());
            }, 3500);
        }

        // --- INICIALIZACIÓN AL CARGAR LA VENTANA ---
        window.onload = function () {
            app.init();
        };
    </script>
