    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .toast-enter { animation: toastSlideIn 0.3s forwards; }
        .toast-exit { animation: toastSlideOut 0.3s forwards; }
        @keyframes toastSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes toastSlideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            100% { opacity: 1; transform: scale(1) rotate(-12deg); }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        
        /* Animaciones para la cortinilla */
        @keyframes scaleUp {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }
            50% { filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.8)); }

        // --- ESTADO DE LA APLICACIÓN ---
        const app = {

            async init() {

            // Método de normalización avanzada para prevenir desajustes de mayúsculas, acentos y espacios en Sheets
            checkTeacherLevel(teacherLevels, userRole) {
                if (!teacherLevels || !userRole) return false;
                const normalizedUserRole = userRole.toLowerCase().trim().replace(/_/g, ' ');
                
                return teacherLevels.some(level => {
                    if (!level) return false;
                    const normalizedLevel = level.toLowerCase().trim().replace(/_/g, ' ');
                    
                    // Comparación exacta normalizada (ej: "primaria alta" === "primaria alta" o "secundaria" === "secundaria")
                    if (normalizedLevel === normalizedUserRole) return true;
                    
                    // Compatibilidad en caso de escribir un nivel general en lugar de específico
                    if (normalizedLevel === "primaria" && (normalizedUserRole === "primaria baja" || normalizedUserRole === "primaria alta")) {
                        return true;
                    }
                    return false;
                });
            },

            // Método auxiliar para generar iniciales elegantes en lugar de caricaturas
            getTeacherInitials(name) {
                if (!name) return "DOC";
                let cleanName = this.getTeacherCleanName(name);
                let clean = cleanName.replace(/^(Mr\.|Miss|Prof\.|Profe\.|Dr\.|Dra\.)\s+/i, '').trim();
                let parts = clean.split(/\s+/);
                let initials = "";
                if (parts[0]) initials += parts[0][0];
                if (parts[1]) initials += parts[1][0];
                return initials.toUpperCase() || "CGB";
            },

            // Extrae de forma limpia el nombre del docente sin la materia entre paréntesis
            getTeacherCleanName(fullName) {
                if (!fullName) return "";
                const match = fullName.match(/^([^(]+)\s*\(([^)]+)\)/);
                if (match) {
                    return match[1].trim();
                }
                return fullName.trim();
            },

            // Extrae la materia entre paréntesis o devuelve un valor por defecto
            getTeacherSubject(fullName) {
                if (!fullName) return "Docente";
                const match = fullName.match(/^([^(]+)\s*\(([^)]+)\)/);
                if (match) {
                    return match[2].trim();
                }
                return "Docente";
            },

            generateRealisticMockData() {
                const levels = ['primaria_baja', 'primaria_alta', 'secundaria', 'bachillerato', 'personal_cgb'];
                const groups = ['A', 'B', 'C'];
                const comments = [
                    "Excelente clase, me divierto mucho.",
                    "Explica muy bien cuando tengo dudas.",
                    "Deja tareas que a veces son un poco largas.",
                    "Muy paciente y dinámico en las dinámicas.",
                    "Me trata con mucho respeto siempre.",
                    "Las evaluaciones son justas."
                ];

                for (let i = 0; i < 60; i++) {
                    const studentRole = levels[Math.floor(Math.random() * levels.length)];
                    const teachersInLevel = FALLBACK_TEACHERS.filter(t => this.checkTeacherLevel(t.levels, studentRole));
                    if (teachersInLevel.length === 0) continue;

                    const teacher = teachersInLevel[Math.floor(Math.random() * teachersInLevel.length)];
                    const group = groups[Math.floor(Math.random() * groups.length)];
                    let grade = "1º";
                    
                    if (studentRole === 'primaria_baja') grade = ['1º', '2º', '3º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'primaria_alta') grade = ['4º', '5º', '6º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'secundaria' || studentRole === 'bachillerato') grade = ['1º', '2º', '3º'][Math.floor(Math.random() * 3)];

                    const responses = {};
                    const questions = MOCK_QUESTIONS[studentRole];
                    questions.forEach(q => {
                        if (q.type === 'faces' || q.type === 'sec_options') {
                            responses[q.id] = ['si', 'a_veces', 'no'][Math.floor(Math.random() * 3)];
                        } else if (q.type === 'numbers') {
                            responses[q.id] = Math.floor(Math.random() * 3) + 3; 
                        } else if (q.type === 'textarea') {
                            responses[q.id] = comments[Math.floor(Math.random() * comments.length)];
                        }
                    });

                    MOCK_SUBMISSIONS.push({
                        studentEmail: `alumno.${i+1}@cgb.edu.mx`,
                        studentRole: studentRole,
                        studentGrade: grade,
                        studentGroup: group,
                        teacherId: teacher.id,
                        teacherName: teacher.name,
                        responses: responses,
                        timestamp: new Date(Date.now() - Math.random() * 10 * 24 * 60 * 60 * 1000).toISOString()
                    });
                }
            },

            async fetchInitialData() {
                if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_ESTA_CADENA') || GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_CON_TU_NUEVA_URL')) {
                    appTeachers = FALLBACK_TEACHERS;
                    return;
                }
                try {
                    const response = await fetch(GOOGLE_SHEETS_API_URL + "?action=getInitialData");
                    const data = await response.json();
                    
                    if (data && data.status === "ERROR") {
                        throw new Error(data.message);
                    }

                    if (data && Array.isArray(data.teachers)) {
                        appTeachers = data.teachers;
                        appEmails = data.emails || [];
                        console.log("¡Éxito! Maestros cargados:", appTeachers.length, "| Correos cargados:", appEmails.length);
                    } else {
                        throw new Error("Estructura incorrecta");
                    }
                } catch (error) {
                    console.warn("Utilizando Fallback local para carga de docentes:", error);
                    appTeachers = FALLBACK_TEACHERS;
                    appEmails = [];
                    showToast("Cargado de respaldo local", "info");
                }

                // Cargar evaluaciones existentes para validar doble evaluación de todas las hojas
                try {
                    const subResponse = await fetch(GOOGLE_SHEETS_API_URL + "?action=getSubmissions");
                    const subData = await subResponse.json();
                    if (subData && Array.isArray(subData.submissions)) {
                        appSubmissions = subData.submissions;
                    }
                } catch (e) {
                    console.warn("No se pudieron cargar las evaluaciones previas de Sheets.");
                }
            },

            navigate(view) {

            handleRoleChange() {
                const role = document.getElementById('login-role').value;
                const emailContainer = document.getElementById('email-container');
                const gradeGroupContainer = document.getElementById('grade-group-container');
                const gradeSelect = document.getElementById('login-grade');

                    emailContainer.classList.remove('hidden');
                } else {
                    emailContainer.classList.add('hidden');
                }

                if (role && role !== 'admin' && role !== 'personal_cgb') {
                    gradeGroupContainer.classList.remove('hidden');
                    gradeSelect.innerHTML = '';
                    if (role === 'primaria_baja') {
                        gradeSelect.innerHTML = `<option value="1º">1º Primaria</option><option value="2º">2º Primaria</option><option value="3º">3º Primaria</option>`;

                        gradeSelect.innerHTML = `<option value="1º">1º Secundaria</option><option value="2º">2º Secundaria</option><option value="3º">3º Secundaria</option>`;
                    } else if (role === 'bachillerato') {
                        gradeSelect.innerHTML = `<option value="1º">1º Bachillerato</option><option value="2º">2º Bachillerato</option><option value="3º">3º Bachillerato</option>`;
                    }

                    gradeGroupContainer.classList.add('hidden');
                }
            },

            // Proceso de inicio de sesión con validación de correos autorizados y prevención de doble evaluación en tiempo real
            processLogin() {
                const role = document.getElementById('login-role').value;
                const email = document.getElementById('login-email')?.value.trim() || "";
                const grade = document.getElementById('login-grade')?.value || "N/A";
                const group = document.getElementById('login-group')?.value || "N/A";

                const existingErrBox = document.getElementById('email-error-msg');
                if (existingErrBox) existingErrBox.remove();

                if (!role) {
                    showToast("Por favor selecciona tu nivel o perfil", "error");
                    return;
                }

                // Perfiles que requieren verificación obligatoria de correo
                const requiresEmail = ['primaria_alta', 'secundaria', 'bachillerato', 'personal_cgb', 'admin'].includes(role);

                if (requiresEmail && !email) {
                    showToast("El correo electrónico es requerido para este perfil", "error");
                    return;
                }

                // Llave maestra para pruebas que siempre entra a excepción del perfil admin
                const isTestBypass = email.toLowerCase() === 'sir.artorio@gmail.com' && role !== 'admin';

                // VALIDACIÓN ACTIVA DE CORREOS Y PREVENCIÓN DE DOBLE EVALUACIÓN
                if (requiresEmail && !isTestBypass) {
                    const emailNormalized = email.toLowerCase();
                    
                    // 1. Verificación de Autorización en lista oficial (sólo si hay correos cargados)
                    if (appEmails.length > 0 && !appEmails.includes(emailNormalized)) {
                        showToast("Este correo no se encuentra autorizado para evaluar.", "error");
                        const errBox = document.createElement('div');
                        errBox.id = 'email-error-msg';
                        errBox.className = 'mt-2 text-xs font-semibold text-red-600 bg-red-50 p-2 rounded-lg border border-red-100 fade-in';
                        errBox.innerText = "Error: El correo electrónico ingresado no coincide con ningún estudiante registrado en la lista oficial CGB.";
                        document.getElementById('email-container').appendChild(errBox);
                        return;
                    }

                    // 2. Verificación de Doble Evaluación (sólo aplica para estudiantes y personal, no administradores)
                    if (role !== 'admin') {
                        const allSubs = GOOGLE_SHEETS_API_URL && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_ESTA_CADENA') && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_CON_TU_NUEVA')
                            ? appSubmissions 
                            : MOCK_SUBMISSIONS;

                        const alreadySubmitted = allSubs.some(sub => sub.studentEmail && sub.studentEmail.toLowerCase() === emailNormalized);
                        
                        if (alreadySubmitted) {
                            showToast("Este correo ya ha realizado su evaluación de este semestre.", "error");
                            const errBox = document.createElement('div');
                            errBox.id = 'email-error-msg';
                            errBox.className = 'mt-2 text-xs font-semibold text-red-600 bg-red-50 p-2 rounded-lg border border-red-100 fade-in';
                            errBox.innerText = "Error: El sistema detectó que este correo electrónico ya completó su cuestionario anteriormente. Solo se permite una evaluación por estudiante/personal.";
                            document.getElementById('email-container').appendChild(errBox);
                            return;
                        }
                    }
                }

                this.currentUser = { role, email, grade, group };
                showToast("¡Sesión iniciada correctamente!", "success");

                if (role === 'admin') {
                    this.navigate('admin');
                } else {
                    this.navigate('welcome'); 
                }
            },

            logout() {
                this.currentUser = null;
                this.selectedTeacher = null;
                this.selectedTeachersSec = [];
                this.currentSecTeacherIndex = 0;
                this.hiddenTeachers = []; 
                this.evaluatedTeachers = []; 
                this.showCompletionCelebration = false;
                this.hasSeenCelebration = false;
                this.formResponses = {};
                this.secAnswers = {};
                this.lastView = null;
                
                Object.values(this.activeCharts).forEach(chart => {
                    if (chart) chart.destroy();
                });
                this.activeCharts = {};

                this.navigate('splash');
                showToast('Sesión cerrada correctamente', 'info');
            },

            // Toggle para deshabilitar maestros que "No me dan clase"
            // El switch determina si el maestro es evaluado. No hay pasos intermedios.
            toggleTeacher(id) {
                if (this.hiddenTeachers.includes(id)) {
                    // Volver a habilitar maestro (volverá a estar activo)
                    this.hiddenTeachers = this.hiddenTeachers.filter(tId => tId !== id);
                } else {
                    // Deshabilitar maestro (se ocultará y omitirá)
                    this.hiddenTeachers.push(id);
                }
                
                // Actualizar dinámicamente la lista de maestros seleccionados para evaluar
                const role = this.currentUser.role;
                const availableTeachers = appTeachers.filter(t => this.checkTeacherLevel(t.levels, role));
                this.selectedTeachersSec = availableTeachers
                    .filter(t => !this.hiddenTeachers.includes(t.id))
                    .map(t => t.id);

                this.render();
            },

            startEvaluation(teacherId) {
                this.selectedTeacher = teacherId;
                this.formResponses = {}; 
                this.navigate('form');
            },

            selectFaceOption(questionId, val) {
                this.formResponses[questionId] = val;
                const faceButtons = document.querySelectorAll(`[data-question-face="${questionId}"]`);
                faceButtons.forEach(btn => {
                    const btnVal = btn.getAttribute('data-value');
                    if (btnVal === val) {
                        btn.classList.add('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.remove('border-gray-200', 'bg-white');
                    } else {
                        btn.classList.remove('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.add('border-gray-200', 'bg-white');
                    }
                });
            },

            selectNumberOption(questionId, val) {
                this.formResponses[questionId] = parseInt(val);
                const numButtons = document.querySelectorAll(`[data-question-num="${questionId}"]`);
                numButtons.forEach(btn => {
                    const btnVal = parseInt(btn.getAttribute('data-value'));
                    if (btnVal === parseInt(val)) {
                        btn.classList.add('bg-primary', 'text-white', 'scale-105');
                        btn.classList.remove('bg-gray-100', 'text-gray-700', 'hover:bg-gray-200');
                    } else {
                        btn.classList.remove('bg-primary', 'text-white', 'scale-105');
                        btn.classList.add('bg-gray-100', 'text-gray-700', 'hover:bg-gray-200');
                    }
                });
            },

            selectSubjectOption(questionId, val) {
                this.formResponses[questionId] = val;
                const subButtons = document.querySelectorAll(`[data-question-sub="${questionId}"]`);
                subButtons.forEach(btn => {
                    const btnVal = btn.getAttribute('data-value');
                    if (btnVal === val) {
                        btn.classList.add('border-primary', 'bg-blue-50', 'scale-105');
                        btn.classList.remove('border-gray-200', 'bg-white');
                    } else {
                        btn.classList.remove('border-primary', 'bg-blue-50', 'scale-105');
                        btn.classList.add('border-gray-200', 'bg-white');
                    }
                });
            },

            async submitEvaluation() {
                const teacher = appTeachers.find(t => t.id === this.selectedTeacher);
                const questions = MOCK_QUESTIONS[this.currentUser.role];

                const activeQuestions = questions.filter(q => {
                    if (q.isGeneral && this.hasAnsweredGeneralQuestions) return false;
                    return true;
                });

                for (let q of activeQuestions) {
                    if (q.type === 'textarea') {
                        const val = document.getElementById('text-q-' + q.id).value.trim();
                        this.formResponses[q.id] = val;
                        continue;
                    }
                    if (this.formResponses[q.id] === undefined) {
                        showToast(`Por favor responde la pregunta: "${q.text.substring(0, 30)}..."`, "error");
                        return;
                    }
                }

                // Cálculo automático del promedio pedagógico en tiempo real
                let scoreSum = 0;
                let scoreCount = 0;
                Object.entries(this.formResponses).forEach(([qId, value]) => {
                    const questionObj = questions.find(q => q.id == qId);
                    if (!questionObj) return;
                    const numVal = this.getNumericalValue(questionObj.type, value);
                    if (numVal !== null) {
                        scoreSum += numVal;
                        scoreCount++;
                    }
                });
                const promedioCalculado = scoreCount > 0 ? (scoreSum / scoreCount).toFixed(2) : "0.00";

                const payload = {
                    Fecha: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' }),
                    studentRole: this.currentUser.role,
                    studentEmail: this.currentUser.email || "Anónimo",
                    teacherId: teacher.id,
                    teacherName: teacher.name,
                    promedio: promedioCalculado,
                    responses: this.formResponses,
                    studentGrade: this.currentUser.grade || "N/A",
                    studentGroup: this.currentUser.group || "N/A"
                };

                MOCK_SUBMISSIONS.push(payload);

                if (GOOGLE_SHEETS_API_URL && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_ESTA_CADENA') && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_CON_TU_NUEVA')) {
                    showToast("Sincronizando evaluación con la nube...", "info");
                    try {
                        await fetch(GOOGLE_SHEETS_API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        showToast("¡Evaluación enviada con éxito!", "success");
                    } catch (err) {
                        console.error("Error al sincronizar con Sheets:", err);
                        showToast("Guardado localmente de forma segura.", "info");
                    }
                } else {
                    showToast("¡Evaluación completada con éxito!", "success");
                }

                if (!this.hasAnsweredGeneralQuestions) {
                    this.hasAnsweredGeneralQuestions = true;
                }

                this.evaluatedTeachers.push(teacher.id);

                const activeTeachers = appTeachers.filter(t => this.checkTeacherLevel(t.levels, this.currentUser.role) && !this.hiddenTeachers.includes(t.id));
                const allDone = activeTeachers.every(t => this.evaluatedTeachers.includes(t.id));

                if (allDone && activeTeachers.length > 0) {
                    this.showCompletionCelebration = true;
                }

                this.navigate('portal');
            },

            // Celebración final de Primaria con el dragón Bretax apuntando hacia arriba
            closeCelebration() {
                this.showCompletionCelebration = false;
                this.hasSeenCelebration = true;
                this.render();
            },

            // Inicio del flujo dinámico para Secundaria
            startSecFormFlow() {
                if (this.selectedTeachersSec.length < 1) {
                    showToast("Debes tener al menos 1 profesor activo para comenzar la evaluación", "error");
                    return;
                }
                this.currentSecTeacherIndex = 0;
                this.secAnswers = {};
                this.navigate('form');
            },

            selectSecOption(questionId, val) {
                const teacherId = this.selectedTeachersSec[this.currentSecTeacherIndex];
                if (!this.secAnswers[teacherId]) {
                    this.secAnswers[teacherId] = {};
                }
                this.secAnswers[teacherId][questionId] = val;

                const secButtons = document.querySelectorAll(`[data-question-sec="${questionId}"]`);
                secButtons.forEach(btn => {
                    const btnVal = btn.getAttribute('data-value');
                    if (btnVal === val) {
                        btn.classList.add('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.remove('border-gray-200', 'bg-white');
                    } else {
                        btn.classList.remove('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.add('border-gray-200', 'bg-white');
                    }
                });
            },

            // Avance dinámico con scroll automático hacia arriba (Pregunta 1)
            nextSecTeacher() {
                const teacherId = this.selectedTeachersSec[this.currentSecTeacherIndex];
                const questions = MOCK_QUESTIONS[this.currentUser.role];

                for (let q of questions) {
                    if (!this.secAnswers[teacherId] || this.secAnswers[teacherId][q.id] === undefined) {
                        showToast("Responde todas las preguntas de este profesor antes de avanzar", "error");
                        return;
                    }
                }

                if (this.currentSecTeacherIndex < this.selectedTeachersSec.length - 1) {
                    this.currentSecTeacherIndex++;
                    
                    // Reiniciamos inmediatamente el scroll del contenedor principal y de la ventana al cambiar de docente
                    const container = document.getElementById('app-container');
                    if (container) container.scrollTop = 0;
                    window.scrollTo(0, 0);

                    this.render();
                } else {
                    this.navigate('sec_final');
                }
            },

            selectDirOption(val) {
                const options = ["trabajo", "escucha", "resuelve", "dialogo"];
                if (val === "todas") {
                    options.forEach(opt => {
                        document.getElementById('dir-opt-' + opt).checked = true;
                    });
                    document.getElementById('dir-opt-ninguna').checked = false;
                } else if (val === "ninguna") {
                    options.forEach(opt => {
                        document.getElementById('dir-opt-' + opt).checked = false;
                    });
                    document.getElementById('dir-opt-todas').checked = false;
                } else {
                    document.getElementById('dir-opt-todas').checked = false;
                    document.getElementById('dir-opt-ninguna').checked = false;
                }
            },

            // Envía tantas filas dinámicas como maestros se hayan elegido para evaluar
            async submitSecundariaFinal() {
                const dirOptsSelected = [];
                if (document.getElementById('dir-opt-trabajo').checked) dirOptsSelected.push("Su trabajo es cercano y positivo para mí.");
                if (document.getElementById('dir-opt-escucha').checked) dirOptsSelected.push("Me escucha.");
                if (document.getElementById('dir-opt-resuelve').checked) dirOptsSelected.push("Busca resolver mis necesidades.");
                if (document.getElementById('dir-opt-dialogo').checked) dirOptsSelected.push("Se presta al diálogo.");
                if (document.getElementById('dir-opt-todas').checked) dirOptsSelected.push("Todas las anteriores");
                if (document.getElementById('dir-opt-ninguna').checked) dirOptsSelected.push("Ninguna de las anteriores");

                // Obtener valores seleccionados de los nuevos elementos Select interactivos
                const learnedSelect = document.getElementById('sec-aprendi-mas');
                const improveSelect = document.getElementById('sec-clases-mejorar');
                
                const aprendiMasTxt = learnedSelect ? learnedSelect.value : "N/A";
                const clasesMejorarTxt = improveSelect ? improveSelect.value : "N/A";
                
                const comentariosSugerenciasTxt = document.getElementById('sec-final-comentario').value.trim();

                if (dirOptsSelected.length === 0) {
                    showToast("Por favor responde la Sección 4 sobre la Dirección de Secundaria", "error");
                    return;
                }

                if (aprendiMasTxt === "" || clasesMejorarTxt === "") {
                    showToast("Por favor responde las preguntas 10 y 11 sobre tus asignaturas", "error");
                    return;
                }

                showToast("Enviando todas tus evaluaciones...", "info");

                // Bucle dinámico por cada maestro seleccionado
                for (let i = 0; i < this.selectedTeachersSec.length; i++) {
                    const teacherId = this.selectedTeachersSec[i];
                    const teacher = appTeachers.find(t => t.id === teacherId) || FALLBACK_TEACHERS.find(t => t.id === teacherId);
                    
                    let sum = 0;
                    const ans = this.secAnswers[teacherId];
                    Object.values(ans).forEach(val => {
                        if (val === 'si') sum += 5;
                        else if (val === 'a_veces') sum += 3;
                        else sum += 1;
                    });
                    const promedioCalculado = (sum / 9).toFixed(2);

                    const responsesObj = {
                        ...ans,
                        aprendiMas: aprendiMasTxt,
                        clasesMejorar: clasesMejorarTxt,
                        direccionDesempeno: dirOptsSelected,
                        comentarioLibre: comentariosSugerenciasTxt
                    };

                    const payload = {
                        studentRole: 'secundaria',
                        studentEmail: this.currentUser.email || "Anónimo",
                        teacherId: teacher.id,
                        teacherName: teacher.name,
                        promedio: promedioCalculado,
                        responses: responsesObj,
                        studentGrade: this.currentUser.grade || "N/A",
                        studentGroup: this.currentUser.group || "N/A"
                    };

                    MOCK_SUBMISSIONS.push(payload);

                    if (GOOGLE_SHEETS_API_URL && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_ESTA_CADENA') && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_CON_TU_NUEVA')) {
                        try {
                            await fetch(GOOGLE_SHEETS_API_URL, {
                                method: 'POST',
                                mode: 'no-cors',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                        } catch (err) {
                            console.error("Error al sincronizar con Google Sheets:", err);
                        }
                    }
                }

                showToast("¡Evaluaciones cargadas de manera exitosa!", "success");
                this.navigate('sec_thanks'); 
            },

            setAdminFilterLevel(level) {
                this.adminFilterLevel = level;
                this.adminFilterTeacher = 'todos'; 
                this.render(); 
                this.fetchAdminData();
            },

            setAdminFilterTeacher(teacherId) {
                this.adminFilterTeacher = teacherId;
                this.renderAdminCharts();
            },

            setAdminFilterGrade(grade) {
                this.adminFilterGrade = grade;
                this.renderAdminCharts();
            },

            setAdminFilterGroup(group) {
                this.adminFilterGroup = group;
                this.renderAdminCharts();
            },

            async fetchAdminData() {
                if (GOOGLE_SHEETS_API_URL && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_ESTA_CADENA') && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_CON_TU_NUEVA')) {
                    try {
                        const response = await fetch(GOOGLE_SHEETS_API_URL + "?action=getSubmissions");
                        const data = await response.json();
                        if (data && data.submissions) {
                            this.adminSubmissions = data.submissions;
                        } else {
                            this.adminSubmissions = MOCK_SUBMISSIONS;
                        }
                    } catch (e) {
                        this.adminSubmissions = MOCK_SUBMISSIONS;
                    }
                } else {
                    this.adminSubmissions = MOCK_SUBMISSIONS;
                }
                this.renderAdminCharts();
            },

            getNumericalValue(qType, value) {
                if (qType === 'faces' || qType === 'sec_options') {
                    if (value === 'si') return 5;
                    if (value === 'a_veces') return 3;
                    if (value === 'no') return 1;
                }
                if (qType === 'numbers') {
                    return parseInt(value) || 0;
                }
                return null;
            },

            renderAdminCharts() {
                const resultsContainer = document.getElementById('admin-results');
                if (!resultsContainer) return;

                let filtered = this.adminSubmissions;
                if (this.adminFilterLevel !== 'todos') {
                    filtered = filtered.filter(s => s.studentRole === this.adminFilterLevel);
                }
                if (this.adminFilterTeacher !== 'todos') {
                    filtered = filtered.filter(s => s.teacherId == this.adminFilterTeacher);
                }
                if (this.adminFilterGrade !== 'todos') {
                    filtered = filtered.filter(s => s.studentGrade === this.adminFilterGrade);
                }
                if (this.adminFilterGroup !== 'todos') {
                    filtered = filtered.filter(s => s.studentGroup === this.adminFilterGroup);
                }

                if (filtered.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="p-12 text-center bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                            <i class="fas fa-chart-line text-5xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium text-lg">No hay suficientes registros para el cruce de filtros seleccionado.</p>
                        </div>
                    `;
                    return;
                }

                let totalScore = 0;
                let validAnswersCount = 0;
                let teacherScores = {}; 
                let questionScores = {}; 
                let teacherVotesCount = {};

                filtered.forEach(sub => {
                    const studentRole = sub.studentRole;
                    const questions = MOCK_QUESTIONS[studentRole] || [];
                    let subSum = 0;
                    let subCount = 0;

                    let rResponses = sub.responses;
                    if (typeof rResponses === 'string') {
                        try {
                            rResponses = JSON.parse(rResponses);
                        } catch (e) {
                            rResponses = {};
                        }
                    }

                    Object.entries(rResponses || {}).forEach(([qId, value]) => {
                        const questionObj = questions.find(q => q.id == qId);
                        if (!questionObj) return;

                        const numVal = this.getNumericalValue(questionObj.type, value);
                        if (numVal !== null) {
                            totalScore += numVal;
                            validAnswersCount++;
                            subSum += numVal;
                            subCount++;

                            const qKey = `Pregunta ${qId}`;
                            if (!questionScores[qKey]) {
                                questionScores[qKey] = { sum: 0, count: 0, text: questionObj.text };
                            }
                            questionScores[qKey].sum += numVal;
                            questionScores[qKey].count++;
                        }
                    });

                    if (subCount > 0) {
                        const subAverage = subSum / subCount;
                        if (!teacherScores[sub.teacherName]) {
                            teacherScores[sub.teacherName] = { sum: 0, count: 0 };
                        }
                        teacherScores[sub.teacherName].sum += subAverage;
                        teacherScores[sub.teacherName].count++;
                    }

                    teacherVotesCount[sub.teacherName] = (teacherVotesCount[sub.teacherName] || 0) + 1;
                });

                const globalAverage = validAnswersCount > 0 ? (totalScore / validAnswersCount).toFixed(2) : "0.00";

                let topTeacher = "N/A";
                let topTeacherAvg = 0;
                Object.entries(teacherScores).forEach(([name, data]) => {
                    const avg = data.sum / data.count;
                    if (avg > topTeacherAvg) {
                        topTeacherAvg = avg;
                        topTeacher = name;
                    }
                });

                let mostEvaluatedTeacher = "N/A";
                let maxEvaluations = 0;
                Object.entries(teacherVotesCount).forEach(([name, count]) => {
                    if (count > maxEvaluations) {
                        maxEvaluations = count;
                        mostEvaluatedTeacher = name;
                    }
                });

                resultsContainer.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-5 rounded-2xl shadow-md">
                            <div class="flex justify-between items-center opacity-80 mb-2 text-xs font-bold uppercase tracking-wider">Promedio Global</div>
                            <div class="flex items-baseline gap-2">
                                <span class="text-4xl font-extrabold">${globalAverage}</span>
                                <span class="text-sm opacity-90">/ 5.0</span>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                            <div class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Evaluaciones Hechas</div>
                            <span class="text-4xl font-extrabold text-slate-900">${filtered.length}</span>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                            <div class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Máximo Desempeño</div>
                            <span class="text-lg font-bold text-emerald-600 block truncate">${topTeacher}</span>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                            <div class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Mayor Participación</div>
                            <span class="text-lg font-bold text-blue-600 block truncate">${mostEvaluatedTeacher}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h4 class="font-bold text-slate-800 text-base mb-4">Promedio de Desempeño por Docente</h4>
                            <div class="relative h-64 w-full">
                                <canvas id="chart-docentes"></canvas>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h4 class="font-bold text-slate-800 text-base mb-4">Análisis por Pregunta (Fortalezas)</h4>
                            <div class="relative h-[32rem] w-full">
                                <canvas id="chart-preguntas"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
                        <h4 class="font-bold text-slate-800 text-base mb-4 flex items-center gap-2">
                            <i class="fas fa-comment-dots text-primary"></i> Buzón de Sugerencias y Comentarios Libres
                        </h4>
                        <div class="max-h-60 overflow-y-auto space-y-3 pr-2">
                            ${this.renderAdminComments(filtered)}
                        </div>
                    </div>
                `;

                this.initChartDocentes(teacherScores);
                this.initChartPreguntas(questionScores);
            },

            renderAdminComments(filtered) {
                let commentsHTML = "";
                let hasComments = false;

                filtered.forEach(sub => {
                    let rResponses = sub.responses;
                    if (typeof rResponses === 'string') {
                        try {
                            rResponses = JSON.parse(rResponses);
                        } catch (e) {
                            rResponses = {};
                        }
                    }

                    Object.entries(rResponses || {}).forEach(([qId, val]) => {
                        // Capturar comentarios libres o de texto redactado en los cuestionarios
                        if (typeof val === 'string' && val.trim() !== "" && val.length > 5 && !['si', 'no', 'a_veces', 'Español', 'Inglés', 'Cultura Física', 'Música', 'Arte', 'Escultura', 'Baile', 'Teatro'].includes(val)) {
                            hasComments = true;
                            commentsHTML += `
                                <div class="bg-slate-50 p-3.5 rounded-xl border border-slate-100">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-xs font-bold text-primary">${sub.teacherName}</span>

            initChartDocentes(teacherScores) {
                const ctx = document.getElementById('chart-docentes')?.getContext('2d');
                if (!ctx) return;

                const labels = Object.keys(teacherScores);
                const data = labels.map(name => {
                    const d = teacherScores[name];
                    return (d.sum / d.count).toFixed(2);
                });

                if (this.activeCharts.docentes) this.activeCharts.docentes.destroy();

                this.activeCharts.docentes = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Calificación Promedio',
                            data: data,
                            backgroundColor: 'rgba(59, 130, 246, 0.75)',
                            borderColor: 'rgba(30, 64, 175, 1)',
                            borderWidth: 1.5,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                min: 1,
                                max: 5,
                                ticks: { stepSize: 1 }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            },

            initChartPreguntas(questionScores) {
                const ctx = document.getElementById('chart-preguntas')?.getContext('2d');
                if (!ctx) return;

                const currentLevel = this.adminFilterLevel === 'todos' ? 'secundaria' : this.adminFilterLevel;
                const levelQuestions = MOCK_QUESTIONS[currentLevel] || [];
                const keys = Object.keys(questionScores); 

                const labels = keys.map(key => {
                    const id = parseInt(key.replace('Pregunta ', ''));
                    const questionObj = levelQuestions.find(q => q.id === id);
                    let fullText = questionObj ? (typeof questionObj === 'string' ? questionObj : (questionObj.text || "")) : key;
                    if (fullText.length > 45) {
                        return fullText.substring(0, 42) + '...';
                    }
                    return fullText;
                });

                const data = keys.map(q => {
                    const d = questionScores[q];
                    return (d.sum / d.count).toFixed(2);
                });

                if (this.activeCharts.preguntas) this.activeCharts.preguntas.destroy();

                this.activeCharts.preguntas = new Chart(ctx, {
                    type: 'bar', 
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Promedio de Aceptación',
                            data: data,
                            backgroundColor: 'rgba(245, 158, 11, 0.8)',
                            borderColor: 'rgba(217, 119, 6, 1)',
                            borderWidth: 1.5,
                            borderRadius: 6
                        }]
                    },
                    options: {
                        indexAxis: 'y', 
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                min: 1,
                                max: 5,
                                ticks: {
                                    stepSize: 1,
                                    callback: function(value) {
                                        if (value === 1) return "NUNCA / Desacuerdo";
                                        if (value === 3) return "A veces / Regular";
                                        if (value === 5) return "SIEMPRE / De acuerdo";
                                        return "";
                                    }
                                }
                            },
                            y: {
                                ticks: {
                                    font: {
                                        size: 11,
                                        weight: '600'
                                    }
                                }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            },

                const footer = document.getElementById('main-footer');

                const previousScrollTop = container ? container.scrollTop : 0;
                const previousWindowY = window.scrollY;
                const viewChanged = this.currentView !== this.lastView;
                this.lastView = this.currentView;

                container.innerHTML = '';

                if (this.currentView === 'splash') {
                    header.classList.add('hidden');
                    if (footer) footer.classList.add('hidden');
                } else {
                    header.classList.remove('hidden');
                    if (footer) footer.classList.remove('hidden');
                }

                switch(this.currentView) {
                    case 'splash': container.innerHTML = this.views.splash(); break;
                    case 'login': container.innerHTML = this.views.login(); break;
                    case 'welcome': container.innerHTML = this.views.welcome(); break;
                    case 'portal': container.innerHTML = this.views.portal(); break;
                    case 'form': container.innerHTML = this.views.form(); break;
                    case 'sec_final': container.innerHTML = this.views.sec_final(); break;
                    case 'sec_thanks': container.innerHTML = this.views.sec_thanks(); break;
                    case 'admin': container.innerHTML = this.views.admin(); this.fetchAdminData(); break;

                // cada vez que cambiamos de vista o si estamos interactuando activamente con el formulario
                if (viewChanged || this.currentView === 'form') {
                    if (container) container.scrollTop = 0;

                        <h2 class="text-3xl font-extrabold text-slate-900 mb-4 uppercase tracking-wide">
                            ¡Evaluación Finalizada!
                        </h2>
                        
                        <div class="bg-white p-8 rounded-2xl shadow-md border border-slate-100 max-w-md mb-8">
                            <p class="text-slate-600 text-base font-medium leading-relaxed">
                                Querido(a) estudiante, agradecemos profundamente el tiempo dedicado a este cuestionario.<br><br>
                                Tu retroalimentación es fundamental para el fortalecimiento de nuestro modelo de aprendizaje. Tus respuestas han sido registradas de forma totalmente anónima.
                            </p>
                        </div>
                        
                        <button onclick="app.logout()" class="bg-primary hover:bg-blue-800 text-white font-bold py-3 px-10 rounded-xl shadow transition-all flex items-center gap-2">
                            <i class="fas fa-sign-out-alt"></i> Finalizar Sesión
                        </button>
                    </div>
                `,

                admin: () => {
                    const level = app.adminFilterLevel;
                    const filteredTeachersForSelect = level === 'todos' 
                        ? appTeachers 
                        : appTeachers.filter(t => app.checkTeacherLevel(t.levels, level));

                    return `
                    <div class="max-w-7xl mx-auto py-6 px-4 fade-in">
                        <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-200 pb-4">
                            <div>
                                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Radiografía y Desempeño Pedagógico</h2>
                                
                                <!-- Autoría con gran personalidad en Cabecera de Administración -->
                                <div class="flex items-center gap-2 text-xs text-slate-500 mt-1.5">
                                    <span class="font-mono tracking-wider text-[9px] uppercase bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200/60">Lead Developer</span>
                                    <span class="font-semibold text-slate-700">L.I.E. Arturo Palacios González</span>
                                    <span class="text-slate-300">•</span>
                                    <span class="text-primary font-medium">Dirección de Innovación Tecnológica</span>
                                </div>
                            </div>
                        </div>

                        <!-- PANEL DE FILTRADO MULTI-NIVEL AVANZADO -->
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Nivel</label>
                                <select onchange="app.setAdminFilterLevel(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos" ${app.adminFilterLevel === 'todos' ? 'selected' : ''}>Todos los Niveles</option>
                                    <option value="primaria_baja" ${app.adminFilterLevel === 'primaria_baja' ? 'selected' : ''}>Primaria Baja</option>
                                    <option value="primaria_alta" ${app.adminFilterLevel === 'primaria_alta' ? 'selected' : ''}>Primaria Alta</option>
                                    <option value="secundaria" ${app.adminFilterLevel === 'secundaria' ? 'selected' : ''}>Secundaria</option>
                                    <option value="bachillerato" ${app.adminFilterLevel === 'bachillerato' ? 'selected' : ''}>Bachillerato</option>
                                    <option value="personal_cgb" ${app.adminFilterLevel === 'personal_cgb' ? 'selected' : ''}>Personal CGB</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Grado</label>
                                <select onchange="app.setAdminFilterGrade(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos" ${app.adminFilterGrade === 'todos' ? 'selected' : ''}>Todos los Grados</option>
                                    <option value="1º" ${app.adminFilterGrade === '1º' ? 'selected' : ''}>1º Grado</option>
                                    <option value="2º" ${app.adminFilterGrade === '2º' ? 'selected' : ''}>2º Grado</option>
                                    <option value="3º" ${app.adminFilterGrade === '3º' ? 'selected' : ''}>3º Grado</option>
                                    <option value="4º" ${app.adminFilterGrade === '4º' ? 'selected' : ''}>4º Grado</option>
                                    <option value="5º" ${app.adminFilterGrade === '5º' ? 'selected' : ''}>5º Grado</option>
                                    <option value="6º" ${app.adminFilterGrade === '6º' ? 'selected' : ''}>6º Grado</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Grupo</label>
                                <select onchange="app.setAdminFilterGroup(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos" ${app.adminFilterGroup === 'todos' ? 'selected' : ''}>Todos los Grupos</option>
                                    <option value="A" ${app.adminFilterGroup === 'A' ? 'selected' : ''}>Grupo A</option>
                                    <option value="B" ${app.adminFilterGroup === 'B' ? 'selected' : ''}>Grupo B</option>
                                    <option value="C" ${app.adminFilterGroup === 'C' ? 'selected' : ''}>Grupo C</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Docente</label>
                                <select id="admin-filter-teacher" onchange="app.setAdminFilterTeacher(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos" ${app.adminFilterTeacher === 'todos' ? 'selected' : ''}>Todos los Docentes</option>
                                    ${filteredTeachersForSelect.map(t => `<option value="${t.id}" ${app.adminFilterTeacher == t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <!-- PANEL DINÁMICO DE REPORTES -->
                        <div id="admin-results">
                            <div class="text-center py-12">
                                <i class="fas fa-spinner animate-spin text-4xl text-primary mb-2"></i>
                                <p class="text-gray-500 font-medium">Calculando radiografías...</p>
                            </div>
                        </div>
                    </div>
                `;
                }
            }
        };

        // --- SISTEMA DE TOASTS ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColors = {
                success: 'bg-emerald-600',
                error: 'bg-rose-600',
                info: 'bg-slate-800'
            };
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            toast.className = `${bgColors[type] || bgColors.info} text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 text-sm font-semibold toast-enter`;
            toast.innerHTML = `
                <i class="fas ${icons[type] || icons.info} text-base"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                toast.addEventListener('animationend', () => toast.remove());
            }, 3500);
        }

        // --- INICIALIZACIÓN AL CARGAR LA VENTANA ---
        window.onload = function () {
            app.init();
        };
    </script>
</body>
</html>
