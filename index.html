    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
            min-height: 100vh;
        }
        /* Cristalografía premium */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .glass-dark {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
        /* Animación para Rombos Rotados (Diamonds Scale 1 al 5) */
        .diamond-pulse {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .diamond-pulse:hover {
            transform: rotate(45deg) scale(1.15);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }
        .diamond-active {
            transform: rotate(45deg) scale(1.1);
            background: #1e40af !important;
            color: #ffffff !important;
            box-shadow: 0 0 20px rgba(30, 64, 175, 0.8);
        }
        /* Confeti dinámico para pantalla de éxito en primaria */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            animation: confetti-fall 3s linear infinite;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        /* Brinco interactivo de Bretax */
        @keyframes bretax-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.03); }
        }
        .bretax-celebrate {
            animation: bretax-bounce 2s ease-in-out infinite;
        }
        /* Custom scrollbar corporativa */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Transiciones fluidas para notificaciones Toast */
        .toast-enter {
            animation: slide-in 0.3s ease-out forwards;
        }
        .toast-exit {
            animation: slide-out 0.3s ease-in forwards;
        }
        @keyframes slide-in {
            from { transform: translateY(100%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes slide-out {
            from { transform: translateY(0) scale(1); opacity: 1; }
            to { transform: translateY(100%) scale(0.9); opacity: 0; }
        }
        /* Animaciones para la cortinilla */
        @keyframes scaleUp {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.3)); }
            50% { filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.6)); }
        }
        .animate-scaleUp {
            animation: scaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-pulseGlow {
            animation: pulseGlow 3s infinite alternate;
        }
    </style>

            checkTeacherLevel(teacherLevels, userRole) {
                if (!teacherLevels || !userRole) return false;
                const cleanString = (str) => {
                    if (!str) return "";
                    return str.toLowerCase()
                        .normalize("NFD")
                        .replace(/[\u0300-\u036f]/g, "")
                        .replace(/[^a-z0-9]/g, "");
                };
                const normUserRole = cleanString(userRole);
                return teacherLevels.some(level => {
                    if (!level) return false;
                    const normLevel = cleanString(level);
                    if (normLevel === normUserRole) return true;
                    const singLevel = normLevel.endsWith('s') ? normLevel.slice(0, -1) : normLevel;
                    const singUser = normUserRole.endsWith('s') ? normUserRole.slice(0, -1) : normUserRole;
                    if (singLevel === singUser) return true;
                    if (singLevel === "primaria" && (singUser === "primariabaja" || singUser === "primariaalta")) {
                        return true;
                    }
                    if (normLevel.includes(normUserRole) || normUserRole.includes(normLevel)) {
                        return true;
                    }
                    return false;
                });
            },

            getTeacherCleanName(fullName) {
                if (!fullName) return "";
                const match = fullName.match(/^([^(]+)\s*\(([^)]+)\)/);
                if (match) {
                    return match[1].trim();
                }
                return fullName.trim();
            },

            getTeacherSubject(fullName) {
                if (!fullName) return "Docente";
                const match = fullName.match(/^([^(]+)\s*\(([^)]+)\)/);
                if (match) {
                    return match[2].trim();
                }
                return "Docente";
            },

            getTeacherInitials(name) {
                if (!name) return "DOC";
                let cleanName = this.getTeacherCleanName(name);
                let clean = cleanName.replace(/^(Mr\.|Miss|Prof\.|Profe\.|Dr\.|Dra\.)\s+/i, '').trim();
                let parts = clean.split(/\s+/);
                let initials = "";
                if (parts[0]) initials += parts[0][0];
                if (parts[1]) initials += parts[1][0];
                return initials.toUpperCase() || "CGB";
            },

            fetchWithTimeout(url, options = {}, timeout = 15000) {
                const safeOptions = options === null ? {} : options;
                return Promise.race([
                    fetch(url, safeOptions),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout de red')), timeout))
                ]);
            },

            generateRealisticMockData() {
                MOCK_SUBMISSIONS = [];
                const levels = ['primaria_baja', 'primaria_alta', 'secundaria', 'bachillerato', 'coordinadores', 'directores'];
                const groups = ['grupo_41', 'grupo_42', 'grupo_51', 'grupo_52', 'grupo_61', 'grupo_62'];
                const comments = [
                    "Excelente labor en toda la gestión del semestre.",
                    "Muy buena atención cuando le busco por dudas.",
                    "Su comunicación es oportuna y empática.",
                    "Organización excelente y trato muy respetuoso.",
                    "Sabe escuchar sugerencias del equipo.",
                    "Su mediación es oportuna y constructiva.",
                    "Las explicaciones son muy amenas y de gran ayuda.",
                    "La clase es excelente y muy dinámica."
                ];
                for (let i = 0; i < 60; i++) {
                    const studentRole = levels[Math.floor(Math.random() * levels.length)];
                    const teachersInLevel = FALLBACK_TEACHERS.filter(t => this.checkTeacherLevel(t.levels, studentRole));
                    if (teachersInLevel.length === 0) continue;
                    const teacher = teachersInLevel[Math.floor(Math.random() * teachersInLevel.length)];
                    const group = studentRole === 'bachillerato' ? groups[Math.floor(Math.random() * groups.length)] : ['A', 'B', 'C'][Math.floor(Math.random() * 3)];
                    let grade = "1º";
                    if (studentRole === 'primaria_baja') grade = ['1º', '2º', '3º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'primaria_alta') grade = ['4º', '5º', '6º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'secundaria') grade = ['1º', '2º', '3º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'bachillerato') grade = ['Segundo Semestre', 'Cuarto Semestre', 'Sexto Semestre'][Math.floor(Math.random() * 3)];

                    const responses = {};
                    const questions = MOCK_QUESTIONS[studentRole];
                    questions.forEach(q => {
                        if (q.type === 'faces' || q.type === 'sec_options') {
                            responses[q.id] = ['si', 'a_veces', 'no'][Math.floor(Math.random() * 3)];
                        } else if (q.type === 'numbers') {
                            responses[q.id] = Math.floor(Math.random() * 3) + 3;
                        } else if (q.type === 'radio') {
                            responses[q.id] = q.options[Math.floor(Math.random() * q.options.length)];
                        } else if (q.type === 'textarea') {
                            responses[q.id] = comments[Math.floor(Math.random() * comments.length)];
                        }
                    });

                    if (studentRole === 'secundaria' || studentRole === 'bachillerato') {
                        responses['aprendiMas'] = studentRole === 'secundaria' ? "Español, Matemáticas" : "Cálculo, Cultura digital";
                        responses['clasesMejorar'] = studentRole === 'secundaria' ? "Francés, Pintura" : "Francés, Química";
                        responses['comentarioLibre'] = comments[Math.floor(Math.random() * comments.length)];
                    }

                    MOCK_SUBMISSIONS.push({
                        studentEmail: `evaluador.${i+1}@cgb.edu.mx`,
                        studentRole: studentRole,
                        studentGrade: grade,
                        studentGroup: group,
                        teacherId: teacher.id,
                        teacherName: teacher.name,
                        responses: responses,
                        timestamp: new Date(Date.now() - Math.random() * 10 * 24 * 60 * 60 * 1000).toLocaleString('es-MX', { timeZone: 'America/Mexico_City' })
                    });
                }
            },

                const spinner = document.getElementById('loading-spinner');
                if (spinner) spinner.classList.remove('hidden');
                try {
                    const response = await this.fetchWithTimeout(GOOGLE_SHEETS_API_URL + "?action=getInitialData", {}, 15000);
                    const data = await response.json();
                    if (data.status === 'success') {
                        appTeachers = data.teachers || FALLBACK_TEACHERS;
                        appEmails = data.emails || [];
                        appEmailsLevels = data.emailsLevels || {};
                        this.logDebug(`Datos iniciales sincronizados de Sheets. ${appTeachers.length} docentes leídos.`, 'success');
                    } else {
                        throw new Error(data.message || 'Error desconocido');
                    }
                } catch (err) {
                    this.logDebug(`Error al descargar de Sheets: ${err.message}. Usando base local offline.`, 'error');
                    appTeachers = FALLBACK_TEACHERS;
                } finally {
                    if (spinner) spinner.classList.add('hidden');
                }
            },

                        if (this.adminFilterLevel === 'todos' || s.studentRole === this.adminFilterLevel) {
                            uniqueTeachers[s.teacherId] = s.teacherName;
                        }
                    });
                    Object.keys(uniqueTeachers).forEach(id => {
                        teacherSelect.innerHTML += `<option value="${id}">${uniqueTeachers[id]}</option>`;
                    });
                    if (uniqueTeachers[prevTeacher] || prevTeacher === 'todos') {
                        teacherSelect.value = prevTeacher;
                        this.adminFilterTeacher = prevTeacher;
                    } else {
                        this.adminFilterTeacher = 'todos';
                    }
                }

                const gradeSelect = document.getElementById('admin-filter-grade');
                if (gradeSelect) {
                    const prevGrade = this.adminFilterGrade;
                    gradeSelect.innerHTML = '<option value="todos">[ Todos los Grados ]</option>';
                    const uniqueGrades = [...new Set(subs.filter(s => this.adminFilterLevel === 'todos' || s.studentRole === this.adminFilterLevel).map(s => s.studentGrade))];
                    uniqueGrades.sort().forEach(g => {
                        gradeSelect.innerHTML += `<option value="${g}">${g}</option>`;
                    });
                    if (uniqueGrades.includes(prevGrade) || prevGrade === 'todos') {
                        gradeSelect.value = prevGrade;
                        this.adminFilterGrade = prevGrade;
                    } else {
                        this.adminFilterGrade = 'todos';
                    }
                }

                const groupSelect = document.getElementById('admin-filter-group');
                if (groupSelect) {
                    const prevGroup = this.adminFilterGroup;
                    groupSelect.innerHTML = '<option value="todos">[ Todos los Grupos ]</option>';
                    const uniqueGroups = [...new Set(subs.filter(s => this.adminFilterLevel === 'todos' || s.studentRole === this.adminFilterLevel).map(s => s.studentGroup))];
                    uniqueGroups.sort().forEach(g => {
                        groupSelect.innerHTML += `<option value="${g}">${g.replace('grupo_','').toUpperCase()}</option>`;
                    });
                    if (uniqueGroups.includes(prevGroup) || prevGroup === 'todos') {
                        groupSelect.value = prevGroup;
                        this.adminFilterGroup = prevGroup;
                    } else {
                        this.adminFilterGroup = 'todos';
                    }
                }

                // --- PARTICIPACIÓN Y AUDITORÍA POR ALUMNOS (AGRUPADO ÚNICO) ---
                const tbody = document.getElementById('admin-table-body');
                if (tbody) {
                    tbody.innerHTML = '';
                    if (filtered.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-slate-400 font-medium">Ningún envío cumple con los filtros activos.</td></tr>`;
                    } else {
                        // Agrupar evaluaciones por alumno usando su correo como llave única
                        const alumnosAgrupados = {};
                        filtered.forEach(s => {
                            const alumnoKey = s.studentEmail || 'anonimo';
                            if (!alumnosAgrupados[alumnoKey]) {
                                alumnosAgrupados[alumnoKey] = {
                                    email: s.studentEmail,
                                    role: s.studentRole,
                                    grade: s.studentGrade,
                                    group: s.studentGroup,
                                    evaluaciones: []
                                };
                            }
                            alumnosAgrupados[alumnoKey].evaluaciones.push(s);
                        });

                        Object.values(alumnosAgrupados).forEach((alumno, idx) => {
                            const roleLabels = { 'primaria_baja': 'P. Baja', 'primaria_alta': 'P. Alta', 'secundaria': 'Secundaria', 'bachillerato': 'Bachillerato', 'coordinadores': 'Coord', 'directores': 'Dir' };
                            
                            // Fila principal del Alumno Único
                            const row = document.createElement('tr');
                            row.className = "border-b border-slate-100 hover:bg-slate-50/70 transition-colors font-medium text-slate-700";
                            row.innerHTML = `
                                <td class="py-3 px-4 text-xs font-semibold text-primary break-all">${alumno.email}</td>
                                <td class="py-3 px-4 text-xs"><span class="px-2 py-0.5 bg-slate-100 border border-slate-200 text-slate-600 rounded-md uppercase font-bold text-[10px]">${roleLabels[alumno.role] || alumno.role}</span></td>
                                <td class="py-3 px-4 text-xs text-slate-500">${alumno.grade}</td>
                                <td class="py-3 px-4 text-xs text-slate-500 font-mono">${alumno.group.replace('grupo_','').toUpperCase()}</td>
                                <td class="py-3 px-4 text-xs text-right">
                                    <button onclick="app.toggleAlumnoDetalle('${idx}')" class="px-3 py-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 rounded-lg text-[11px] font-bold transition-all flex items-center gap-1.5 ml-auto">
                                        <i class="fas fa-search-plus"></i> Ver ${alumno.evaluaciones.length} Evaluaciones
                                    </button>
                                </td>
                            `;
                            tbody.appendChild(row);

                            // Fila de detalles oculta (Acordeón que no rompe la estética de la app)
                            const detailRow = document.createElement('tr');
                            detailRow.id = `alumno-detalle-${idx}`;
                            detailRow.className = "hidden bg-slate-50/50 border-b border-slate-100";
                            
                            let eHTML = `<td colspan="5" class="py-4 px-6"><div class="space-y-3">`;
                            alumno.evaluaciones.forEach((e, evIdx) => {
                                // Construir el desglose de respuestas
                                let respuestasFijas = [];
                                let respuestasAbiertas = [];
                                
                                Object.entries(e.responses).forEach(([qId, val]) => {
                                    if (qId === 'aprendiMas' || qId === 'clasesMejorar' || qId === 'comentarioLibre') {
                                        let qLabel = qId === 'aprendiMas' ? 'Clases donde aprendió más' : qId === 'clasesMejorar' ? 'Clases a mejorar' : 'Comentario general';
                                        respuestasAbiertas.push(`<strong>${qLabel}:</strong> ${val}`);
                                    } else if (!isNaN(qId)) {
                                        respuestasFijas.push(`<span class="bg-white px-2 py-0.5 border border-slate-200 rounded text-slate-600 font-mono text-[10px]">P${qId}: ${String(val).toUpperCase()}</span>`);
                                    } else {
                                        respuestasAbiertas.push(`<strong>${qId}:</strong> ${val}`);
                                    }
                                });

                                eHTML += `
                                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-xs leading-relaxed text-slate-600">
                                        <div class="flex flex-wrap justify-between items-center border-b border-slate-100 pb-2 mb-2 gap-2">
                                            <span class="font-bold text-slate-800 flex items-center gap-1.5"><i class="fas fa-chalkboard-teacher text-primary"></i> Evalúó a: ${e.teacherName}</span>
                                            <span class="text-[10px] text-slate-400 font-mono"><i class="far fa-clock"></i> ${e.timestamp}</span>
                                        </div>
                                        <div class="mb-2">
                                            <span class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1">Respuestas de Selección</span>
                                            <div class="flex flex-wrap gap-1.5">${respuestasFijas.join('') || '<span class="italic text-slate-400">Ninguna</span>'}</div>
                                        </div>
                                        ${respuestasAbiertas.length > 0 ? `
                                        <div>
                                            <span class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1">Sección Abierta / Comentarios</span>
                                            <div class="space-y-1 text-slate-700 font-sans">${respuestasAbiertas.map(ra => `<p class="pl-2 border-l-2 border-slate-200">${ra}</p>`).join('')}</div>
                                        </div>` : ''}
                                    </div>
                                `;
                            });
                            eHTML += `</div></td>`;
                            detailRow.innerHTML = eHTML;
                            tbody.appendChild(detailRow);
                        });
                    }
                }

                // --- RENDERIZADO DE GRÁFICAS MÉTRICAS ---
                let totalScore = 0;
                let numericCount = 0;
                let yesCount = 0;
                let sometimesCount = 0;
                let noCount = 0;

                filtered.forEach(s => {
                    Object.values(s.responses).forEach(val => {
                        if (typeof val === 'number') {
                            totalScore += val;
                            numericCount++;
                        } else if (typeof val === 'string') {
                            let v = val.toLowerCase();
                            if (v === 'si' || v === 'sí') yesCount++;
                            else if (v === 'a_veces') sometimesCount++;
                            else if (v === 'no') noCount++;
                        }
                    });
                });

                let averageGral = numericCount > 0 ? (totalScore / numericCount) : 4.4;
                document.getElementById('metric-avg-score').innerText = averageGral.toFixed(2);
                document.getElementById('metric-satisfaction').innerText = (yesCount + sometimesCount + noCount) > 0 
                    ? Math.round(((yesCount + sometimesCount * 0.5) / (yesCount + sometimesCount + noCount)) * 100) + '%'
                    : '88%';

                this.renderChart('chart-satisfaction', 'doughnut', {
                    labels: ['Excelente (Sí)', 'Regular (A veces)', 'Atención (No)'],
                    datasets: [{
                        data: [yesCount || 75, sometimesCount || 18, noCount || 7],
                        backgroundColor: ['#10b981', '#f59e0b', '#dc2626'],
                        borderWidth: 0
                    }]
                }, { cutout: '72%', plugins: { legend: { display: false } } });

                const teacherAvgMap = {};
                filtered.forEach(s => {
                    let tScore = 0;
                    let tCount = 0;
                    Object.values(s.responses).forEach(v => {
                        if (typeof v === 'number') { tScore += v; tCount++; }
                        else if (typeof v === 'string') {
                            let sV = v.toLowerCase();
                            if (sV === 'si' || sV === 'sí') { tScore += 5; tCount++; }
                            else if (sV === 'a_veces') { tScore += 3; tCount++; }
                            else if (sV === 'no') { tScore += 1; tCount++; }
                        }
                    });
                    if (tCount > 0) {
                        if (!teacherAvgMap[s.teacherName]) teacherAvgMap[s.teacherName] = { sum: 0, count: 0 };
                        teacherAvgMap[s.teacherName].sum += (tScore / tCount);
                        teacherAvgMap[s.teacherName].count++;
                    }
                });

                const tLabels = Object.keys(teacherAvgMap);
                const tData = tLabels.map(l => (teacherAvgMap[l].sum / teacherAvgMap[l].count));

                if (tLabels.length === 0) {
                    tLabels.push("M. Brenda", "M. Nadya", "P. Jorge", "M. Sarai");
                    tData.push(4.8, 4.5, 3.9, 4.2);
                }

                this.renderChart('chart-teachers-bar', 'bar', {
                    labels: tLabels.map(l => this.getTeacherCleanName(l)),
                    datasets: [{
                        data: tData,
                        backgroundColor: tData.map(v => v >= 4.0 ? '#3b82f6' : (v >= 3.0 ? '#f59e0b' : '#dc2626')),
                        borderRadius: 8
                    }]
                }, {
                    scales: { y: { min: 1, max: 5, grid: { display: false } }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                });
            },

            toggleAlumnoDetalle(index) {
                const el = document.getElementById(`alumno-detalle-${index}`);
                if (el) {
                    el.classList.toggle('hidden');
                }
            },

            renderChart(canvasId, type, data, options = {}) {
                const ctx = document.getElementById(canvasId);
                if (!ctx) return;
                if (this.activeCharts[canvasId]) {
                    this.activeCharts[canvasId].destroy();
                }
                this.activeCharts[canvasId] = new Chart(ctx, {
                    type: type,
                    data: data,
                    options: Object.assign({
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: true, position: 'bottom' } }
                    }, options)
                });
            },

            toggleDebugConsole() {
                this.isConsoleExpanded = !this.isConsoleExpanded;
                const body = document.getElementById('debug-console-body');
                const chevron = document.getElementById('debug-chevron');
                if (!body || !chevron) return;
                if (this.isConsoleExpanded) {
                    body.style.maxHeight = '240px';
                    chevron.classList.add('rotate-180');
                } else {
                    body.style.maxHeight = '0px';
                    chevron.classList.remove('rotate-180');
                }
            },

            logDebug(msg, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                this.debugLogs.push({ msg, type, timestamp });
                this.renderDebugLogs();
            },

            clearDebugConsole() {
                this.debugLogs = [];
                this.renderDebugLogs();
            },

            renderDebugLogs() {
                const output = document.getElementById('debug-log-output');
                if (!output) return;
                output.innerHTML = '';
                if (this.debugLogs.length === 0) {
                    output.innerHTML = `<div class="text-slate-400 text-xs italic text-center py-4">Consola vacía. No hay eventos registrados.</div>`;
                    return;
                }
                this.debugLogs.forEach(log => {
                    let badgeBg = 'bg-slate-100 text-slate-600 border-slate-200';
                    let textClass = 'text-slate-600';
                    let containerBg = 'bg-slate-50/50 border-slate-100';
                    let label = 'INFO';
                    if (log.type === 'error') {
                        badgeBg = 'bg-rose-100 text-rose-700 border-rose-200';
                        textClass = 'text-rose-700 font-semibold';
                        containerBg = 'bg-rose-50/30 border-rose-100/50';
                        label = 'ERROR';
                    } else if (log.type === 'success') {
                        badgeBg = 'bg-emerald-100 text-emerald-700 border-emerald-200';
                        textClass = 'text-emerald-700 font-medium';
                        containerBg = 'bg-emerald-50/30 border-emerald-100/50';
                        label = 'ÉXITO';
                    }
                    output.innerHTML += `
                        <div class="flex items-start gap-2.5 p-2 rounded-xl border ${containerBg} text-xs font-sans">
                            <span class="text-[9px] font-mono text-slate-400 shrink-0 self-center">${log.timestamp}</span>
                            <span class="px-1.5 py-0.5 border ${badgeBg} rounded-md text-[9px] font-extrabold uppercase tracking-wider shrink-0 self-center">${label}</span>
                            <span class="leading-relaxed ${textClass}">${log.msg}</span>
                        </div>
                    `;
                });
                output.scrollTop = output.scrollHeight;
            },

            render() {
                const container = document.getElementById('app-container');
                const header = document.getElementById('main-header');
                const userInfo = document.getElementById('user-info');
                const previousScrollTop = container ? container.scrollTop : 0;
                const previousWindowY = window.scrollY;
                const viewChanged = this.currentView !== this.lastView;
                this.lastView = this.currentView;
                
                container.innerHTML = '';

                if (this.currentView === 'splash' || this.currentView === 'login') {
                    header.classList.add('hidden');
                } else {
                    header.classList.remove('hidden');
                }

                switch(this.currentView) {
                    case 'splash': container.innerHTML = this.views.splash(); break;
                    case 'login': container.innerHTML = this.views.login(); break;
                    case 'welcome': container.innerHTML = this.views.welcome(); break;
                    case 'portal': container.innerHTML = this.views.portal(); break;
                    case 'form': container.innerHTML = this.views.form(); break;
                    case 'sec_final': container.innerHTML = this.views.sec_final(); break;
                    case 'sec_thanks': container.innerHTML = this.views.sec_thanks(); break;
                    case 'admin': 
                        container.innerHTML = this.views.admin(); 
                        if (this.adminSubmissions.length === 0) {
                            this.fetchAdminData();
                        } else {
                            this.renderAdminCharts();
                        }
                        break;
                }

                if (viewChanged || this.currentView === 'form') {
                    if (container) container.scrollTop = 0;
                    window.scrollTo(0, 0);
                } else {
                    if (container) container.scrollTop = previousScrollTop;
                    window.scrollTo(0, previousWindowY);
                }

                if (app.currentUser && this.currentView !== 'splash' && this.currentView !== 'sec_thanks') {
                    userInfo.classList.remove('hidden');
                    const roleNames = {
                        'primaria_baja': 'Primaria Baja',
                        'primaria_alta': 'Primaria Alta',
                        'secundaria': 'Secundaria',
                        'bachillerato': 'Bachillerato',
                        'coordinadores': 'Docente (Coordinador)',
                        'directores': 'Docente (Director)',
                        'admin': 'Administrador'
                    };
                    document.getElementById('header-role').innerText = roleNames[app.currentUser.role] || app.currentUser.role;
                    document.getElementById('header-email').innerText = app.currentUser.email || '';
                } else {
                    userInfo.classList.add('hidden');
                }
            },

            views: {
                splash: () => `
                    <div class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-br from-[#0b132b] via-[#1e3a8a] to-[#0f172a] overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-35 pointer-events-none">
                            <div class="absolute -top-24 -left-24 w-[30rem] h-[30rem] bg-blue-500 rounded-full mix-blend-screen filter blur-[100px] animate-pulse"></div>
                            <div class="absolute top-1/2 -right-20 w-[25rem] h-[25rem] bg-orange-600 rounded-full mix-blend-screen filter blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
                        </div>
                        <div class="relative z-10 flex flex-col items-center px-4 w-full animate-scaleUp">
                            <div class="w-64 sm:w-80 md:w-96 mb-8 animate-pulseGlow">
                                <img src="guardianes.png" alt="Guardianes CGB" class="w-full h-auto object-contain drop-shadow-2xl" onerror="this.src='https://placehold.co/400x450/1e3a8a/ffffff?text=CGB+Evalua'">
                            </div>
                            <h1 class="text-3xl sm:text-5xl font-extrabold text-white mb-2 tracking-widest text-center drop-shadow-lg flex items-center justify-center gap-3"> PORTAL DE EVALUACIÓN <span class="text-xs bg-[#dc2626] text-white px-2 py-1 rounded font-mono uppercase tracking-normal select-none shadow-[0_0_15px_rgba(220,38,38,0.7)] font-extrabold">v6.0.2</span> </h1>
                            <p class="text-blue-200 text-lg sm:text-xl mb-10 font-light tracking-[0.2em] text-center uppercase"> Colegio Gran Bretaña </p>
                            <div class="flex flex-col items-center gap-1.5 mb-10 scale-95 opacity-90">
                                <div class="flex items-center gap-2 text-slate-400 text-xs tracking-wider">
                                    <span class="text-[10px] font-mono tracking-widest uppercase bg-white/5 border border-white/10 text-slate-300 px-2 py-0.5 rounded backdrop-blur-sm">Architect</span>
                                    <span>L.I.E. Arturo Palacios González</span>
                                </div>
                                <span class="text-[9px] text-blue-400 font-mono uppercase tracking-[0.3em]">Innovación Tecnológica — CGB</span>
                            </div>
                            <button onclick="app.navigate('login')" class="group relative px-10 py-4 bg-transparent overflow-hidden rounded-full border border-white/50 text-white font-bold text-lg tracking-widest uppercase hover:border-white hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-all duration-300">
                                <div class="absolute inset-0 w-0 bg-white transition-all duration-[400ms] ease-out group-hover:w-full"></div>
                                <span class="relative group-hover:text-primary transition-colors duration-300 flex items-center gap-3"> Ingresar <i class="fas fa-chevron-right transform group-hover:translate-x-2 transition-transform"></i> </span>
                            </button>
                        </div>
                    </div>
                `,
                login: () => `
                    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden mt-12 md:mt-20 p-1 relative border border-slate-100 animate-scaleUp">
                        <div class="bg-primary p-6 text-center text-white rounded-t-2xl">
                            <i class="fas fa-user-circle text-5xl mb-3"></i>
                            <h2 class="text-2xl font-bold">Selección de Perfil</h2>
                            <p class="text-blue-200 text-sm mt-1">Elige tus datos para comenzar</p>
                        </div>
                        <div class="p-6">
                            <div class="mb-4">
                                <div class="flex justify-between items-center mb-1">
                                    <label class="block text-sm font-medium text-gray-700">Nivel Educativo o Rol</label>
                                    <span class="text-[10px] text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded flex items-center gap-1"> <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> ${GOOGLE_SHEETS_API_URL === DEFAULT_API_URL ? 'Default' : 'Custom SS'} </span>
                                </div>
                                <select id="login-role" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-primary focus:ring-primary p-2.5 border outline-none bg-white font-medium" onchange="app.handleRoleChange()">
                                    <option value="" disabled selected>Selecciona tu perfil...</option>
                                    <option value="primaria_baja">🎈 Primaria Baja (1º a 3º)</option>
                                    <option value="primaria_alta">🎒 Primaria Alta (4º a 6º)</option>
                                    <option value="secundaria">🏫 Secundaria</option>
                                    <option value="bachillerato">🎓 Bachillerato</option>
                                    <option value="coordinadores">👔 Coordinadores (Evaluado por Docentes)</option>
                                    <option value="directores">💼 Directores (Evaluado por Docentes)</option>
                                    <option value="admin">🔑 Administrador (Resultados)</option>
                                </select>
                            </div>
                            <div id="primaria-baja-extra-fields" class="mb-4 hidden p-4 bg-orange-50/60 rounded-xl border border-orange-100">
                                <label class="block text-xs font-extrabold uppercase text-orange-800 mb-1.5">Escribe tu Nombre y Apellidos ✍️</label>
                                <input type="text" id="login-student-name" placeholder="Tu nombre completo..." class="w-full bg-white border border-orange-200 rounded-lg px-3.5 py-2.5 text-slate-700 font-semibold focus:ring-2 focus:ring-orange-400 outline-none text-sm shadow-sm">
                            </div>
                            <div id="grade-group-container" class="grid grid-cols-2 gap-4 mb-4 hidden">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Grado / Semestre</label>
                                    <select id="login-grade" class="w-full border-gray-300 rounded-lg p-2.5 border outline-none bg-white font-medium"> </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Grupo</label>
                                    <select id="login-group" class="w-full border-gray-300 rounded-lg p-2.5 border outline-none bg-white font-medium"> </select>
                                </div>
                            </div>
                            <div id="email-container" class="mb-6 hidden">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Correo Institucional / de Acceso</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-envelope text-gray-400"></i>
                                    </div>
                                    <input type="email" id="login-email" placeholder="tu.nombre@cgb.edu.mx" class="w-full pl-10 border-gray-300 rounded-lg shadow-sm focus:border-primary focus:ring-primary p-2.5 border outline-none">
                                </div>
                            </div>
                            <div id="password-container" class="mb-6 hidden">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña de Administrador</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-lock text-gray-400"></i>
                                    </div>
                                    <input type="password" id="login-password" placeholder="••••••••" class="w-full pl-10 border-gray-300 rounded-lg shadow-sm focus:border-primary focus:ring-primary p-2.5 border outline-none">
                                </div>
                                <div class="mt-3 text-[11px] leading-relaxed text-slate-500 bg-blue-50/75 p-3 rounded-xl border border-blue-100/50 flex gap-2.5 items-start">
                                    <i class="fas fa-info-circle text-primary mt-0.5 text-xs shrink-0"></i> <span> <strong>Acceso Simplificado:</strong> El campo de correo es opcional. Puedes ingresar directamente con tu contraseña maestra (ej. <code>arturo2026</code>, <code>admin2026</code> o <code>DIR2026</code>). </span>
                                </div>
                            </div>
                            <button onclick="app.processLogin()" class="w-full bg-primary hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg shadow transition-colors flex items-center justify-center gap-2"> Continuar <i class="fas fa-arrow-right"></i> </button>
                        </div>
                    </div>
                `,

        };

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColors = { success: 'bg-emerald-600', error: 'bg-rose-600', info: 'bg-slate-800' };
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            toast.className = `${bgColors[type] || bgColors.info} text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 text-sm font-semibold toast-enter pointer-events-auto`;
            toast.innerHTML = `<i class="fas ${icons[type] || icons.info} text-base"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => { toast.remove(); }, 310);
            }, 3500);
        }

        window.onload = function () {
            app.init();
        };
