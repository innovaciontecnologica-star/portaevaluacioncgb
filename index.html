            checkTeacherLevel(teacherLevels, userRole) {
                if (!teacherLevels || !userRole) return false;
                
                const cleanString = (str) => {
                    if (!str) return "";
                    return str.toLowerCase()
                        .normalize("NFD")
                        .replace(/[\u0300-\u036f]/g, "") 
                        .replace(/[^a-z0-9]/g, "");     
                };

                const normUserRole = cleanString(userRole); 

                return teacherLevels.some(level => {
                    if (!level) return false;
                    const normLevel = cleanString(level);
                    
                    if (normLevel === normUserRole) return true;
                    
                    const singLevel = normLevel.endsWith('s') ? normLevel.slice(0, -1) : normLevel;
                    const singUser = normUserRole.endsWith('s') ? normUserRole.slice(0, -1) : normUserRole;
                    if (singLevel === singUser) return true;

                    if (singLevel === "primaria" && (singUser === "primariabaja" || singUser === "primariaalta")) {
                        return true;
                    }

                    if (normLevel.includes(normUserRole) || normUserRole.includes(normLevel)) {
                        return true;
                    }
                    return false;
                });
            },

            getTeacherCleanName(fullName) {
                if (!fullName) return "";
                const match = fullName.match(/^([^(]+)\s*\(([^)]+)\)/);
                if (match) {
                    return match[1].trim();
                }
                return fullName.trim();
            },

            getTeacherSubject(fullName) {
                if (!fullName) return "Docente";
                const match = fullName.match(/^([^(]+)\s*\(([^)]+)\)/);
                if (match) {
                    return match[2].trim();
                }
                return "Docente";
            },

            getTeacherInitials(name) {
                if (!name) return "DOC";
                let cleanName = this.getTeacherCleanName(name);
                let clean = cleanName.replace(/^(Mr\.|Miss|Prof\.|Profe\.|Dr\.|Dra\.)\s+/i, '').trim();
                let parts = clean.split(/\s+/);
                let initials = "";
                if (parts[0]) initials += parts[0][0];
                if (parts[1]) initials += parts[1][0];
                return initials.toUpperCase() || "CGB";
            },

            fetchWithTimeout(url, options = {}, timeout = 15000) {
                const safeOptions = options === null ? {} : options;
                return Promise.race([
                    fetch(url, safeOptions),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout de red')), timeout))
                ]);
            },

            generateRealisticMockData() {
                MOCK_SUBMISSIONS = [];
                const levels = ['primaria_baja', 'primaria_alta', 'secundaria', 'bachillerato', 'coordinadores', 'directores'];
                const groups = ['grupo_41', 'grupo_42', 'grupo_51', 'grupo_52', 'grupo_61', 'grupo_62'];
                const comments = [
                    "Excelente labor en toda la gestión del semestre.",
                    "Muy buena atención cuando le busco por dudas.",
                    "Su comunicación es oportuna y empática.",
                    "Organización excelente y trato muy respetuoso.",
                    "Sabe escuchar sugerencias del equipo.",
                    "Su mediación es oportuna y constructiva.",
                    "Las explicaciones son muy amenas y de gran ayuda.",
                    "La clase es excelente y muy dinámica."
                ];

                for (let i = 0; i < 60; i++) {
                    const studentRole = levels[Math.floor(Math.random() * levels.length)];
                    const teachersInLevel = FALLBACK_TEACHERS.filter(t => this.checkTeacherLevel(t.levels, studentRole));
                    if (teachersInLevel.length === 0) continue;

                    const teacher = teachersInLevel[Math.floor(Math.random() * teachersInLevel.length)];
                    const group = studentRole === 'bachillerato' ? groups[Math.floor(Math.random() * groups.length)] : ['A', 'B', 'C'][Math.floor(Math.random() * 3)];
                    let grade = "1º";
                    
                    if (studentRole === 'primaria_baja') grade = ['1º', '2º', '3º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'primaria_alta') grade = ['4º', '5º', '6º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'secundaria') grade = ['1º', '2º', '3º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'bachillerato') grade = ['4º Semestre', '5º Semestre', '6º Semestre'][Math.floor(Math.random() * 3)];

                    const responses = {};
                    const questions = MOCK_QUESTIONS[studentRole];
                    questions.forEach(q => {
                        if (q.type === 'faces' || q.type === 'sec_options') {
                            responses[q.id] = ['si', 'a_veces', 'no'][Math.floor(Math.random() * 3)];
                        } else if (q.type === 'numbers') {
                            responses[q.id] = Math.floor(Math.random() * 3) + 3; 
                        } else if (q.type === 'radio') {
                            responses[q.id] = q.options[Math.floor(Math.random() * q.options.length)];
                        } else if (q.type === 'textarea') {
                            responses[q.id] = comments[Math.floor(Math.random() * comments.length)];
                        }
                    });

                    MOCK_SUBMISSIONS.push({
                        studentEmail: `evaluador.${i+1}@cgb.edu.mx`,
                        studentRole: studentRole,
                        studentGrade: grade,
                        studentGroup: group,
                        teacherId: teacher.id,
                        teacherName: teacher.name,
                        responses: responses,
                        timestamp: new Date(Date.now() - Math.random() * 10 * 24 * 60 * 60 * 1000).toLocaleString('es-MX', { timeZone: 'America/Mexico_City' })
                    });
                }
            },

            async fetchInitialData() {
                if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.trim() === '') {
                    appTeachers = FALLBACK_TEACHERS;
                    appSubmissions = MOCK_SUBMISSIONS;
                    showToast("Cargado en modo simulación local", "info");
                    return;
                }
                try {
                    const response = await this.fetchWithTimeout(GOOGLE_SHEETS_API_URL + "?action=getInitialData", {}, 15000);
                    const data = await response.json();
                    
                    if (data && data.status === "ERROR") {
                        throw new Error(data.message);
                    }

                    if (data && Array.isArray(data.teachers)) {
                        appTeachers = data.teachers;
                        appEmails = data.emails || [];
                        appEmailsLevels = data.emailLevels || {}; 
                        showToast("¡Conectado exitosamente al servidor CGB!", "success");
                    } else {
                        throw new Error("Estructura de datos incorrecta.");
                    }
                } catch (error) {
                    console.warn("Utilizando Fallback local:", error);
                    appTeachers = FALLBACK_TEACHERS;
                    appEmails = [];
                    appEmailsLevels = {};
                    showToast("Modo local: Error de conexión", "info");
                }

                try {
                    const subResponse = await this.fetchWithTimeout(GOOGLE_SHEETS_API_URL + "?action=getSubmissions", {}, 15000);
                    const subData = await subResponse.json();
                    if (subData && Array.isArray(subData.submissions)) {
                        appSubmissions = subData.submissions;
                    } else {
                        appSubmissions = MOCK_SUBMISSIONS;
                    }
                } catch (e) {
                    appSubmissions = MOCK_SUBMISSIONS;
                }

                app.render();
            },

            processLogin() {

                const grade = document.getElementById('login-grade')?.value || "N/A";
                const group = document.getElementById('login-group')?.value || "N/A";

                const existingErrBox = document.getElementById('email-error-msg');
                if (existingErrBox) existingErrBox.remove();

                if (!role) {
                    showToast("Por favor selecciona tu nivel o perfil", "error");
                    return;
                }

                if (role === 'admin') {
                    if (!email || !password) {
                        showToast("El correo y la contraseña son obligatorios para administradores", "error");
                        return;
                    }
                    const emailLower = email.toLowerCase();
                    if (
                        (emailLower === 'sir.artorio@gmail.com' && password === 'arturo2026') ||
                        (emailLower === 'coord.academica@cgb.edu.mx' && password === 'admin2026')
                    ) {
                        this.currentUser = { role, email, grade: "N/A", group: "N/A" };
                        showToast("Sesión de administrador iniciada", "success");
                        this.navigate('admin');
                        return;
                    } else {
                        showToast("Credenciales de administrador incorrectas", "error");
                        return;
                    }
                }

                const requiresEmail = ['primaria_alta', 'secundaria', 'bachillerato', 'coordinadores', 'directores'].includes(role);

                if (requiresEmail && !email) {
                    showToast("El correo electrónico es requerido para este perfil", "error");
                    return;
                }

                const isTestBypass = email.toLowerCase() === 'sir.artorio@gmail.com' || email.toLowerCase() === 'coord.academica@cgb.edu.mx';

                if (requiresEmail && !isTestBypass) {
                    const emailNormalized = email.toLowerCase();
                    
                    if (appEmails.length > 0 && !appEmails.includes(emailNormalized)) {
                        showToast("Este correo no se encuentra autorizado para evaluar.", "error");
                        const errBox = document.createElement('div');
                        errBox.id = 'email-error-msg';
                        errBox.className = 'mt-2 text-xs font-semibold text-red-600 bg-red-50 p-2 rounded-lg border border-red-100 fade-in';
                        errBox.innerText = "Error: El correo electrónico ingresado no coincide con ningún estudiante registrado en la lista oficial CGB.";
                        document.getElementById('email-container').appendChild(errBox);
                        return;
                    }

                    if (appEmailsLevels && Object.keys(appEmailsLevels).length > 0) {
                        const assignedLevel = appEmailsLevels[emailNormalized] || "todos";
                        
                        if (assignedLevel !== "todos") {
                            let isLevelMatch = false;
                            
                            if (role === "secundaria" && assignedLevel.includes("secundaria")) {
                                isLevelMatch = true;
                            } else if (role === "primaria_alta" && (assignedLevel.includes("primaria_alta") || assignedLevel.includes("primaria alta") || assignedLevel === "primaria")) {
                                isLevelMatch = true;
                            } else if (role === "bachillerato" && (assignedLevel.includes("bachillerato") || assignedLevel.includes("grupo_"))) {
                                isLevelMatch = true;
                                
                                if (assignedLevel.startsWith("grupo_") && assignedLevel !== group) {
                                    isLevelMatch = false;
                                    showToast(`Tu grupo registrado es el ${assignedLevel.replace("grupo_", "").toUpperCase()}`, "error");
                                    const errBox = document.createElement('div');
                                    errBox.id = 'email-error-msg';
                                    errBox.className = 'mt-2 text-xs font-semibold text-red-600 bg-red-50 p-2 rounded-lg border border-red-100 fade-in';
                                    errBox.innerText = `Acceso denegado: Estás intentando evaluar en el grupo "${group.replace("grupo_", "").toUpperCase()}", pero tu cuenta de correo pertenece originalmente al "${assignedLevel.replace("grupo_", "").toUpperCase()}". Por favor selecciona tus datos correctos.`;
                                    document.getElementById('email-container').appendChild(errBox);
                                    return;
                                }
                            } else if (role === "coordinadores" && assignedLevel.includes("coordinadores")) {
                                isLevelMatch = true;
                            } else if (role === "directores" && assignedLevel.includes("directores")) {
                                isLevelMatch = true;
                            } else if (assignedLevel === role) {
                                isLevelMatch = true;
                            }

                            if (!isLevelMatch) {
                                showToast(`Este correo está registrado para otro nivel o grupo`, "error");
                                return;
                            }
                        }
                    }

                    const allSubs = GOOGLE_SHEETS_API_URL && GOOGLE_SHEETS_API_URL.trim() !== ""
                        ? appSubmissions 
                        : MOCK_SUBMISSIONS;

                    const alreadySubmitted = allSubs.some(sub => sub.studentEmail && sub.studentEmail.toLowerCase() === emailNormalized);
                    
                    if (alreadySubmitted) {
                        showToast("Este correo ya ha realizado su evaluación de este semestre.", "error");
                        return;
                    }
                }

                this.currentUser = { role, email, grade, group };
                showToast("¡Sesión iniciada correctamente!", "success");

            async submitEvaluation() {
                const teacher = appTeachers.find(t => t.id === this.selectedTeacher);
                const questions = MOCK_QUESTIONS[this.currentUser.role];

                const activeQuestions = questions.filter(q => {
                    if (q.isGeneral && this.hasAnsweredGeneralQuestions) return false;
                    return true;
                });

                for (let q of activeQuestions) {
                    if (q.type === 'textarea') {
                        const val = document.getElementById('text-q-' + q.id).value.trim();
                        this.formResponses[q.id] = val;
                        
                        const isDirectivoOrCoordinador = this.currentUser.role === 'coordinadores' || this.currentUser.role === 'directores';
                        const isRequiredId = q.id === 13 || q.id === 14 || q.id === 15;

                        if (isDirectivoOrCoordinador && isRequiredId) {
                            if (val === '') {
                                showToast(`Por favor responde la pregunta obligatoria: "${q.text.substring(0, 45)}..."`, "error");
                                const element = document.getElementById('text-q-' + q.id);
                                if (element) {
                                    element.focus();
                                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                }
                                return;
                            }
                        }
                        continue;
                    }
                    if (this.formResponses[q.id] === undefined) {
                        showToast(`Por favor responde la pregunta: "${q.text.substring(0, 30)}..."`, "error");
                        return;
                    }
                }

                let scoreSum = 0;
                let scoreCount = 0;
                Object.entries(this.formResponses).forEach(([qId, value]) => {
                    const questionObj = questions.find(q => q.id == qId);
                    if (!questionObj) return;
                    const numVal = this.getNumericalValue(questionObj.type, value);
                    if (numVal !== null) {
                        scoreSum += numVal;
                        scoreCount++;
                    }
                });
                const promedioCalculado = scoreCount > 0 ? (scoreSum / scoreCount).toFixed(2) : "0.00";

                const payload = {
                    Fecha: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' }),
                    studentRole: this.currentUser.role,
                    studentEmail: this.currentUser.email || "Anónimo",
                    teacherId: teacher.id,
                    teacherName: teacher.name,
                    promedio: promedioCalculado,
                    responses: this.formResponses,
                    studentGrade: this.currentUser.grade || "N/A",
                    studentGroup: this.currentUser.group || "N/A"
                };

                appSubmissions.push(payload);

                if (GOOGLE_SHEETS_API_URL && GOOGLE_SHEETS_API_URL.trim() !== '') {
                    showToast("Sincronizando evaluación...", "info");
                    try {
                        await fetch(GOOGLE_SHEETS_API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payload)
                        });
                        showToast("¡Evaluación enviada con éxito!", "success");
                    } catch (err) {
                        console.error("Error al sincronizar con Sheets:", err);
                        showToast("Guardado localmente de forma segura.", "info");
                    }
                } else {
                    showToast("¡Evaluación completada con éxito!", "success");
                }

                if (!this.hasAnsweredGeneralQuestions) {
                    this.hasAnsweredGeneralQuestions = true;
                }

                this.evaluatedTeachers.push(teacher.id);

                const activeTeachers = appTeachers.filter(t => this.checkTeacherLevel(t.levels, this.currentUser.role) && !this.hiddenTeachers.includes(t.id));
                const allDone = activeTeachers.every(t => this.evaluatedTeachers.includes(t.id));

                if (allDone && activeTeachers.length > 0) {
                    this.showCompletionCelebration = true;
                }

                this.navigate('portal');
            },

                this.showCompletionCelebration = false;
                this.hasSeenCelebration = true;
                this.render();
            },

                    return;
                }
                aprendiMasTxt = aprendiList.join(", ");
                clasesMejorarTxt = mejorarList.join(", ");

                if (dirOptsSelected.length === 0) {
                    showToast("Por favor responde la Sección de la Dirección", "error");
                    return;
                }

                let maestrosIncompletos = [];
                const questions = MOCK_QUESTIONS[this.currentUser.role];
                
                this.selectedTeachersSec.forEach(teacherId => {
                    const ans = this.secAnswers[teacherId] || {};
                    const respondidas = Object.keys(ans).filter(qId => ans[qId] !== undefined).length;
                    if (respondidas < questions.length) {
                        const tObj = appTeachers.find(t => t.id === teacherId) || FALLBACK_TEACHERS.find(t => t.id === teacherId);
                        maestrosIncompletos.push(app.getTeacherCleanName(tObj.name));
                    }
                });

                if (maestrosIncompletos.length > 0) {
                    showToast("Falta responder todas las preguntas.", "error");

                }

                showToast("Enviando todas tus evaluaciones...", "info");

                let lotePayload = [];

                for (let i = 0; i < this.selectedTeachersSec.length; i++) {
                    const teacherId = this.selectedTeachersSec[i];
                    
                    let teacher = appTeachers.find(t => t.id === teacherId) || FALLBACK_TEACHERS.find(t => t.id === teacherId) || { id: teacherId, name: "Docente #" + teacherId };
                    
                    let sum = 0;
                    const ans = this.secAnswers[teacherId];
                    Object.values(ans).forEach(val => {

                        else if (val === 'a_veces') sum += 3;
                        else sum += 1;
                    });
                    const promedioCalculado = (sum / questions.length).toFixed(2);

                    const responsesObj = {

                        aprendiMas: aprendiMasTxt,
                        clasesMejorar: clasesMejorarTxt,

                    };

                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payloadFinal)
                        });
                        showToast("¡Evaluaciones enviadas con éxito!", "success");

                        console.error("Error al sincronizar lote:", err);

                this.renderAdminCharts();

            async fetchAdminData(forceRefresh = false) {
                if (this.isFetchingAdminData) return;
                
                this.isFetchingAdminData = true;
                this.logDebug("Iniciando conexión con base de datos real de Google Drive...", "info");
                
                const syncBtn = document.getElementById('sync-nube-btn');
                if (syncBtn) syncBtn.classList.add('animate-spin', 'text-amber-500');

                if (GOOGLE_SHEETS_API_URL && GOOGLE_SHEETS_API_URL.trim() !== '') {
                    try {
                        const response = await this.fetchWithTimeout(GOOGLE_SHEETS_API_URL + "?action=getSubmissions", {}, 15000);
                        const data = await response.json();
                        
                        if (data && data.submissions && data.submissions.length > 0) {
                            this.adminSubmissions = data.submissions;
                            this.logDebug(`Conectado de forma exitosa. Se recuperaron ${data.submissions.length} registros reales en el sistema.`, "success");
                            if (forceRefresh) {
                                showToast("¡Base de datos sincronizada con Sheets!", "success");
                            }
                        } else {
                            this.adminSubmissions = MOCK_SUBMISSIONS;
                            this.logDebug("La conexión fue exitosa, pero la hoja está vacía. Cargando datos simulados para análisis.", "info");
                        }
                    } catch (e) {
                        this.adminSubmissions = MOCK_SUBMISSIONS;
                        this.logDebug(`Error de enlace o timeout: ${e.message}. Cargando base de datos de respaldo.`, "error");
                        if (forceRefresh) {
                            showToast("Error de conexión al sincronizar", "error");
                        }
                    }
                } else {
                    this.adminSubmissions = MOCK_SUBMISSIONS;
                    this.logDebug("Modo simulación: Cargando base de datos interna.", "info");
                }
                
                this.isFetchingAdminData = false;
                if (syncBtn) syncBtn.classList.remove('animate-spin', 'text-amber-500');
                this.renderAdminCharts();
            },

            getNumericalValue(qType, value) {
                if (value === undefined || value === null || value === "") return null;
                
                let parsed = parseInt(value);
                if (!isNaN(parsed) && parsed >= 1 && parsed <= 5) {
                    return parsed;
                }
                
                let valStr = String(value).toLowerCase().trim()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "") 
                    .replace(/[^a-z0-9\s]/g, "");    
                
                if (valStr.includes('siempre') || valStr === 'si' || valStr === 'yes' || valStr === 'always' || valStr === 's') return 5;
                if (valStr.includes('veces') || valStr.includes('regular') || valStr === 'sometimes' || valStr === 'aveces') return 3;
                if (valStr.includes('nunca') || valStr === 'no' || valStr === 'never' || valStr === 'n') return 1;
                
                return null;
            },

            renderAdminCharts() {
                const resultsContainer = document.getElementById('admin-results');
                if (!resultsContainer) return;

                // FUNCIÓN AUXILIAR PARA PREVENIR EL CRASH DE GRÁFICAS (Mapea llaves de respuestas a preguntas reales)
                const findQuestionByKey = (questions, key) => {
                    let cleanKey = String(key).toLowerCase().replace(/[^0-9]/g, '');
                    if (cleanKey !== '') {
                        let idNum = parseInt(cleanKey);
                        let found = questions.find(q => q.id === idNum);
                        if (found) return found;
                    }
                    return questions.find(q => String(q.id).toLowerCase().trim() === String(key).toLowerCase().trim());
                };

                let filtered = this.adminSubmissions || [];
                const filterLevelNorm = String(this.adminFilterLevel).toLowerCase().trim();

                if (this.adminFilterLevel !== 'todos') {
                    filtered = filtered.filter(s => {
                        const subRole = String(s.studentRole || '').toLowerCase().replace(/[^a-z0-9]/g, '');
                        const targetRole = filterLevelNorm.replace(/[^a-z0-9]/g, '');
                        if (targetRole === 'primariaalta' && subRole === 'primaria') return true;
                        return subRole === targetRole;
                    });
                }
                if (this.adminFilterTeacher !== 'todos') {
                    filtered = filtered.filter(s => String(s.teacherId || '').trim() === String(this.adminFilterTeacher).trim());
                }
                if (this.adminFilterGrade !== 'todos') {
                    filtered = filtered.filter(s => String(s.studentGrade || '').toLowerCase().trim() === String(this.adminFilterGrade).toLowerCase().trim());
                }
                if (this.adminFilterGroup !== 'todos') {
                    filtered = filtered.filter(s => String(s.studentGroup || '').toLowerCase().trim() === String(this.adminFilterGroup).toLowerCase().trim());
                }

                if (filtered.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="p-12 text-center bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                            <i class="fas fa-chart-line text-5xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium text-lg">No hay suficientes registros para el cruce de filtros seleccionado.</p>
                        </div>
                    `;
                    this.logDebug("Consulta vacía: No se encontraron respuestas con los filtros actuales.", "info");
                    return;
                }

                let totalScore = 0;
                let validAnswersCount = 0;
                let teacherScores = {}; 
                let questionScores = {}; 
                let teacherVotesCount = {};

                filtered.forEach(sub => {
                    const cleanRole = String(sub.studentRole || '').toLowerCase().replace(/[^a-z0-9]/g, '');
                    let questionRole = 'secundaria'; 
                    if (cleanRole === 'primariabaja') questionRole = 'primaria_baja';
                    else if (cleanRole === 'primariaalta' || cleanRole === 'primaria') questionRole = 'primaria_alta';
                    else if (cleanRole === 'secundaria') questionRole = 'secundaria';
                    else if (cleanRole === 'bachillerato') questionRole = 'bachillerato';
                    else if (cleanRole === 'coordinadores') questionRole = 'coordinadores';
                    else if (cleanRole === 'directores') questionRole = 'directores';
                    
                    const questions = MOCK_QUESTIONS[questionRole] || [];
                    
                    let rResponses = sub.responses;
                    if (typeof rResponses === 'string') {
                        try {
                            rResponses = JSON.parse(rResponses);
                            if (typeof rResponses === 'string') {
                                rResponses = JSON.parse(rResponses);
                            }
                        } catch (e) {
                            rResponses = {};
                        }
                    }

                    const teacherName = sub.teacherName || "Docente Desconocido";
                    
                    teacherVotesCount[teacherName] = (teacherVotesCount[teacherName] || 0) + 1;

                    Object.entries(rResponses || {}).forEach(([qId, value]) => {
                        const questionObj = findQuestionByKey(questions, qId);
                        if (!questionObj) return;

                        const numVal = this.getNumericalValue(questionObj.type, value);
                        if (numVal !== null) {
                            totalScore += numVal;
                            validAnswersCount++;

                            if (!teacherScores[teacherName]) {
                                teacherScores[teacherName] = { sum: 0, count: 0 };
                            }
                            teacherScores[teacherName].sum += numVal;
                            teacherScores[teacherName].count++;

                            const qKey = `Pregunta ${questionObj.id}`;
                            if (!questionScores[qKey]) {
                                questionScores[qKey] = { sum: 0, count: 0 };
                            }
                            questionScores[qKey].sum += numVal;
                            questionScores[qKey].count++;
                        }
                    });
                });

                let globalAverage = validAnswersCount > 0 ? (totalScore / validAnswersCount).toFixed(2) : "0.00";

                let topTeacher = "N/A";
                let topTeacherAvg = 0;
                Object.entries(teacherScores).forEach(([name, data]) => {
                    const avg = data.sum / data.count;
                    if (avg > topTeacherAvg) {
                        topTeacherAvg = avg;

                            <div>
                                <div class="flex justify-between items-center opacity-85 mb-2 text-xs font-bold uppercase tracking-wider">Promedio Global</div>
                                <div class="flex items-baseline gap-2">
                                    <span class="text-4xl font-extrabold">${globalAverage}</span>
                                    <span class="text-sm opacity-90">/ 5.0</span>
                                </div>
                            </div>
                            <p class="text-[11px] text-blue-200 mt-3 font-medium border-t border-white/15 pt-2">Calificación media de toda la sección seleccionada</p>
                        </div>
                        
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                            <div>
                                <div class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Participación de Alumnos</div>
                                <span class="text-4xl font-extrabold text-slate-900">${filtered.length}</span>
                            </div>
                            <p class="text-[11px] text-slate-400 mt-3 font-medium border-t border-slate-100 pt-2">
                                ${appEmails.length > 0 
                                    ? `Representa el <strong class="text-slate-600">${((filtered.length / appEmails.length) * 100).toFixed(1)}%</strong> del padrón (${appEmails.length} correos)` 
                                    : 'Encuestas registradas en el sistema de base de datos'}
                            </p>
                        </div>
                        
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                            <div>
                                <div class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Docente Líder (Desempeño)</div>
                                <span class="text-lg font-extrabold text-emerald-600 block truncate" title="${topTeacher}">${topTeacher}</span>
                            </div>

                                <span>Promedio: <strong class="text-emerald-700">${topTeacherAvg.toFixed(2)} ★</strong></span>
                                <span class="text-slate-400">|</span>
                                <span><strong>${teacherVotesCount[topTeacher] || 0}</strong> eval.</span>
                            </div>
                        </div>
                        
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                            <div>
                                <div class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Mayor Muestra (Tráfico)</div>
                                <span class="text-lg font-extrabold text-blue-600 block truncate" title="${mostEvaluatedTeacher}">${mostEvaluatedTeacher}</span>
                            </div>
                            <div class="text-[11px] text-slate-600 mt-2 font-medium bg-blue-50 px-2.5 py-1.5 rounded-lg border border-blue-100/60 flex items-center justify-between">
                                <span>Cantidad: <strong class="text-blue-700">${maxEvaluations} encuestas</strong></span>
                                <span class="text-slate-400">|</span>
                                <span class="text-blue-700 font-bold">${filtered.length > 0 ? ((maxEvaluations / filtered.length) * 100).toFixed(0) : 0}%</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h4 class="font-bold text-slate-800 text-base mb-4">Promedio de Desempeño por Docente/Coordinador</h4>
                            <div class="relative h-64 w-full">
                                <canvas id="chart-docentes"></canvas>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="font-bold text-slate-800 text-base">Análisis por Pregunta (Fortalezas)</h4>
                                <div class="flex items-center gap-4 text-[10px] font-bold uppercase tracking-wider select-none">
                                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-[#ef4444] inline-block"></span> Nunca</span>
                                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-[#f97316] inline-block"></span> Regular</span>
                                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-[#10b981] inline-block"></span> Siempre</span>
                                </div>
                            </div>
                            <div class="relative h-[32rem] w-full">
                                <canvas id="chart-preguntas"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Bitácora de Registro de Alumnos Evaluadores -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
                        <h4 class="font-bold text-slate-800 text-base mb-4 flex items-center gap-2">
                            <i class="fas fa-id-card text-primary"></i> Registro de Participación (Alumnos Evaluadores)
                        </h4>
                        <div class="max-h-60 overflow-y-auto border border-slate-100 rounded-xl shadow-inner">
                            <table class="min-w-full divide-y divide-slate-200">
                                <thead class="bg-slate-50 sticky top-0 z-10">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Correo del Evaluador</th>
                                        <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Grado / Grupo</th>
                                        <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Fecha de Envío</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-slate-100">
                                    ${filtered.map(sub => `
                                        <tr class="hover:bg-slate-50 transition-colors">
                                            <td class="px-6 py-3.5 whitespace-nowrap text-sm font-semibold text-slate-700">${sub.studentEmail || 'Anónimo'}</td>
                                            <td class="px-6 py-3.5 whitespace-nowrap text-xs">
                                                <span class="px-2.5 py-1 bg-blue-50 text-blue-700 font-extrabold rounded-full">${sub.studentGrade || 'N/A'} - ${(sub.studentGroup || '').replace("grupo_", "G").toUpperCase() || 'N/A'}</span>
                                            </td>
                                            <td class="px-6 py-3.5 whitespace-nowrap text-xs text-slate-500 font-mono">${sub.timestamp || 'N/A'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
                        <h4 class="font-bold text-slate-800 text-base mb-4 flex items-center gap-2">
                            <i class="fas fa-comment-dots text-primary"></i> Buzón de Sugerencias y Comentarios Libres
                        </h4>
                        <div class="max-h-60 overflow-y-auto space-y-3 pr-2">
                            ${this.renderAdminComments(filtered)}
                        </div>
                    </div>
                `;

                try {
                    this.initChartDocentes(teacherScores);
                    this.initChartPreguntas(questionScores);
                    this.logDebug("Gráficas renderizadas exitosamente con los datos filtrados en memoria local.", "success");
                } catch (error) {
                    this.logDebug(`Error de graficación: ${error.message}`, "error");
                }
            },

            renderAdminComments(filtered) {
                let commentsHTML = "";
                let hasComments = false;

                filtered.forEach(sub => {
                    let rResponses = sub.responses;
                    if (typeof rResponses === 'string') {
                        try { rResponses = JSON.parse(rResponses); } catch (e) { rResponses = {}; }
                    }

                    Object.entries(rResponses || {}).forEach(([qId, val]) => {
                        if (typeof val === 'string' && val.trim() !== "" && val.length > 5 && !['si', 'no', 'a_veces'].includes(val)) {
                            hasComments = true;
                            commentsHTML += `
                                <div class="bg-slate-50 p-3.5 rounded-xl border border-slate-100">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-xs font-bold text-primary">${sub.teacherName}</span>
                                        <span class="text-[10px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-mono">${sub.studentGrade || 'N/A'} - ${(sub.studentGroup || '').replace("grupo_", "Grupo ").toUpperCase() || 'N/A'}</span>
                                    </div>
                                    <p class="text-slate-600 text-xs italic">"${val}"</p>
                                </div>
                            `;
                        }
                    });
                });

                return hasComments ? commentsHTML : `<p class="text-gray-400 text-sm italic text-center py-6">No se encontraron comentarios abiertos en el filtro de búsqueda.</p>`;
            },

            initChartDocentes(teacherScores) {
                const ctx = document.getElementById('chart-docentes')?.getContext('2d');
                if (!ctx) return;

                const labels = Object.keys(teacherScores);
                const data = labels.map(name => {
                    const d = teacherScores[name];
                    return (d.sum / d.count).toFixed(2);
                });

                if (this.activeCharts.docentes) this.activeCharts.docentes.destroy();

                this.activeCharts.docentes = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Calificación Promedio',
                            data: data,
                            backgroundColor: 'rgba(59, 130, 246, 0.75)',
                            borderColor: 'rgba(30, 64, 175, 1)',
                            borderWidth: 1.5,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { min: 1, max: 5, ticks: { stepSize: 1 } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            },

            initChartPreguntas(questionScores) {
                const ctx = document.getElementById('chart-preguntas')?.getContext('2d');
                if (!ctx) return;

                const currentLevel = String(this.adminFilterLevel === 'todos' ? 'secundaria' : this.adminFilterLevel).toLowerCase().trim();
                const levelQuestions = MOCK_QUESTIONS[currentLevel] || [];
                const keys = Object.keys(questionScores); 

                const labels = keys.map(key => {
                    const id = parseInt(key.replace('Pregunta ', ''));
                    const questionObj = levelQuestions.find(q => q.id === id);
                    let fullText = questionObj ? (typeof questionObj === 'string' ? questionObj : (questionObj.text || "")) : key;
                    if (fullText.length > 30) {
                        return fullText.substring(0, 27) + '...';
                    }
                    return fullText;
                });

                const data = keys.map(q => {
                    const d = questionScores[q];
                    return parseFloat((d.sum / d.count).toFixed(2));
                });

                if (this.activeCharts.preguntas) this.activeCharts.preguntas.destroy();

                this.activeCharts.preguntas = new Chart(ctx, {
                    type: 'line', 
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Promedio de Aceptación',
                            data: data,
                            borderColor: '#3b82f6', 
                            borderWidth: 3,
                            tension: 0.35, 
                            fill: {
                                target: 'origin',
                                above: 'rgba(59, 130, 246, 0.04)' 
                            },
                            pointBackgroundColor: function(context) {
                                const val = context.raw;
                                if (val < 2.5) return '#ef4444';     
                                if (val < 4.0) return '#f97316';     
                                return '#10b981';                     
                            },
                            pointBorderColor: function(context) {
                                const val = context.raw;
                                if (val < 2.5) return '#b91c1c';
                                if (val < 4.0) return '#c2410c';
                                return '#047857';
                            },
                            pointBorderWidth: 2,
                            pointRadius: 7, 
                            pointHoverRadius: 10,
                            pointStyle: 'circle'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 1400, easing: 'easeOutQuart' },
                        scales: {
                            y: {
                                min: 0.5,
                                max: 5.5,
                                ticks: {
                                    stepSize: 0.5,
                                    callback: function(value) {
                                        if (value === 1) return "1.0 - Nunca";
                                        if (value === 3) return "3.0 - Regular";
                                        if (value === 5) return "5.0 - Siempre";
                                        if (Number.isInteger(value) && value >= 1 && value <= 5) {
                                            return value.toFixed(1);
                                        }
                                        return null; 
                                    }
                                }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10, weight: '600' } }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const val = context.raw;
                                        let diag = "Excelente (Siempre)";
                                        if (val < 2.5) diag = "Requiere Atención (Nunca)";
                                        else if (val < 4.0) diag = "Aceptable (Regular)";
                                        return `Promedio: ${val} (${diag})`;
                                    }
                                }
                            }
                        }
                    }
                });
            },

            toggleDebugConsole() {
                this.isConsoleExpanded = !this.isConsoleExpanded;
                const body = document.getElementById('debug-console-body');
                const chevron = document.getElementById('debug-chevron');
                if (!body || !chevron) return;
                
                if (this.isConsoleExpanded) {
                    body.style.maxHeight = '240px';
                    chevron.classList.add('rotate-180');
                } else {
                    body.style.maxHeight = '0px';
                    chevron.classList.remove('rotate-180');
                }
            },

            logDebug(msg, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                this.debugLogs.push({ msg, type, timestamp });
                this.renderDebugLogs();
            },

            clearDebugConsole() {
                this.debugLogs = [];
                this.renderDebugLogs();
            },

            renderDebugLogs() {
                const output = document.getElementById('debug-log-output');
                if (!output) return;
                output.innerHTML = '';
                
                if (this.debugLogs.length === 0) {
                    output.innerHTML = `<div class="text-slate-400 text-xs italic text-center py-4">Consola vacía. No hay eventos registrados de base de datos.</div>`;
                    return;
                }

                this.debugLogs.forEach(log => {
                    let badgeBg = 'bg-slate-100 text-slate-600 border-slate-200';
                    let textClass = 'text-slate-600';
                    let containerBg = 'bg-slate-50/50 border-slate-100';
                    let label = 'INFO';

                    if (log.type === 'error') {
                        badgeBg = 'bg-rose-100 text-rose-700 border-rose-200';
                        textClass = 'text-rose-700 font-semibold';
                        containerBg = 'bg-rose-50/30 border-rose-100/50';
                        label = 'ERROR';
                    } else if (log.type === 'success') {
                        badgeBg = 'bg-emerald-100 text-emerald-700 border-emerald-200';
                        textClass = 'text-emerald-700 font-medium';
                        containerBg = 'bg-emerald-50/30 border-emerald-100/50';
                        label = 'ÉXITO';
                    }

                    output.innerHTML += `
                        <div class="flex items-start gap-2.5 p-2 rounded-xl border ${containerBg} text-xs font-sans">
                            <span class="text-[9px] font-mono text-slate-400 shrink-0 self-center">${log.timestamp}</span>
                            <span class="px-1.5 py-0.5 border ${badgeBg} rounded-md text-[9px] font-extrabold uppercase tracking-wider shrink-0 self-center">${label}</span>
                            <span class="leading-relaxed ${textClass}">${log.msg}</span>
                        </div>
                    `;
                });
                output.scrollTop = output.scrollHeight;
            },

                const container = document.getElementById('app-container');
                const header = document.getElementById('main-header');
                const footer = document.getElementById('main-footer');
                const userInfo = document.getElementById('user-info');
                
                const previousScrollTop = container ? container.scrollTop : 0;
                const previousWindowY = window.scrollY;
                const viewChanged = this.currentView !== this.lastView;
                this.lastView = this.currentView;

                container.innerHTML = '';

                if (this.currentView === 'splash') {
                    header.classList.add('hidden');
                    if (footer) footer.classList.add('hidden');
                } else {
                    header.classList.remove('hidden');
                    if (footer) footer.classList.remove('hidden');
                }

                switch(this.currentView) {
                    case 'splash': container.innerHTML = this.views.splash(); break;
                    case 'login': container.innerHTML = this.views.login(); break;
                    case 'welcome': container.innerHTML = this.views.welcome(); break;
                    case 'portal': container.innerHTML = this.views.portal(); break;
                    case 'form': container.innerHTML = this.views.form(); break;
                    case 'sec_final': container.innerHTML = this.views.sec_final(); break;
                    case 'sec_thanks': container.innerHTML = this.views.sec_thanks(); break;
                    case 'admin': 
                        container.innerHTML = this.views.admin(); 
                        if (this.adminSubmissions.length === 0) {
                            this.fetchAdminData(); 
                        } else {
                            this.renderAdminCharts();
                        }
                        break;
                }

                if (viewChanged || this.currentView === 'form') {
                    if (container) container.scrollTop = 0;
                    window.scrollTo(0, 0);
                } else {
                    if (container) container.scrollTop = previousScrollTop;
                    window.scrollTo(0, previousWindowY);

                if (app.currentUser && this.currentView !== 'splash' && this.currentView !== 'sec_thanks') {

                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Nivel / Sector</label>
                                <select onchange="app.setAdminFilterLevel(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos" ${app.adminFilterLevel === 'todos' ? 'selected' : ''}>Todos los Niveles</option>
                                    <option value="primaria_baja" ${app.adminFilterLevel === 'primaria_baja' ? 'selected' : ''}>Primaria Baja</option>
                                    <option value="primaria_alta" ${app.adminFilterLevel === 'primaria_alta' ? 'selected' : ''}>Primaria Alta</option>
                                    <option value="secundaria" ${app.adminFilterLevel === 'secundaria' ? 'selected' : ''}>Secundaria</option>
                                    <option value="bachillerato" ${app.adminFilterLevel === 'bachillerato' ? 'selected' : ''}>Bachillerato</option>
                                    <option value="coordinadores" ${app.adminFilterLevel === 'coordinadores' ? 'selected' : ''}>Coordinadores</option>
                                    <option value="directores" ${app.adminFilterLevel === 'directores' ? 'selected' : ''}>Directores</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Grado</label>
                                <select onchange="app.setAdminFilterGrade(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    ${gradeOptionsHTML}
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Grupo</label>
                                <select onchange="app.setAdminFilterGroup(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    ${groupOptionsHTML}
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Colaborador</label>
                                <select id="admin-filter-teacher" onchange="app.setAdminFilterTeacher(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos" ${app.adminFilterTeacher === 'todos' ? 'selected' : ''}>Todos</option>
                                    ${filteredTeachersForSelect.map(t => `<option value="${t.id}" ${app.adminFilterTeacher == t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div id="admin-results">
                            <div class="text-center py-12">
                                <i class="fas fa-spinner animate-spin text-4xl text-primary mb-2"></i>
                                <p class="text-gray-500 font-medium">Calculando radiografías...</p>
                            </div>
                        </div>

                        <!-- CONSOLA DE DIAGNÓSTICO PROFESIONAL EN ACORDEÓN (ESTILO MINIMALISTA VERCEL) -->
                        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm mt-8 overflow-hidden">
                            <div onclick="app.toggleDebugConsole()" class="w-full flex items-center justify-between p-4 bg-slate-50/50 hover:bg-slate-50 transition-colors text-left border-b border-slate-100 cursor-pointer select-none">
                                <div class="flex items-center gap-2.5">
                                    <span class="flex h-2 w-2 relative">
                                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                    </span>
                                    <h4 class="font-bold text-xs text-slate-700 flex items-center gap-1.5 uppercase tracking-wider">
                                        <i class="fas fa-terminal text-slate-400 text-xs"></i> Consola de Diagnóstico de Base de Datos v4.3.3
                                    </h4>
                                </div>
                                <div class="flex items-center gap-4">
                                    <button onclick="event.stopPropagation(); app.clearDebugConsole()" class="text-slate-400 hover:text-slate-600 text-xs transition-colors p-1.5 rounded-lg hover:bg-slate-100 flex items-center gap-1 font-semibold">
                                        <i class="fas fa-trash-alt"></i> Limpiar
                                    </button>
                                    <i id="debug-chevron" class="fas fa-chevron-down text-slate-400 text-[10px] transition-transform duration-300 ${app.isConsoleExpanded ? 'rotate-180' : ''}"></i>
                                </div>
                            </div>
                            <div id="debug-console-body" class="overflow-hidden transition-all duration-300 ease-in-out bg-white" style="max-height: ${app.isConsoleExpanded ? '240px' : '0px'};">
                                <div id="debug-log-output" class="p-4 space-y-2 max-h-60 overflow-y-auto font-sans text-xs">
                                    <!-- Los logs dinámicos se cargan mediante JS -->
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                }
            }
        };

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColors = {
                success: 'bg-emerald-600',
                error: 'bg-rose-600',
                info: 'bg-slate-800'
            };
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            toast.className = `${bgColors[type] || bgColors.info} text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 text-sm font-semibold toast-enter`;
            toast.innerHTML = `
                <i class="fas ${icons[type] || icons.info} text-base"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => {
                    toast.remove();
                }, 310);
            }, 3500);
        }

        window.onload = function () {
            app.init();
        };
    </script>
</body>
</html>
