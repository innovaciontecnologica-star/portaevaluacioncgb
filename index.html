    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a', // Azul Marino Institucional CGB
                        secondary: '#3b82f6', // Azul Eléctrico
                        accent: '#f97316', // Naranja CGB
                        success: '#10b981', // Verde Éxito
                        danger: '#ef4444' // Rojo Peligro
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Animación interactiva para Bretax al finalizar la encuesta */
        @keyframes popInPoint {
            0% { transform: scale(0.6) translateY(30px); opacity: 0; }
            50% { transform: scale(1.05) translateY(-10px); opacity: 0.8; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .bretax-celebrate {
            animation: popInPoint 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* Animaciones fluidas para Toasts Informativos */
        .toast-enter { animation: toastSlideIn 0.3s ease-out forwards; }
        @keyframes toastSlideIn {
            from { transform: translateY(-100%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
</head>

        // --- CONTROLADOR DE VISTAS PRINCIPALES ---
        const views = {
            renderLogin: function() {

                                </div>

            handleLoginRoleChange: function(role) {

                    return;

                let listHtml = "";
                teachers.forEach((t, index) => {
                    const evaluated = JSON.parse(localStorage.getItem('evaluated_teachers') || '[]');

                    listHtml += `

                        <div class="flex items-center gap-3">

                                <h4 class="font-bold text-slate-800 text-sm">${t.name}</h4>
                                <span class="text-[10px] bg-slate-200/60 text-slate-500 px-2 py-0.5 rounded-full font-bold uppercase tracking-wide">ID: ${t.id}</span>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            ${isCompleted ? `
                                <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-xl flex items-center gap-1.5"><i class="fas fa-check-circle"></i> Evaluado</span>
                            ` : `
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="teacher-toggle-${t.id}" checked class="sr-only peer">
                                    <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                                    <span class="ml-2 text-xs font-semibold text-slate-500 select-none hidden sm:inline">Evaluar</span>
                                </label>
                            `}
                        </div>
                    </div>
                    `;
                });

                container.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 p-8 fade-in">
                    <div class="mb-6">
                        <h3 class="text-xl font-bold text-slate-800">Saneamiento Académico</h3>
                        <p class="text-sm text-slate-500 mt-1">Por favor desmarca los profesores que NO te dieron clases en este semestre escolar actual.</p>
                    </div>
                    
                    <div class="space-y-3 max-h-[45vh] overflow-y-auto pr-2 mb-8">
                        ${listHtml}
                    </div>

                    <div class="flex items-center justify-between border-t border-slate-100 pt-6">
                        <button onclick="app.logout()" class="px-5 py-3 text-slate-500 font-semibold text-sm hover:text-slate-800 transition-all">Cancelar</button>
                        <button onclick="views.startEvaluationFlow()" class="bg-primary hover:bg-blue-800 text-white font-bold px-6 py-3.5 rounded-xl shadow-lg shadow-blue-800/15 transition-all duration-150 flex items-center gap-2 text-sm">
                            <span>Comenzar Evaluación</span>
                            <i class="fas fa-play text-xs"></i>
                        </button>
                    </div>
                </div>
                `;
            },

            startEvaluationFlow: function() {
                const checkedTeachers = [];
                appTeachers.forEach(t => {
                    const checkbox = document.getElementById(`teacher-toggle-${t.id}`);
                    const evaluated = JSON.parse(localStorage.getItem('evaluated_teachers') || '[]');
                    
                    if (evaluated.includes(t.id)) {
                        // Ya evaluado, se omite
                        return;
                    }
                    if (checkbox && checkbox.checked) {
                        checkedTeachers.push(t);
                    }
                });

                if (checkedTeachers.length === 0) {
                    ui.showToast("Debes elegir al menos un docente para evaluar.", "error");
                    return;
                }

                // Guardar profesores en curso en almacenamiento de sesión temporal
                sessionStorage.setItem('cgb_active_teachers', JSON.stringify(checkedTeachers));
                sessionStorage.setItem('cgb_current_index', '0');
                
                this.loadEvaluationCard();
            },

            loadEvaluationCard: function() {
                const activeTeachers = JSON.parse(sessionStorage.getItem('cgb_active_teachers') || '[]');
                const currentIndex = parseInt(sessionStorage.getItem('cgb_current_index') || '0');
                
                if (currentIndex >= activeTeachers.length) {
                    app.showSuccessScreen();
                    return;

                const currentTeacher = activeTeachers[currentIndex];

            handleCardSubmit: function() {
                const activeTeachers = JSON.parse(sessionStorage.getItem('cgb_active_teachers') || '[]');
                const currentIndex = parseInt(sessionStorage.getItem('cgb_current_index') || '0');
                const currentTeacher = activeTeachers[currentIndex];
                
                const form = document.getElementById('evaluation-card-form');
                const formData = new FormData(form);
                const responses = {};

                // Extraer preguntas
                const questions = evaluationQuestions[currentStudentInfo.role.includes('primaria') ? 'primaria' : currentStudentInfo.role] || evaluationQuestions.secundaria;
                let isValid = true;

                questions.forEach(q => {
                    const val = formData.get(`q-${q.id}`);
                    if (!val) {
                        isValid = false;
                        return;
                    }
                    responses[q.id] = val;
                });

                if (!isValid) {
                    ui.showToast("Por favor califica todas las preguntas para continuar.", "error");
                    return;
                }

                // Extraer comentarios cualitativos
                if (currentStudentInfo.role.includes('primaria')) {
                    responses["10"] = formData.get("extra-10") || "";
                    responses["11"] = formData.get("extra-11") || "";
                    responses["12"] = formData.get("extra-12") || "";
                } else if (currentStudentInfo.role === 'secundaria' || currentStudentInfo.role === 'bachillerato') {
                    responses["aprendiMas"] = formData.get("extra-aprendiMas") || "";
                    responses["clasesMejorar"] = formData.get("extra-clasesMejorar") || "";
                    responses["comentarioLibre"] = formData.get("extra-comentarioLibre") || "";
                } else if (currentStudentInfo.role === 'coordinadores' || currentStudentInfo.role === 'directores') {
                    responses["9"] = formData.get("extra-9") || "";
                    responses["10"] = formData.get("extra-10") || "";
                    responses["11"] = formData.get("extra-11") || "";
                }

                // Guardar localmente y avanzar
                app.submitTeacherEvaluation(currentTeacher.id, responses, currentIndex, activeTeachers.length);
            },

                        ui.showToast('Clave de administrador incorrecta', 'error');
                    }
                    return;
                }

                // Capturar datos extra si es Primaria Baja

                let studentGrade = "N/A";
                let studentGroup = "N/A";

                if (role === 'primaria_baja') {
                    const inputName = document.getElementById('login-student-name').value.trim();

                    const selectGroup = document.getElementById('login-student-group').value;

                        ui.showToast('¡Por favor escribe tu nombre, y elige tu grado y grupo!', 'error');
                        return;
                    }
                    studentName = inputName;
                    studentGrade = selectGrade;
                    studentGroup = selectGroup;
                }

                // Correo por defecto si Primaria Baja no escribe uno
                const finalEmail = (role === 'primaria_baja' && !emailInput) ? `primaria.${studentGrade.replace('º','')}${studentGroup.toLowerCase()}@cgb.edu.mx` : emailInput.toLowerCase();

                // Validación de bypass de correos institucionales
                const bypassEmails = ['sir.artorio@gmail.com', 'coord.academica@cgb.edu.mx'];
                const isBypass = bypassEmails.includes(finalEmail);

                // Comprobar si el correo está autorizado
                if (appEmails.length > 0 && !isBypass && role !== 'primaria_baja') {
                    if (!appEmails.includes(finalEmail)) {
                        ui.showToast('Tu correo no se encuentra en el padrón autorizado', 'error');
                        return;
                    }
                    // Validar si tiene nivel restringido en la base
                    const authorizedLevel = appEmailsLevels[finalEmail];
                    if (authorizedLevel && authorizedLevel !== 'todos') {
                        if (authorizedLevel !== role && !(authorizedLevel === 'primaria' && (role === 'primaria_baja' || role === 'primaria_alta'))) {
                            ui.showToast(`Tu correo está asignado únicamente al nivel: ${authorizedLevel.toUpperCase()}`, 'error');

                    }

                // Sincronizar estado global
                currentStudentInfo = {
                    email: finalEmail,
                    role: role,
                    grade: studentGrade,
                    group: studentGroup,
                    name: studentName
                };

                // Guardar sesión y proceder
                localStorage.setItem('cgb_session', JSON.stringify(currentStudentInfo));

                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('header-role').innerText = role.toUpperCase().replace('_', ' ');
                document.getElementById('header-email').innerText = role === 'primaria_baja' ? studentName : finalEmail;
                document.getElementById('main-footer').classList.remove('hidden');

                this.loadEvaluationFlow();
            },

            loadEvaluationFlow: function() {
                ui.showLoadingOverlay(true, "Conectando al servidor...");
                
                // 1. Intentar conectarse a la API de Drive para traer docentes y padrón real
                if (GOOGLE_SHEETS_API_URL) {
                    fetch(`${GOOGLE_SHEETS_API_URL}?action=getInitialData`)
                    .then(res => res.json())
                    .then(data => {
                        ui.showLoadingOverlay(false);
                        if (data.status === 'SUCCESS') {
                            appTeachers = data.teachers || [];
                            appEmails = data.emails || [];
                            appEmailsLevels = data.emailLevels || {};
                            
                            // Filtrar docentes asignados al nivel del alumno
                            const filtered = this.filterTeachersByLevel(appTeachers, currentStudentInfo.role);
                            views.renderSetupFlow(filtered);
                        } else {
                            ui.showToast("Error de conexión. Se activará la simulación de contingencia local.", "error");
                            this.loadLocalSimulationFlow();
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        ui.showLoadingOverlay(false);
                        ui.showToast("Modo sin conexión. Cargando datos locales.", "info");
                        this.loadLocalSimulationFlow();
                    });
                } else {
                    ui.showLoadingOverlay(false);
                    this.loadLocalSimulationFlow();
                }
            },

            filterTeachersByLevel: function(teachers, role) {
                return teachers.filter(t => {
                    if (role === 'primaria_baja') return t.levels.includes('primaria_baja') || t.levels.includes('primaria');
                    if (role === 'primaria_alta') return t.levels.includes('primaria_alta') || t.levels.includes('primaria');
                    if (role === 'secundaria') return t.levels.includes('secundaria');
                    if (role === 'bachillerato') return t.levels.includes('bachillerato');
                    if (role === 'coordinadores') return t.levels.includes('coordinadores');
                    if (role === 'directores') return t.levels.includes('directores');
                    return false;
                });
            },

            submitTeacherEvaluation: function(teacherId, responses, cardIndex, totalCards) {
                ui.showLoadingOverlay(true, "Guardando evaluación en la nube...");
                
                const payload = {
                    studentEmail: currentStudentInfo.email,
                    studentRole: currentStudentInfo.role,
                    studentGrade: currentStudentInfo.grade !== "N/A" ? currentStudentInfo.grade : "N/A",
                    studentGroup: currentStudentInfo.group !== "N/A" ? currentStudentInfo.group : "N/A",
                    studentName: currentStudentInfo.name,
                    teacherId: teacherId,
                    responses: responses,
                    Fecha: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' })
                };

                // Calcular promedio escalar si aplica
                let sum = 0;
                let count = 0;
                for (let key in responses) {
                    const val = parseInt(responses[key]);
                    if (!isNaN(val) && key !== "aprendiMas" && key !== "clasesMejorar" && key !== "direccionDesempeno" && key !== "comentarioLibre" && key !== "10" && key !== "11" && key !== "12") {
                        sum += val;
                        count++;
                    }
                }
                payload.promedio = count > 0 ? (sum / count).toFixed(2) : "0.00";

                const finishHandler = () => {
                    ui.showLoadingOverlay(false);
                    ui.showToast("¡Evaluación enviada con éxito!", "success");
                    
                    // Marcar como completo en el almacenamiento temporal de sesión
                    let evaluated = JSON.parse(localStorage.getItem('evaluated_teachers') || '[]');
                    if (!evaluated.includes(teacherId)) {
                        evaluated.push(teacherId);
                        localStorage.setItem('evaluated_teachers', JSON.stringify(evaluated));
                    }

                    // Determinar si es el último profesor del lote
                    if (cardIndex + 1 >= totalCards) {
                        this.showSuccessScreen();
                    } else {
                        // Siguiente tarjeta
                        sessionStorage.setItem('cgb_current_index', (cardIndex + 1).toString());
                        views.loadEvaluationCard();
                    }
                };

                if (GOOGLE_SHEETS_API_URL) {
                    fetch(GOOGLE_SHEETS_API_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Modo seguro sin problemas de CORS
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                    .then(() => {
                        finishHandler();
                    })
                    .catch(err => {
                        console.error("Error al enviar", err);
                        finishHandler();
                    });
                } else {
                    // Modo simulación local activa
                    setTimeout(() => {
                        finishHandler();
                    }, 1000);
                }
            },

            showSuccessScreen: function() {
                const container = document.getElementById('app-container');
                
                // Mostrar Bretax especial si el perfil de salida es Primaria Baja o Primaria Alta
                if (currentStudentInfo.role === 'primaria_baja' || currentStudentInfo.role === 'primaria_alta') {

            populateDashboardFilters: function() {
                const filterGrade = document.getElementById('filter-grade');
                const filterTeacher = document.getElementById('filter-teacher');

                // Obtener grados y maestros únicos de los envíos
                const uniqueGrades = [...new Set(appSubmissions.map(s => s.studentGrade).filter(g => g !== "N/A" && g !== ""))];
                const uniqueTeachers = [...new Set(appSubmissions.map(s => s.teacherName))];

                filterGrade.innerHTML = '<option value="todos">Todos los Grados</option>';
                uniqueGrades.forEach(g => {
                    filterGrade.innerHTML += `<option value="${g}">${g}</option>`;
                });

                filterTeacher.innerHTML = '<option value="todos">Todos los Colaboradores</option>';
                uniqueTeachers.forEach(t => {
                    filterTeacher.innerHTML += `<option value="${t}">${t}</option>`;
                });
            },

            applyDashboardFilters: function() {
                const levelVal = document.getElementById('filter-level').value;
                const gradeVal = document.getElementById('filter-grade').value;
                const groupVal = document.getElementById('filter-group').value;
                const teacherVal = document.getElementById('filter-teacher').value;

                // Filtrar envíos de forma dinámica
                const filtered = appSubmissions.filter(s => {
                    const matchLevel = levelVal === 'todos' || s.studentRole === levelVal || (levelVal === 'primaria_alta' && s.studentRole === 'primaria_alta') || (levelVal === 'primaria_baja' && s.studentRole === 'primaria_baja');
                    const matchGrade = gradeVal === 'todos' || s.studentGrade === gradeVal;
                    const matchGroup = groupVal === 'todos' || s.studentGroup === groupVal;
                    const matchTeacher = teacherVal === 'todos' || s.teacherName === teacherVal;
                    return matchLevel && matchGrade && matchGroup && matchTeacher;
                });

                this.updateDashboardAnalytics(filtered);
            },

            updateDashboardAnalytics: function(filteredData) {
                // Calcular Promedio Global
                let totalScore = 0;
                let validCount = 0;
                
                filteredData.forEach(s => {
                    const prom = parseFloat(s.promedio);
                    if (!isNaN(prom) && prom > 0) {
                        totalScore += prom;
                        validCount++;
                    }
                });

                const averageGlobal = validCount > 0 ? (totalScore / validCount).toFixed(2) : "0.00";
                document.getElementById('kpi-average').innerText = averageGlobal;
                document.getElementById('kpi-total-votes').innerText = filteredData.length;

                // Calcular Docente de Mejor Desempeño y Tráfico
                const teacherAnalytics = {};
                filteredData.forEach(s => {
                    if (!teacherAnalytics[s.teacherName]) {
                        teacherAnalytics[s.teacherName] = { scoreSum: 0, count: 0 };
                    }
                    const prom = parseFloat(s.promedio);
                    if (!isNaN(prom)) {
                        teacherAnalytics[s.teacherName].scoreSum += prom;
                        teacherAnalytics[s.teacherName].count++;
                    }
                });

                let bestTeacherName = "N/A";
                let bestTeacherAvg = 0;
                let bestTeacherCount = 0;

                let highTrafficName = "N/A";
                let highTrafficCount = 0;

                for (let name in teacherAnalytics) {
                    const data = teacherAnalytics[name];
                    const avg = data.scoreSum / data.count;
                    if (avg > bestTeacherAvg) {
                        bestTeacherAvg = avg;
                        bestTeacherName = name;
                        bestTeacherCount = data.count;
                    }
                    if (data.count > highTrafficCount) {
                        highTrafficCount = data.count;
                        highTrafficName = name;
                    }
                }

                document.getElementById('kpi-top-teacher').innerText = bestTeacherName;
                document.getElementById('kpi-top-teacher-stats').innerText = bestTeacherName !== "N/A" ? `Promedio: ${bestTeacherAvg.toFixed(2)} ★ | ${bestTeacherCount} eval.` : "Promedio: 0.00 | 0 eval.";

                const trafficPercentage = filteredData.length > 0 ? ((highTrafficCount / filteredData.length) * 100).toFixed(0) : 0;
                document.getElementById('kpi-top-traffic').innerText = highTrafficName;
                document.getElementById('kpi-top-traffic-stats').innerText = highTrafficName !== "N/A" ? `Cantidad: ${highTrafficCount} encuestas | ${trafficPercentage}%` : "Cantidad: 0 encuestas | 0%";

                // Renderizar gráficos de barras y de líneas
                this.renderBarChart(teacherAnalytics);
                this.renderLineChart(filteredData);
                this.renderCommentsList(filteredData);
            },

            renderBarChart: function(teacherAnalytics) {
                const ctx = document.getElementById('chart-teachers-bar').getContext('2d');
                
                if (window.barChartInstance) {
                    window.barChartInstance.destroy();
                }

                const labels = [];
                const dataValues = [];

                for (let name in teacherAnalytics) {
                    labels.push(name);
                    dataValues.push((teacherAnalytics[name].scoreSum / teacherAnalytics[name].count).toFixed(2));
                }

                window.barChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Calificación Promedio',
                            data: dataValues,
                            backgroundColor: '#1e3a8a',
                            borderRadius: 12,
                            maxBarThickness: 32
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: { min: 1, max: 5 }
                        }
                    }
                });
            },

            renderLineChart: function(submissions) {
                const ctx = document.getElementById('chart-questions-line').getContext('2d');
                
                if (window.lineChartInstance) {
                    window.lineChartInstance.destroy();
                }

                const questionSums = {};
                const questionCounts = {};

                submissions.forEach(s => {
                    const responses = s.responses || {};
                    for (let qId in responses) {
                        const score = parseInt(responses[qId]);
                        // Ignorar preguntas cualitativas
                        if (!isNaN(score) && qId !== "aprendiMas" && qId !== "clasesMejorar" && qId !== "direccionDesempeno" && qId !== "comentarioLibre" && qId !== "10" && qId !== "11" && qId !== "12") {
                            if (!questionSums[qId]) {
                                questionSums[qId] = 0;
                                questionCounts[qId] = 0;
                            }
                            questionSums[qId] += score;
                            questionCounts[qId]++;
                        }
                    }
                });

                const labels = [];
                const dataValues = [];

                // Ordenar preguntas de forma ascendente
                const sortedKeys = Object.keys(questionSums).sort((a, b) => parseInt(a) - parseInt(b));
                sortedKeys.forEach(k => {
                    labels.push(`Pregunta ${k}`);
                    dataValues.push((questionSums[k] / questionCounts[k]).toFixed(2));
                });

                window.lineChartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: dataValues,
                            borderColor: '#1e3a8a',
                            borderWidth: 3,
                            backgroundColor: 'rgba(30, 58, 138, 0.05)',
                            fill: true,
                            tension: 0.3,
                            pointBackgroundColor: '#f97316',
                            pointHoverRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: { min: 1, max: 5 }
                        }
                    }
                });
            },

            renderCommentsList: function(submissions) {
                const container = document.getElementById('comments-list-container');
                let count = 0;
                let html = "";

                // Función auxiliar para recuperar el texto explicativo de las preguntas cualitativas abiertas
                const getOpenQuestionLabel = (role, key) => {
                    const cleanRole = String(role).toLowerCase().trim();
                    const cleanKey = String(key).trim();
                    
                    if (cleanRole.includes('primaria')) {
                        if (cleanKey === "10") return "🎈 Lo que más me gusta de su clase";
                        if (cleanKey === "11") return "⚡ Lo que creo que podría mejorar";
                        if (cleanKey === "12" || cleanKey === "comentarioLibre") return "💬 Comentario libre o dedicatoria";
                    } else if (cleanRole === 'secundaria' || cleanRole === 'bachillerato') {
                        if (cleanKey === "aprendiMas") return "📘 Temas o actividades donde aprendió más";
                        if (cleanKey === "clasesMejorar") return "🛠️ Sugerencias para enriquecer la materia";
                        if (cleanKey === "comentarioLibre") return "🤝 Comentario libre o relación docente";
                    } else if (cleanRole === 'coordinadores' || cleanRole === 'directores') {
                        if (cleanKey === "9") return "💎 Principales Fortalezas en su Gestión Académica";
                        if (cleanKey === "10") return "🌱 Áreas de Oportunidad y Propuestas de Mejora";
                        if (cleanKey === "11") return "💬 Comentarios Generales";
                    }
                    return `Pregunta Abierta (${key})`;
                };

                submissions.forEach(s => {
                    const responses = s.responses || {};
                    for (let key in responses) {
                        // Buscar respuestas cualitativas de texto que no sean números
                        if (key === "aprendiMas" || key === "clasesMejorar" || key === "comentarioLibre" || key === "9" || key === "10" || key === "11" || key === "12") {
                            const commentText = responses[key];
                            if (commentText && commentText.toString().trim().length > 3) {
                                count++;
                                const questionLabel = getOpenQuestionLabel(s.studentRole, key);
                                html += `
                                <div class="bg-slate-50 hover:bg-slate-100/70 p-5 rounded-2xl border border-slate-100 transition-all">
                                    <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
                                        <div class="flex items-center gap-2">
                                            <span class="w-2.5 h-2.5 bg-orange-500 rounded-full"></span>
                                            <span class="text-xs font-bold text-slate-700">${s.teacherName}</span>
                                        </div>
                                        <div class="flex items-center gap-1.5 text-[10px] font-bold text-slate-400 uppercase tracking-wide">
                                            <span>${s.studentGrade || 'N/A'}</span>
                                            <span>•</span>
                                            <span>Grupo ${s.studentGroup || 'N/A'}</span>
                                            <span>•</span>
                                            <span>${s.timestamp.split(' ')[0]}</span>
                                        </div>
                                    </div>
                                    <p class="text-xs font-extrabold text-blue-800 uppercase tracking-wider mb-1">${questionLabel}</p>
                                    <p class="text-xs text-slate-600 font-semibold italic">"${commentText.toString().trim()}"</p>
                                </div>
                                `;
                            }
                        }
                    }
                });

                document.getElementById('comments-count').innerText = `${count} aportes`;
                
                if (count === 0) {
                    container.innerHTML = `
                    <div class="text-center py-10 text-slate-400">
                        <i class="far fa-comments text-3xl mb-2 block"></i>
                        <p class="text-xs font-semibold">No se encontraron comentarios cualitativos en esta selección.</p>
                    </div>
                    `;
                } else {
                    container.innerHTML = html;
                }
            }
        };

        // --- SISTEMA GLOBAL DE INTERFAZ DE USUARIO (UI) ---
        const ui = {
            showToast: function(message, type = 'success') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast-enter p-4 rounded-2xl shadow-xl border flex items-center gap-3 text-sm font-semibold pointer-events-auto transition-all ${
                    type === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' :
                    type === 'error' ? 'bg-red-50 border-red-100 text-red-800' :
                    'bg-blue-50 border-blue-100 text-blue-800'
                }`;

                let icon = 'fa-check-circle';
                if (type === 'error') icon = 'fa-exclamation-circle';
                if (type === 'info') icon = 'fa-info-circle';

                toast.innerHTML = `
                    <i class="fas ${icon} text-lg"></i>
                    <span class="flex-grow">${message}</span>
                `;

                container.appendChild(toast);

                setTimeout(() => {
                    toast.classList.add('opacity-0');
                    setTimeout(() => { toast.remove(); }, 300);
                }, 4000);
            },

            showLoadingOverlay: function(show, text = "Cargando información...") {
                const overlay = document.getElementById('loading-overlay');
                const loadingText = document.getElementById('loading-text');
                
                if (show) {
                    loadingText.innerText = text;
                    overlay.classList.remove('hidden');
                } else {
                    overlay.classList.add('hidden');
                }
            }
        };

        // --- INICIALIZACIÓN AL CARGAR LA PÁGINA ---
        window.onload = function() {
            app.init();
        };
    </script>
</body>
</html>
