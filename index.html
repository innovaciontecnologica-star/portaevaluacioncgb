                            </div>

                            <button onclick="app.processLogin()" class="w-full bg-primary hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg shadow transition-colors flex items-center justify-center gap-2">
                                Continuar <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                `,

                welcome: () => `
                    <div class="max-w-2xl mx-auto text-center fade-in py-8 flex flex-col items-center justify-center min-h-[80vh]">
                        <h2 class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary mb-6" style="animation: popIn 0.6s ease-out forwards;">
                            ¡Hola! Soy Bretax
                        </h2>
                        
                        <div class="w-64 h-64 sm:w-72 sm:h-72 mx-auto mb-8 relative z-10 animate-bounce" style="animation: float 3.5s ease-in-out infinite;">
                            <img src="./bretax_sonrie.png" alt="Bretax Sonríe" class="w-full h-full object-contain drop-shadow-2xl" onerror="this.src='https://placehold.co/250x250/e2e8f0/64748b?text=BRETAX'">
                        </div>
                        
                        <div class="bg-white px-8 py-5 rounded-3xl shadow-md border border-blue-100 mb-8 max-w-md relative z-0">
                            <p class="text-lg sm:text-xl text-gray-700 font-medium">
                                ¡Qué gusto verte por aquí! Ayúdanos a evaluar a tus maestros. <br><br>¿Estás listo para la misión?
                            </p>
                        </div>
                        
                        <button onclick="app.navigate('portal')" class="bg-accent hover:bg-yellow-500 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-lg transition-transform transform hover:scale-110">
                            ¡Comenzar! <i class="fas fa-rocket ml-2"></i>
                        </button>
                    </div>
                `,

                portal: () => {
                    const role = app.currentUser.role;
                    const availableTeachers = appTeachers.filter(t => t.levels.includes(role));

                    let html = `
                        <div class="max-w-5xl mx-auto py-8 px-4 fade-in">
                            <div class="mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <div>
                                    <h2 class="text-3xl font-bold text-gray-800">Personal a Evaluar</h2>
                                    <p class="text-gray-600 mt-1">Desactiva el interruptor para los maestros que no te dan clase. Selecciona a los demás para evaluarlos.</p>
                                </div>
                                ${['primaria_baja', 'primaria_alta'].includes(role) ? `
                                <div class="flex items-center gap-2 bg-yellow-100 text-yellow-800 px-4 py-2 rounded-xl border border-yellow-200">
                                    <span class="text-2xl">🐉</span>
                                    <span class="text-sm font-semibold">¡Bretax cuenta contigo!</span>
                                </div>
                                ` : ''}
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    `;

                    if (availableTeachers.length === 0) {
                        html += `
                            <div class="col-span-full p-8 text-center bg-white rounded-xl border border-gray-200">
                                <i class="fas fa-folder-open text-4xl text-gray-300 mb-3"></i>
                                <p class="text-gray-500">No hay personal asignado para evaluar en este nivel.</p>
                            </div>
                        `;
                    }

                    availableTeachers.forEach(teacher => {
                        const avatarEmoji = teacher.gender === 'F' ? '👩‍🏫' : '👨‍🏫';
                        const isHidden = app.hiddenTeachers.includes(teacher.id); 
                        const isEvaluated = app.evaluatedTeachers.includes(teacher.id); 
                        
                        let cardClasses = 'bg-white rounded-xl shadow-sm border transition-all p-5 flex flex-col items-center text-center group relative overflow-hidden ';
                        if (isEvaluated) {
                            cardClasses += 'border-green-300 bg-green-50';
                        } else if (isHidden) {
                            cardClasses += 'border-gray-200 bg-gray-50 opacity-75';
                        } else {
                            cardClasses += 'border-gray-100 hover:shadow-md hover:border-blue-200';
                        }
                        
                        html += `
                            <div class="${cardClasses}">
                                ${isEvaluated ? `
                                <div class="absolute inset-0 z-10 flex items-center justify-center bg-white/60 backdrop-blur-[1px] rounded-xl">
                                    <div class="transform -rotate-12 bg-green-500 text-white font-bold py-2 px-6 rounded-lg shadow-lg border-2 border-white text-xl">
                                        <i class="fas fa-check-circle mr-1"></i> ¡LISTO!
                                    </div>
                                </div>
                                ` : ''}

                                <div class="w-full flex justify-between items-center bg-gray-50 px-3 py-2 rounded-lg mb-4 border border-gray-100 relative z-0">
                                    <span class="text-xs font-medium ${isHidden ? 'text-gray-400' : 'text-gray-700'}">¿Me da clases?</span>
                                    <label class="flex items-center ${isEvaluated ? 'cursor-not-allowed opacity-50' : 'cursor-pointer'}">
                                        <div class="relative">
                                            <input type="checkbox" class="sr-only peer" ${!isHidden ? 'checked' : ''} ${isEvaluated ? 'disabled' : ''} onchange="app.toggleTeacher(${teacher.id})">
                                            <div class="block bg-gray-300 peer-checked:bg-green-500 w-9 h-5 rounded-full transition-colors"></div>
                                            <div class="absolute left-[2px] top-[2px] bg-white w-4 h-4 rounded-full transition-transform peer-checked:translate-x-4 shadow-sm"></div>
                                        </div>
                                    </label>
                                </div>

                                <div class="w-20 h-20 ${isHidden ? 'bg-gray-100' : 'bg-blue-50'} border ${isHidden ? 'border-gray-200' : 'border-blue-100'} rounded-full flex items-center justify-center text-5xl mb-3 transition-transform ${isHidden || isEvaluated ? '' : 'group-hover:scale-110 cursor-pointer'}" ${isHidden || isEvaluated ? '' : `onclick="app.startEvaluation(${teacher.id})"`}>
                                    <span class="${isHidden ? 'grayscale opacity-50' : ''}">${avatarEmoji}</span>
                                </div>
                                <h3 class="font-semibold text-lg ${isHidden ? 'text-gray-400 line-through' : 'text-gray-800'} relative z-0">${teacher.name}</h3>
                                
                                <div class="w-full mt-4 relative z-0">
                                ${isEvaluated ? 
                                    `<button disabled class="w-full bg-green-100 text-green-700 py-2 rounded-lg text-sm font-bold cursor-not-allowed border border-green-200">Completado</button>`
                                : isHidden ? 
                                    `<button disabled class="w-full bg-gray-200 text-gray-400 py-2 rounded-lg text-sm font-medium cursor-not-allowed">Omitido</button>` 
                                : 
                                    `<button onclick="app.startEvaluation(${teacher.id})" class="w-full bg-blue-50 text-primary hover:bg-primary hover:text-white py-2 rounded-lg text-sm font-medium transition-colors">Evaluar</button>`
                                }
                                </div>
                            </div>
                        `;
                    });

                    html += `</div>`; 

                    if (app.showCompletionCelebration) {
                        html += `
                            <div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/80 backdrop-blur-sm fade-in">
                                <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center relative mx-4">
                                    <h2 class="text-3xl font-extrabold text-green-600 mb-2">¡Misión Cumplida!</h2>
                                    <p class="text-gray-600 mb-6 font-medium">Has completado todas tus evaluaciones.</p>
                                    
                                    <div class="w-48 h-48 mx-auto mb-6 flex justify-center items-center">
                                        <img src="./dragon_apuntando.png" alt="BRETAX la mascota" class="w-full h-full object-contain drop-shadow-xl" onerror="this.src='https://placehold.co/200x200/e2e8f0/64748b?text=BRETAX'">
                                    </div>
                                    
                                    <button onclick="app.closeCelebration()" class="w-full bg-primary hover:bg-blue-800 text-white font-bold py-3 rounded-xl shadow-lg transition-transform transform hover:-translate-y-0.5">
                                        <i class="fas fa-check-circle mr-2"></i> ¡De nada!
                                    </button>
                                </div>
                            </div>
                        `;
                    }

                    return html;
                },

                form: () => {
                    const teacher = appTeachers.find(t => t.id === app.selectedTeacher);
                    const questions = MOCK_QUESTIONS[app.currentUser.role];
                    
                    const filteredQuestions = questions.filter(q => {
                        if (q.isGeneral && app.hasAnsweredGeneralQuestions) {
                            return false;
                        }
                        return true;
                    });
                    
                    let html = `
                        <div class="max-w-3xl mx-auto py-8 px-4 fade-in">
                            <button onclick="app.navigate('portal')" class="text-gray-500 hover:text-primary mb-4 flex items-center gap-2 transition-colors font-medium">
                                <i class="fas fa-arrow-left"></i> Volver a la lista
                            </button>
                            
                            <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-slate-100">
                                <div class="bg-gradient-to-r from-primary to-secondary p-6 text-white flex justify-between items-center">
                                    <div>
                                        <span class="text-xs bg-white/20 text-white px-2.5 py-1 rounded-full uppercase tracking-wider font-semibold">Evaluación</span>
                                        <h2 class="text-2xl font-bold mt-2">${teacher.name}</h2>
                                    </div>
                                    <span class="text-4xl">${teacher.gender === 'F' ? '👩‍🏫' : '👨‍🏫'}</span>
                                </div>
                                
                                <div class="p-6 divide-y divide-gray-100">
                    `;

                    filteredQuestions.forEach(q => {
                        html += `
                            <div class="py-6 first:pt-0 last:pb-0">
                                <p class="text-gray-800 font-semibold mb-4 text-base sm:text-lg">${q.text || q}</p>
                        `;

                        if (q.type === 'faces') {
                            html += `
                                <div class="flex justify-around items-center max-w-md mx-auto gap-4 mt-2">
                                    <button data-question-face="${q.id}" data-value="si" onclick="app.selectFaceOption(${q.id}, 'si')" class="flex flex-col items-center p-3 border border-gray-200 rounded-2xl bg-white hover:border-green-300 hover:bg-green-50 transition-all w-24">
                                        <span class="text-4xl mb-1">😊</span>
                                        <span class="text-xs font-bold text-green-700">SÍ</span>
                                    </button>
                                    <button data-question-face="${q.id}" data-value="a_veces" onclick="app.selectFaceOption(${q.id}, 'a_veces')" class="flex flex-col items-center p-3 border border-gray-200 rounded-2xl bg-white hover:border-yellow-300 hover:bg-yellow-50 transition-all w-24">
                                        <span class="text-4xl mb-1">😐</span>
                                        <span class="text-xs font-bold text-yellow-700">A veces</span>
                                    </button>
                                    <button data-question-face="${q.id}" data-value="no" onclick="app.selectFaceOption(${q.id}, 'no')" class="flex flex-col items-center p-3 border border-gray-200 rounded-2xl bg-white hover:border-red-300 hover:bg-red-50 transition-all w-24">
                                        <span class="text-4xl mb-1">🙁</span>
                                        <span class="text-xs font-bold text-red-700">NO</span>
                                    </button>
                                </div>
                            `;
                        } else if (q.type === 'numbers') {
                            html += `
                                <div class="flex flex-wrap gap-2 justify-between mt-2 max-w-lg">
                                    ${[1, 2, 3, 4, 5].map(num => `
                                        <button data-question-num="${q.id}" data-value="${num}" onclick="app.selectNumberOption(${q.id}, ${num})" class="w-12 h-12 rounded-full bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition-all flex items-center justify-center">
                                            ${num}
                                        </button>
                                    `).join('')}
                                </div>
                                <div class="flex justify-between text-xs text-gray-400 max-w-lg px-1 mt-1">
                                    <span>Totalmente en desacuerdo</span>
                                    <span>Totalmente de acuerdo</span>
                                </div>
                            `;
                        } else if (q.type === 'subjects') {
                            html += `
                                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-2">
                                    ${q.options.map(opt => `
                                        <button data-question-sub="${q.id}" data-value="${opt.label}" onclick="app.selectSubjectOption(${q.id}, '${opt.label}')" class="flex items-center gap-2 p-3 border border-gray-200 rounded-xl bg-white hover:bg-blue-50/50 hover:border-blue-300 transition-all">
                                            <span class="text-2xl">${opt.emoji}</span>
                                            <span class="text-sm font-medium text-gray-700">${opt.label}</span>
                                        </button>
                                    `).join('')}
                                </div>
                            `;
                        } else if (q.type === 'textarea') {
                            html += `
                                <textarea id="text-q-${q.id}" placeholder="Escribe aquí de forma libre y respetuosa..." rows="4" class="w-full border border-gray-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm"></textarea>
                            `;
                        }

                        html += `</div>`;
                    });

                    html += `
                                </div>
                                <div class="bg-gray-50 px-6 py-4 flex justify-end border-t border-gray-100">
                                    <button onclick="app.submitEvaluation()" class="bg-primary hover:bg-blue-800 text-white font-semibold px-6 py-2.5 rounded-xl shadow transition-colors flex items-center gap-2">
                                        Enviar Evaluación <i class="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    return html;
                },

                admin: () => `
                    <div class="max-w-7xl mx-auto py-6 px-4 fade-in">
                        <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h2 class="text-3xl font-extrabold text-slate-900">Radiografía y Desempeño Pedagógico</h2>
                                <p class="text-slate-500 text-sm mt-1">Dirección de Innovación Tecnológica - L.I.E. Arturo Palacios González</p>
                            </div>
                        </div>

                        <!-- PANEL DE FILTRADO MULTI-NIVEL AVANZADO -->
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Nivel</label>
                                <select onchange="app.setAdminFilterLevel(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos">Todos los Niveles</option>
                                    <option value="primaria_baja">Primaria Baja</option>
                                    <option value="primaria_alta">Primaria Alta</option>
                                    <option value="secundaria">Secundaria</option>
                                    <option value="bachillerato">Bachillerato</option>
                                    <option value="personal_cgb">Personal CGB</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Grado</label>
                                <select onchange="app.setAdminFilterGrade(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos">Todos los Grados</option>
                                    <option value="1º">1º Grado</option>
                                    <option value="2º">2º Grado</option>
                                    <option value="3º">3º Grado</option>
                                    <option value="4º">4º Grado</option>
                                    <option value="5º">5º Grado</option>
                                    <option value="6º">6º Grado</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Grupo</label>
                                <select onchange="app.setAdminFilterGroup(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos">Todos los Grupos</option>
                                    <option value="A">Grupo A</option>
                                    <option value="B">Grupo B</option>
                                    <option value="C">Grupo C</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Docente</label>
                                <select onchange="app.setAdminFilterTeacher(this.value)" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-slate-50 font-medium">
                                    <option value="todos">Todos los Docentes</option>
                                    ${appTeachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <!-- PANEL DINÁMICO DE REPORTES -->
                        <div id="admin-results">
                            <div class="text-center py-12">
                                <i class="fas fa-spinner animate-spin text-4xl text-primary mb-2"></i>
                                <p class="text-gray-500 font-medium">Calculando radiografías y estructurando Dashboard...</p>
                            </div>
                        </div>
                    </div>
                `
            }
        };

        // --- SISTEMA DE TOASTS ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColors = {
                success: 'bg-emerald-600',
                error: 'bg-rose-600',
                info: 'bg-slate-800'
            };
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            toast.className = `${bgColors[type] || bgColors.info} text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 text-sm font-semibold toast-enter`;
            toast.innerHTML = `
                <i class="fas ${icons[type] || icons.info} text-base"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                toast.addEventListener('animationend', () => toast.remove());
            }, 3500);
        }

        // --- INICIALIZACIÓN AL CARGAR LA VENTANA ---
        window.onload = function () {
            app.init();
        };
    </script>
</body>
</html>
