<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Evaluación - CGB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#1e40af', 
                        secondary: '#3b82f6',
                        accent: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .toast-enter { animation: toastSlideIn 0.3s forwards; }
        .toast-exit { animation: toastSlideOut 0.3s forwards; }
        @keyframes toastSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes toastSlideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            100% { opacity: 1; transform: scale(1) rotate(-12deg); }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes scaleUp {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }
            50% { filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.8)); }
        }

        @keyframes epicEntrance {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        @keyframes floatLogo {
            0% { transform: translateY(0px); filter: drop-shadow(0 10px 15px rgba(30, 64, 175, 0.15)); }
            50% { transform: translateY(-10px); filter: drop-shadow(0 20px 25px rgba(30, 64, 175, 0.25)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 10px 15px rgba(30, 64, 175, 0.15)); }
        }

        .radio-emoji-label:hover { transform: scale(1.1); }
        .radio-emoji:checked + .radio-emoji-label { 
            transform: scale(1.15); 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            background-color: #eff6ff;
            border-color: #3b82f6;
        }
        .likert-radio:checked + label, .likert-radio:checked + div {
            background-color: #1e40af !important;
            color: white !important;
            border-color: #1e40af !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col text-slate-800">

    <header id="main-header" class="bg-primary text-white shadow-md z-10 hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-graduation-cap text-2xl text-accent"></i>
                <div class="flex items-baseline">
                    <h1 class="font-bold text-xl tracking-tight">CGB Evalúa</h1>
                    <span class="text-[10px] bg-blue-800 text-blue-200 px-1.5 py-0.5 rounded ml-2 font-mono uppercase tracking-wide">v1.6</span>
                </div>
            </div>
            <div id="user-info" class="hidden flex items-center gap-4">
                <span id="header-role" class="text-sm bg-blue-800 px-3 py-1 rounded-full font-medium"></span>
                <span id="header-email" class="text-sm hidden sm:block"></span>
                <span id="header-group" class="text-sm font-bold text-accent hidden sm:block"></span>
                <button onclick="app.logout()" class="text-sm hover:text-red-300 transition-colors">
                    <i class="fas fa-sign-out-alt mr-1"></i> Salir
                </button>
            </div>
        </div>
    </header>

    <main id="app-container" class="flex-grow overflow-y-auto relative flex flex-col">
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-2"></div>

    <script>
        // =====================================================================
        // --- CONFIGURACIÓN DE GOOGLE SHEETS ---
        // =====================================================================
        const GOOGLE_SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycby8QbChayeAMr5hlIbQ0d71nBqqmBzADkgRyuHjSwS8-PWwd3kSVT8veg6WWA5YSVIjyw/exec'; 

        // --- DATOS GLOBALES ---
        let appTeachers = []; 
        let appEmails = [];   
        let MOCK_SUBMISSIONS = []; 
        
        // --- PLAN B (MOCK DATA) ---
        const FALLBACK_TEACHERS = [
            { id: 1, name: "Ana Martínez", gender: "F", levels: ['primaria_baja', 'primaria_alta'] },
            { id: 2, name: "Carlos López", gender: "M", levels: ['primaria_alta'] },
            { id: 3, name: "María Fernández", gender: "F", levels: ['secundaria', 'bachillerato'] },
            { id: 4, name: "Roberto Gómez", gender: "M", levels: ['secundaria'] },
            { id: 5, name: "Elena Rojas", gender: "F", levels: ['bachillerato'] },
            { id: 6, name: "Laura Sánchez", gender: "F", levels: ['personal_cgb'] }
        ];

        const SUBJECT_OPTIONS_BAJA = [
            { label: 'Español', emoji: '📖' }, { label: 'Inglés', emoji: '🗣️' }, { label: 'Cultura Física', emoji: '⚽' }, { label: 'Música', emoji: '🎵' }, { label: 'Arte', emoji: '🎨' }
        ];

        const SUBJECT_OPTIONS_ALTA = [
            { label: 'Español', emoji: '📖' }, { label: 'Inglés', emoji: '🗣️' }, { label: 'Cultura Física', emoji: '⚽' }, { label: 'Música', emoji: '🎵' }, { label: 'Escultura', emoji: '🗿' }, { label: 'Baile', emoji: '🩰' }, { label: 'Teatro', emoji: '🎭' }
        ];

        const SECUNDARIA_MATERIAS = [
            "Sustentabilidad", "Tecnología", "Español", "Historia", "Física", "Formación Cívica y Ética", 
            "A2 Mr. Israel", "B1 - Miss Zeidy", "B1- Miss Brenda", "B1+ - Miss Bety", "B1+ - Miss Nadya", 
            "Ecología", "Escultura", "Danza", "Dibujo", "Teatro", 
            "Educación física - Miss Thania", "Educación física - Prof. Jorge", "Educación física - Miss Diana", 
            "Tutoría Miss Sarai", "Tutoría Miss Paulina", "Tutoría Miss Nadya", "Tutoría Prof. Israel", 
            "Tutoría Miss Cecilia", "Tutoría Miss Laura", "Tutoría Miss Ariadna"
        ];

        const SECUNDARIA_PREGUNTAS = [
            { type: 'frequency', text: "1. ¿El profesor o profesora es puntual al inicio de todas sus clases?" },
            { type: 'frequency', text: "2. ¿El profesor o profesora demuestra tener preparadas todas sus clases y dominar los temas que imparte?" },
            { type: 'frequency', text: "3. ¿El profesor o profesora indica cada parcial los temas y los objetivos a trabajar, te explica qué se va a hacer en cada periodo y cómo se va a evaluar?" },
            { type: 'frequency', text: "4. ¿El profesor o profesora deja tareas para reforzar lo visto en clase o preparar el siguiente aprendizaje y las revisa?" },
            { type: 'frequency', text: "5. ¿El profesor o profesora es claro en todos los trabajos o tareas que asigna para atender los temas?" },
            { type: 'frequency', text: "6. ¿El profesor o profesora aclara las dudas que surgen durante las clases, en tareas o trabajos?" },
            { type: 'frequency', text: "7. ¿El profesor o profesora genera diferentes strategies o actividades para atender los diferentes temas en clase?" },
            { type: 'frequency', text: "8. ¿El profesor o profesora se dirige a los estudiantes con respeto y con buena actitud durante las clases o ante cualquier conflicto?" },
            { type: 'frequency', text: "9. ¿Lo que pregunta el profesor o profesora en sus exámenes es lo que se vio en clases?" },
            
            { type: 'subjects-check', text: "10. ¿Cuáles consideras que son las clases en las que has aprendido más?", options: SECUNDARIA_MATERIAS, isGeneral: true },
            { type: 'subjects-check', text: "11. ¿Cuáles consideras que son las clases que deben mejorar?", options: SECUNDARIA_MATERIAS, isGeneral: true },
            { type: 'direction-radio', text: "12. Elige las características que consideres describen mejor a la dirección de secundaria en este semestre:", 
              options: [
                  "Su trabajo es cercano y positivo para mí.", 
                  "Me escucha.", 
                  "Busca resolver mis necesidades.", 
                  "Se presta al diálogo", 
                  "Todas las anteriores", 
                  "Ninguna de las anteriores"
              ], isGeneral: true },
            { type: 'textarea', text: "13. En este espacio escribe comentarios positivos o de mejora para los profesores que decidas al respecto de este semestre. Pueden ser todos o solo algunos.", isGeneral: true }
        ];

        const MOCK_QUESTIONS = {
            primaria_baja: [
                { type: 'faces', text: "1. Sí le entiendo a su clase y cuando me cuesta trabajo, me explica." },
                { type: 'faces', text: "2. La tarea que me deja se me hace fácil porque ya lo vi en clase." },
                { type: 'faces', text: "3. Sí me alcanza el tiempo para hacer la tarea." },
                { type: 'faces', text: "4. Califica los trabajos y tareas." },
                { type: 'faces', text: "5. Siempre está conmigo en el salón y me acompaña a mis actividades." },
                { type: 'faces', text: "6. Hacemos muchas cosas diferentes en la clase y me gustan." },
                { type: 'faces', text: "7. Me trata siempre con respeto." },
                { type: 'faces', text: "8. Me dice lo que tengo que estudiar más para mejorar y cómo voy en clase." },
                { type: 'faces', text: "9. Me invita a vivir los valores de honestidad, respeto, amistad, justicia y compromiso." },
                { type: 'subjects', text: "10. La clase que más me gusta es:", isGeneral: true, options: SUBJECT_OPTIONS_BAJA },
                { type: 'subjects', text: "11. La clase que no me gusta mucho es:", isGeneral: true, options: SUBJECT_OPTIONS_BAJA },
                { type: 'textarea', text: "12. Escribe algo que le quieras decir a uno de tus maestros.", isGeneral: true }
            ],
            primaria_alta: [
                { type: 'faces', text: "1. Sí le entiendo a su clase y cuando me cuesta trabajo, me explica." },
                { type: 'faces', text: "2. La tarea que me deja se me hace fácil porque ya lo vi en clase." },
                { type: 'faces', text: "3. Sí me alcanza el tiempo para hacer la tarea." },
                { type: 'faces', text: "4. Califica los trabajos y tareas." },
                { type: 'faces', text: "5. Siempre está conmigo en el salón y me acompaña a mis actividades." },
                { type: 'faces', text: "6. Hacemos muchas cosas diferentes en la clase y me gustan." },
                { type: 'faces', text: "7. Me trata siempre con respeto." },
                { type: 'faces', text: "8. Me dice lo que tengo que estudiar más para mejorar y cómo voy en clase." },
                { type: 'faces', text: "9. Me invita a vivir los valores de honestidad, respeto, amistad, justicia y compromiso." },
                { type: 'subjects', text: "10. La clase que más me gusta es:", isGeneral: true, options: SUBJECT_OPTIONS_ALTA },
                { type: 'subjects', text: "11. La clase que no me gusta mucho es:", isGeneral: true, options: SUBJECT_OPTIONS_ALTA },
                { type: 'textarea', text: "12. Escribe algo que le quieras decir a uno de tus maestros.", isGeneral: true }
            ],
            secundaria: SECUNDARIA_PREGUNTAS,
            bachillerato: SECUNDARIA_PREGUNTAS, 
            personal_cgb: [
                { type: 'yesno', text: "1. ¿Muestra liderazgo y organización en sus actividades?" },
                { type: 'yesno', text: "2. ¿La comunicación con el equipo de trabajo es efectiva?" },
                { type: 'yesno', text: "3. ¿Cumple con los objetivos y tiempos establecidos?" },
                { type: 'yesno', text: "4. ¿Fomenta un clima laboral positivo y colaborativo?" }
            ]
        };

        function renderLightAuthorship() {
            return `
                <div class="w-full pb-6 pt-10 text-center mt-auto">
                    <div class="inline-flex flex-col items-center justify-center opacity-70 hover:opacity-100 transition-opacity duration-500">
                        <span class="text-[10px] sm:text-xs text-slate-500 font-medium tracking-[0.2em] uppercase mb-1">L.I.E. Arturo Palacios Gonzalez</span>
                        <span class="text-[9px] sm:text-[10px] text-primary/80 font-extrabold tracking-[0.25em] uppercase flex items-center gap-2">
                            <i class="fas fa-microchip text-[10px]"></i> Colegio Gran Bretaña <span class="w-1 h-1 bg-accent rounded-full"></span> Innovación Tecnológica
                        </span>
                    </div>
                </div>
            `;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            let bgColor = 'bg-blue-600'; let icon = 'fa-info-circle';
            if (type === 'success') { bgColor = 'bg-green-600'; icon = 'fa-check-circle'; }
            if (type === 'error') { bgColor = 'bg-red-600'; icon = 'fa-exclamation-circle'; }
            if (type === 'warning') { bgColor = 'bg-yellow-500'; icon = 'fa-exclamation-triangle'; }

            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 toast-enter min-w-[250px]`;
            toast.innerHTML = `<i class="fas ${icon} text-lg"></i><span class="font-medium text-sm">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => { if (container && container.contains(toast)) container.removeChild(toast); }, 300);
            }, 3000);
        }

        const app = {
            currentUser: null,
            currentView: 'splash',
            selectedTeacher: null,
            hasAnsweredGeneralQuestions: false, 
            hiddenTeachers: [],
            evaluatedTeachers: [],
            showCompletionCelebration: false,
            hasSeenCelebration: false,
            adminFilterLevel: 'todos',
            adminFilterGrade: 'todos',
            adminFilterGroup: 'todos',
            adminFilterTeacher: 'todos', 
            loginGrade: null,
            loginGroup: null,

            async init() {
                this.render(); 
                await this.fetchInitialData();
            },

            async fetchInitialData() {
                if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.includes("URL_DE_TU_SCRIPT")) {
                    appTeachers = FALLBACK_TEACHERS;
                    this.generateMockData(); 
                    return;
                }
                try {
                    const response = await fetch(GOOGLE_SHEETS_API_URL + "?action=getInitialData");
                    const data = await response.json();
                    if (data && data.teachers) {
                        appTeachers = data.teachers;
                        appEmails = data.emails || [];
                    } else {
                        appTeachers = FALLBACK_TEACHERS;
                    }
                } catch (error) {
                    console.error("Error al conectar con Google Sheets:", error);
                    appTeachers = FALLBACK_TEACHERS;
                    this.generateMockData(); 
                }
            },

            async fetchAdminSubmissions() {
                if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.includes("URL_DE_TU_SCRIPT")) {
                    this.generateMockData();
                    this.render();
                    return;
                }
                try {
                    const response = await fetch(GOOGLE_SHEETS_API_URL + "?action=getSubmissions");
                    const data = await response.json();
                    if (data && Array.isArray(data)) {
                        MOCK_SUBMISSIONS = data;
                    } else {
                        this.generateMockData();
                    }
                } catch (error) {
                    console.error("Error al traer las evaluaciones del servidor:", error);
                    this.generateMockData();
                }
                this.render();
            },

            generateMockData() {
                MOCK_SUBMISSIONS = [];
                const groups = ['A', 'B', 'C'];
                const comments = [
                    "Excelente profesor, explica de manera muy clara y dinámica.",
                    "Muy puntual y las clases siempre están perfectamente estructuradas.",
                    "Es un poco exigente con las tareas, pero se aprende muchísimo.",
                    "Me encanta la manera en que se dirige al grupo, siempre con respeto."
                ];

                const teachersList = appTeachers.length > 0 ? appTeachers : FALLBACK_TEACHERS;

                teachersList.forEach(teacher => {
                    const count = 25; 
                    for (let i = 0; i < count; i++) {
                        const level = teacher.levels[Math.floor(Math.random() * teacher.levels.length)];
                        const group = groups[Math.floor(Math.random() * groups.length)];
                        const grade = Math.floor(Math.random() * 3) + 1;
                        const answers = {};

                        if (level === 'personal_cgb') {
                            for (let q = 0; q < 4; q++) answers[`q${q}`] = Math.random() > 0.2 ? 'yes' : 'no';
                        } else {
                            for (let q = 0; q < 9; q++) {
                                const rand = Math.random();
                                answers[`q${q}`] = rand > 0.5 ? 'SIEMPRE' : (rand > 0.15 ? 'A VECES' : 'NUNCA');
                            }
                        }

                        if (['secundaria', 'bachillerato'].includes(level)) {
                            answers['q12'] = comments[Math.floor(Math.random() * comments.length)];
                            answers['q13'] = comments[Math.floor(Math.random() * comments.length)];
                        } else {
                            answers['q12'] = comments[Math.floor(Math.random() * comments.length)];
                        }

                        MOCK_SUBMISSIONS.push({
                            id: crypto.randomUUID(),
                            teacherId: teacher.id,
                            role: level,
                            grade: grade,
                            group: group,
                            answers: answers
                        });
                    }
                });
            },

            navigate(view) {
                this.currentView = view;
                this.render();
            },

            handleRoleChange() {
                const role = document.getElementById('login-role').value;
                const emailContainer = document.getElementById('email-container');
                const gradeGroupContainer = document.getElementById('grade-group-container');
                const gradeButtons = document.getElementById('grade-buttons');
                
                if (['secundaria', 'bachillerato', 'personal_cgb', 'admin'].includes(role)) {
                    emailContainer.classList.remove('hidden');
                } else {
                    emailContainer.classList.add('hidden');
                }

                if (['primaria_baja', 'primaria_alta', 'secundaria', 'bachillerato'].includes(role)) {
                    gradeGroupContainer.classList.remove('hidden');
                    
                    let maxGrade = (role === 'secundaria' || role === 'bachillerato') ? 3 : 6;
                    let gradesHtml = '';
                    for(let i=1; i<=maxGrade; i++) {
                        gradesHtml += `<button type="button" id="grade-btn-${i}" class="grade-btn flex-1 py-2 rounded-lg border-2 border-gray-200 bg-white text-gray-700 font-bold transition-all hover:border-primary hover:text-primary" onclick="app.selectGrade(${i})">${i}º</button>`;
                    }
                    gradeButtons.innerHTML = gradesHtml;
                    
                    this.loginGrade = null;
                    this.loginGroup = null;
                } else {
                    gradeGroupContainer.classList.add('hidden');
                }
            },

            selectGrade(grade) {
                this.loginGrade = grade;
                document.querySelectorAll('.grade-btn').forEach(btn => {
                    btn.classList.remove('bg-primary', 'text-white', 'border-primary');
                    btn.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
                });
                const selected = document.getElementById(`grade-btn-${grade}`);
                if(selected) {
                    selected.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
                    selected.classList.add('bg-primary', 'text-white', 'border-primary');
                }
            },

            selectGroup(group) {
                this.loginGroup = group;
                document.querySelectorAll('.group-btn').forEach(btn => {
                    btn.classList.remove('bg-primary', 'text-white', 'border-primary');
                    btn.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
                });
                const selected = document.getElementById(`group-btn-${group}`);
                if(selected) {
                    selected.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
                    selected.classList.add('bg-primary', 'text-white', 'border-primary');
                }
            },

            processLogin() {
                const role = document.getElementById('login-role').value;
                if (!role) { showToast('Por favor, selecciona un nivel.', 'warning'); return; }

                let email = '';
                if (['secundaria', 'bachillerato', 'personal_cgb', 'admin'].includes(role)) {
                    email = document.getElementById('login-email').value.trim();
                    if (!email) { showToast('El correo institucional es requerido.', 'warning'); return; }
                }

                if (['primaria_baja', 'primaria_alta', 'secundaria', 'bachillerato'].includes(role)) {
                    if (!this.loginGrade || !this.loginGroup) {
                        showToast('Por favor, selecciona tu grado y grupo.', 'warning');
                        return;
                    }
                }

                this.currentUser = { role, email, grade: this.loginGrade, group: this.loginGroup };
                
                if (role === 'admin') {
                    this.currentView = 'admin';
                    this.fetchAdminSubmissions(); 
                } else {
                    this.navigate('welcome');
                }
            },

            handleMax3(checkbox, indexStr) {
                const checkedBoxes = document.querySelectorAll(`.q${indexStr}-checkbox:checked`);
                if (checkedBoxes.length > 3) {
                    checkbox.checked = false;
                    showToast('Solo puedes seleccionar un máximo de 3 materias.', 'warning');
                }
            },

            setAdminFilterLevel(level) {
                this.adminFilterLevel = level;
                this.adminFilterTeacher = 'todos'; 
                this.render();
            },

            setAdminFilterGrade(grade) {
                this.adminFilterGrade = grade;
                this.render();
            },

            setAdminFilterGroup(group) {
                this.adminFilterGroup = group;
                this.render();
            },

            setAdminFilterTeacher(teacherId) {
                this.adminFilterTeacher = teacherId;
                this.render();
            },

            toggleTeacher(id) {
                if (this.hiddenTeachers.includes(id)) {
                    this.hiddenTeachers = this.hiddenTeachers.filter(tId => tId !== id);
                } else {
                    this.hiddenTeachers.push(id);
                }
                this.checkCompletionStatus();
                this.render();
            },

            startEvaluation(id) {
                this.selectedTeacher = id;
                this.navigate('form');
            },

            async submitEvaluation(event) {
                event.preventDefault();
                const selectedTeacherObj = appTeachers.find(t => t.id === this.selectedTeacher);
                const formElement = event.target;
                const formData = new FormData(formElement);
                const answersDict = {};

                const questions = MOCK_QUESTIONS[this.currentUser.role] || [];
                questions.forEach((q, index) => {
                    if (q.isGeneral && this.hasAnsweredGeneralQuestions) return;
                    if (q.type === 'subjects-check') {
                        const checked = Array.from(document.querySelectorAll(`.q${index}-checkbox:checked`)).map(cb => cb.value);
                        answersDict[`q${index}`] = checked;
                    } else {
                        answersDict[`q${index}`] = formData.get(`q${index}`) || "";
                    }
                });

                const payload = {
                    timestamp: new Date().toISOString(),
                    role: this.currentUser.role,
                    email: this.currentUser.email || "Anónimo",
                    grade: this.currentUser.grade || "",
                    group: this.currentUser.group || "",
                    teacherId: this.selectedTeacher,
                    teacherName: selectedTeacherObj ? selectedTeacherObj.name : "Desconocido",
                    answers: answersDict
                };

                const submitBtn = formElement.querySelector("button[type='submit']");
                if (submitBtn) submitBtn.disabled = true;

                MOCK_SUBMISSIONS.push({
                    id: crypto.randomUUID(),
                    teacherId: payload.teacherId,
                    role: payload.role,
                    grade: payload.grade,
                    group: payload.group,
                    answers: payload.answers
                });

                if (GOOGLE_SHEETS_API_URL && !GOOGLE_SHEETS_API_URL.includes("URL_DE_TU_SCRIPT")) {
                    try {
                        await fetch(GOOGLE_SHEETS_API_URL, {
                            method: "POST",
                            mode: "no-cors",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ action: "submitEvaluation", payload: payload })
                        });
                    } catch (e) { console.error(e); }
                }

                this.evaluatedTeachers.push(this.selectedTeacher);
                if (questions.some(q => q.isGeneral)) this.hasAnsweredGeneralQuestions = true;
                this.checkCompletionStatus();
                showToast('Evaluación enviada exitosamente', 'success');
                this.navigate('portal');
            },

            checkCompletionStatus() {
                if (!this.currentUser) return;
                const availableTeachers = appTeachers.filter(t => t.levels.includes(this.currentUser.role));
                const activeTeachers = availableTeachers.filter(t => !this.hiddenTeachers.includes(t.id));
                
                if (activeTeachers.length > 0 && activeTeachers.every(t => this.evaluatedTeachers.includes(t.id))) {
                    if (!this.hasSeenCelebration) {
                        this.showCompletionCelebration = true;
                        this.hasSeenCelebration = true;
                    }
                }
            },

            logout() {
                this.currentUser = null; this.selectedTeacher = null;
                this.hasAnsweredGeneralQuestions = false; this.hiddenTeachers = []; 
                this.evaluatedTeachers = []; this.showCompletionCelebration = false; this.hasSeenCelebration = false;
                this.loginGrade = null; this.loginGroup = null;
                this.adminFilterLevel = 'todos'; this.adminFilterGrade = 'todos';
                this.adminFilterGroup = 'todos'; this.adminFilterTeacher = 'todos';
                this.navigate('splash');
            },

            closeCelebration() {
                this.showCompletionCelebration = false;
                this.render();
            },

            render() {
                const container = document.getElementById('app-container');
                const header = document.getElementById('main-header');
                const userInfo = document.getElementById('user-info');
                
                if(!container) return;
                container.innerHTML = '';

                if (this.currentView === 'splash') {
                    if(header) header.classList.add('hidden');
                    container.className = "flex-grow overflow-y-auto relative flex flex-col";
                } else {
                    if(header) header.classList.remove('hidden');
                    container.className = "flex-grow overflow-y-auto relative flex flex-col p-4 sm:p-6 lg:p-8";
                }

                switch(this.currentView) {
                    case 'splash': container.innerHTML = this.views.splash(); break;
                    case 'login': container.innerHTML = this.views.login(); break;
                    case 'welcome': container.innerHTML = this.views.welcome(); break;
                    case 'portal': container.innerHTML = this.views.portal(); break;
                    case 'form': container.innerHTML = this.views.form(); break;
                    case 'admin': container.innerHTML = this.views.admin(); break;
                }

                if (this.currentUser && this.currentView !== 'splash' && userInfo) {
                    userInfo.classList.remove('hidden');
                    const roleNames = {
                        'primaria_baja': 'Primaria Baja', 'primaria_alta': 'Primaria Alta',
                        'secundaria': 'Secundaria', 'bachillerato': 'Bachillerato',
                        'personal_cgb': 'Personal CGB', 'admin': 'Administrador'
                    };
                    const roleLabel = document.getElementById('header-role');
                    const emailLabel = document.getElementById('header-email');
                    const groupLabel = document.getElementById('header-group');
                    
                    if(roleLabel) roleLabel.innerText = roleNames[this.currentUser.role] || this.currentUser.role;
                    if(emailLabel) emailLabel.innerText = this.currentUser.email || '';
                    
                    if(groupLabel) {
                        if(this.currentUser.grade && this.currentUser.group) {
                            groupLabel.innerText = `${this.currentUser.grade}º${this.currentUser.group}`;
                            groupLabel.classList.remove('hidden');
                        } else {
                            groupLabel.classList.add('hidden');
                        }
                    }
                } else if(userInfo) {
                    userInfo.classList.add('hidden');
                }
            },

            handleImageError(img, type) {
                img.onerror = null; 
                img.parentNode.innerHTML = `<div class="w-24 h-24 bg-primary text-white rounded-full flex items-center justify-center font-bold">CGB</div>`;
            },

            views: {
                splash: () => `
                    <div class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-br from-[#0b132b] via-[#1e3a8a] to-[#0f172a] overflow-hidden">
                        <div class="relative z-10 flex flex-col items-center px-4 w-full" style="animation: scaleUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
                            <div class="w-48 h-48 bg-primary/40 rounded-full flex items-center justify-center text-white mb-6 border-4 border-accent shadow-2xl">
                                <i class="fas fa-graduation-cap text-7xl text-accent"></i>
                            </div>
                            <h1 class="text-3xl sm:text-5xl font-extrabold text-white mb-2 tracking-widest text-center">PORTAL DE EVALUACIÓN</h1>
                            <p class="text-blue-200 text-lg sm:text-xl mb-12 font-light tracking-[0.2em] text-center uppercase">Colegio Gran Bretaña</p>
                            <button onclick="app.navigate('login')" class="px-10 py-4 bg-accent hover:bg-yellow-500 rounded-full text-white font-bold text-lg tracking-widest uppercase shadow-lg transition-all">
                                Ingresar <i class="fas fa-chevron-right ml-2"></i>
                            </button>
                        </div>
                        ${renderLightAuthorship()}
                    </div>
                `,

                login: () => `
                    <div class="w-full flex-grow flex flex-col">
                        <div class="max-w-md w-full mx-auto bg-white rounded-2xl shadow-xl overflow-hidden fade-in mt-6 mb-4">
                            <div class="bg-primary p-6 text-center text-white">
                                <i class="fas fa-user-circle text-5xl mb-3"></i>
                                <h2 class="text-2xl font-bold">Datos Generales</h2>
                            </div>
                            <div class="p-6">
                                <div class="mb-5">
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Nivel Educativo</label>
                                    <select id="login-role" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-primary p-3 border bg-white" onchange="app.handleRoleChange()">
                                        <option value="" disabled selected>Selecciona un perfil...</option>
                                        <option value="primaria_baja">Primaria Baja</option>

                                        <button type="button" id="group-btn-B" class="group-btn flex-1 py-2 rounded-lg border-2 bg-white text-gray-700 font-bold" onclick="app.selectGroup('B')">B</button>

                                </button>
                            </div>
                        </div>
                        ${renderLightAuthorship()}
                    </div>
                `,

                welcome: () => `
                    <div class="w-full flex-grow flex flex-col">
                        <div class="max-w-2xl mx-auto text-center fade-in py-8 flex flex-col items-center justify-center mt-6 px-4">
                            <h2 class="text-4xl font-extrabold text-primary mb-6">¡Bienvenido al Portal!</h2>
                            <p class="text-gray-600 text-lg mb-8">Tu opinión nos ayuda a mejorar continuamente la calidad educativa de nuestra institución.</p>
                            <button onclick="app.navigate('portal')" class="bg-accent hover:bg-yellow-500 text-white text-xl font-bold py-4 px-12 rounded-full shadow-lg">
                                Comenzar Evaluación <i class="fas fa-rocket ml-2"></i>
                            </button>
                        </div>
                        ${renderLightAuthorship()}
                    </div>
                `,

                portal: () => {
                    const role = app.currentUser.role;
                    const teachersList = appTeachers.length > 0 ? appTeachers : FALLBACK_TEACHERS;
                    const availableTeachers = teachersList.filter(t => t.levels.includes(role));

                    let html = `
                        <div class="w-full flex-grow flex flex-col">
                            <div class="max-w-5xl w-full mx-auto fade-in">
                                <div class="mb-8 bg-white p-6 rounded-2xl shadow-sm border flex items-center justify-between flex-wrap gap-4">
                                    <div>
                                        <h2 class="text-3xl font-bold text-gray-800">Personal a Evaluar</h2>
                                        <p class="text-gray-600 mt-1">Desactiva el interruptor de los profesores que no te imparten clases este periodo.</p>
                                    </div>
                                    <div class="bg-blue-50 text-primary px-4 py-2 rounded-lg font-semibold text-sm">
                                        Completados: ${availableTeachers.filter(t => app.evaluatedTeachers.includes(t.id) || app.hiddenTeachers.includes(t.id)).length} / ${availableTeachers.length}
                                    </div>
                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    `;

                    availableTeachers.forEach(teacher => {
                        const isHidden = app.hiddenTeachers.includes(teacher.id); 
                        const isEvaluated = app.evaluatedTeachers.includes(teacher.id); 
                        
                        let cardClasses = 'bg-white rounded-xl shadow-sm border p-5 flex flex-col items-center text-center relative ';
                        if (isEvaluated) cardClasses += 'border-green-300 bg-green-50';
                        else if (isHidden) cardClasses += 'border-gray-200 bg-gray-50 opacity-60';
                        else cardClasses += 'border-gray-100 hover:shadow-md';
                        
                        html += `
                            <div class="${cardClasses}">
                                ${isEvaluated ? `<div class="absolute inset-0 z-10 flex items-center justify-center bg-white/60 font-bold text-green-600 text-xl">✓ EVALUADO</div>` : ''}
                                <div class="w-full flex justify-between items-center bg-gray-50 px-3 py-1.5 rounded-lg mb-4 border">
                                    <span class="text-xs font-semibold text-gray-500">¿Te da clase?</span>
                                    <input type="checkbox" ${!isHidden ? 'checked' : ''} ${isEvaluated ? 'disabled' : ''} onchange="app.toggleTeacher(${teacher.id})">
                                </div>
                                <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center text-2xl mb-2">
                                    ${teacher.gender === 'F' ? '👩‍🏫' : '👨‍🏫'}
                                </div>
                                <h3 class="font-bold text-gray-800">${teacher.name}</h3>
                                <div class="w-full mt-4">
                                    ${isEvaluated ? '<button disabled class="w-full bg-green-200 text-green-800 py-2 rounded-lg text-xs font-bold">Completado</button>' : 
                                      isHidden ? '<button disabled class="w-full bg-gray-200 text-gray-400 py-2 rounded-lg text-xs">Omitido</button>' :
                                      `<button onclick="app.startEvaluation(${teacher.id})" class="w-full bg-primary text-white py-2 rounded-lg text-xs font-bold">Evaluar</button>`}
                                </div>
                            </div>
                        `;
                    });

                    html += `</div></div>${renderLightAuthorship()}</div>`;
                    return html;
                },

                form: () => {
                    const teachersList = appTeachers.length > 0 ? appTeachers : FALLBACK_TEACHERS;
                    const teacher = teachersList.find(t => t.id === app.selectedTeacher) || teachersList[0];
                    const questions = MOCK_QUESTIONS[app.currentUser.role] || [];
                    
                    let html = `
                        <div class="w-full flex-grow flex flex-col">
                            <div class="max-w-3xl w-full mx-auto fade-in">
                                <button onclick="app.navigate('portal')" class="text-gray-500 hover:text-primary mb-4 font-bold flex items-center gap-2">
                                    <i class="fas fa-arrow-left"></i> Volver al listado
                                </button>
                                <div class="bg-white rounded-2xl shadow-xl overflow-hidden border">
                                    <div class="bg-primary p-6 text-white flex justify-between items-center">
                                        <div>
                                            <p class="text-blue-200 text-xs font-bold uppercase tracking-wide">Evaluando al Docente</p>
                                            <h2 class="text-2xl font-bold">${teacher.name}</h2>
                                        </div>
                                    </div>
                                    <form onsubmit="app.submitEvaluation(event)" class="p-6 space-y-6">
                    `;

                    questions.forEach((q, index) => {
                        if (q.isGeneral && app.hasAnsweredGeneralQuestions) return;
                        html += `
                            <div class="bg-gray-50 p-5 rounded-xl border">
                                <label class="block text-base font-bold text-gray-800 mb-3">${q.text || q}</label>
                        `;

                        if (q.type === 'frequency' || typeof q === 'string') {
                            html += `
                                <div class="flex gap-2">
                                    ${['SIEMPRE', 'A VECES', 'NUNCA'].map(v => `
                                        <label class="flex-1 cursor-pointer">
                                            <input type="radio" name="q${index}" value="${v}" class="sr-only likert-radio" required>
                                            <div class="py-2.5 text-center rounded-lg border-2 bg-white text-xs font-bold text-gray-600">${v}</div>
                                        </label>
                                    `).join('')}
                                </div>
                            `;
                        } else if (q.type === 'yesno') {
                            html += `
                                <div class="flex gap-2">
                                    ${['yes', 'no'].map(v => `
                                        <label class="flex-1 cursor-pointer">
                                            <input type="radio" name="q${index}" value="${v}" class="sr-only likert-radio" required>
                                            <div class="py-2.5 text-center rounded-lg border-2 bg-white text-xs font-bold text-gray-600">${v === 'yes' ? 'SÍ' : 'NO'}</div>
                                        </label>
                                    `).join('')}
                                </div>
                            `;
                        } else if (q.type === 'faces') {
                            html += `
                                <div class="flex justify-center gap-6">
                                    <label class="text-center cursor-pointer"><input type="radio" name="q${index}" value="happy" class="sr-only radio-emoji" required><span class="text-4xl p-1 inline-block">😃</span><p class="text-[10px] font-bold text-gray-400">Siempre</p></label>
                                    <label class="text-center cursor-pointer"><input type="radio" name="q${index}" value="neutral" class="sr-only radio-emoji"><span class="text-4xl p-1 inline-block">😐</span><p class="text-[10px] font-bold text-gray-400">A veces</p></label>
                                    <label class="text-center cursor-pointer"><input type="radio" name="q${index}" value="sad" class="sr-only radio-emoji"><span class="text-4xl p-1 inline-block">🙁</span><p class="text-[10px] font-bold text-gray-400">Nunca</p></label>
                                </div>
                            `;
                        } else if (q.type === 'textarea') {
                            html += `<textarea name="q${index}" rows="3" class="w-full border rounded-lg p-3 text-sm bg-white" placeholder="Escribe aquí..." required></textarea>`;
                        } else {
                            html += `<input type="text" name="q${index}" class="w-full border rounded-lg p-2.5 text-sm" placeholder="Respuesta..." required>`;
                        }
                        html += `</div>`;
                    });

                    html += `
                                        <button type="submit" class="w-full bg-primary hover:bg-blue-800 text-white font-bold py-3.5 rounded-xl shadow">
                                            Enviar Cuestionario Anónimo
                                        </button>
                                    </form>
                                </div>
                            </div>
                            ${renderLightAuthorship()}
                        </div>
                    `;
                    return html;
                },

                admin: () => {
                    const teachersList = appTeachers.length > 0 ? appTeachers : FALLBACK_TEACHERS;

                    let filteredSubs = MOCK_SUBMISSIONS.filter(sub => {
                        if (app.adminFilterLevel !== 'todos' && sub.role !== app.adminFilterLevel) return false;
                        if (app.adminFilterGrade !== 'todos' && sub.grade != app.adminFilterGrade) return false;
                        if (app.adminFilterGroup !== 'todos' && sub.group !== app.adminFilterGroup) return false;
                        if (app.adminFilterTeacher !== 'todos' && sub.teacherId != app.adminFilterTeacher) return false;
                        return true;
                    });

                    const totalEvaluations = filteredSubs.length;
                    const evaluatedUniqueIds = [...new Set(filteredSubs.map(s => s.teacherId))].length;
                    const completionRate = teachersList.length > 0 ? Math.min(100, Math.round((evaluatedUniqueIds / teachersList.length) * 100)) : 0;

                    let scoresSum = 0; let scoresCount = 0;
                    filteredSubs.forEach(s => {
                        for (let q = 0; q < 9; q++) {
                            const val = s.answers ? s.answers[`q${q}`] : null;
                            if (val === 'SIEMPRE' || val === 'happy' || val === 'yes') { scoresSum += 5; scoresCount++; }
                            else if (val === 'A VECES' || val === 'neutral') { scoresSum += 3; scoresCount++; }
                            else if (val === 'NUNCA' || val === 'sad' || val === 'no') { scoresSum += 1; scoresCount++; }
                        }
                    });
                    const avgScore = scoresCount > 0 ? (scoresSum / scoresCount).toFixed(1) : "4.5";

                    const applicableTeachersForSelect = teachersList.filter(t => {
                        if (app.adminFilterLevel === 'todos') return true;
                        return t.levels.includes(app.adminFilterLevel);
                    });

                    let html = `
                        <div class="w-full flex-grow flex flex-col pb-10">
                            <div class="max-w-6xl w-full mx-auto fade-in">
                                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4">
                                    <div>
                                        <h2 class="text-3xl font-extrabold text-gray-800">Panel Administrativo</h2>
                                        <p class="text-gray-500 text-sm">Monitoreo de promedios, porcentajes de participación y comentarios.</p>
                                    </div>
                                </div>

                                <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
                                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                                        <div>
                                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Nivel Educativo</label>
                                            <select class="w-full border rounded-xl p-2.5 text-sm font-bold bg-white" onchange="app.setAdminFilterLevel(this.value)">
                                                <option value="todos" ${app.adminFilterLevel === 'todos' ? 'selected' : ''}>Todos los Niveles</option>
                                                <option value="primaria_baja" ${app.adminFilterLevel === 'primaria_baja' ? 'selected' : ''}>Primaria Baja</option>
                                                <option value="primaria_alta" ${app.adminFilterLevel === 'primaria_alta' ? 'selected' : ''}>Primaria Alta</option>
                                                <option value="secundaria" ${app.adminFilterLevel === 'secundaria' ? 'selected' : ''}>Secundaria</option>
                                                <option value="bachillerato" ${app.adminFilterLevel === 'bachillerato' ? 'selected' : ''}>Bachillerato</option>
                                                <option value="personal_cgb" ${app.adminFilterLevel === 'personal_cgb' ? 'selected' : ''}>Personal CGB</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Grado</label>
                                            <select class="w-full border rounded-xl p-2.5 text-sm font-bold bg-white" onchange="app.setAdminFilterGrade(this.value)">
                                                <option value="todos" ${app.adminFilterGrade === 'todos' ? 'selected' : ''}>Todos los Grados</option>
                                                <option value="1" ${app.adminFilterGrade == '1' ? 'selected' : ''}>1º Año</option>
                                                <option value="2" ${app.adminFilterGrade == '2' ? 'selected' : ''}>2º Año</option>
                                                <option value="3" ${app.adminFilterGrade == '3' ? 'selected' : ''}>3º Año</option>
                                                <option value="4" ${app.adminFilterGrade == '4' ? 'selected' : ''}>4º Año</option>
                                                <option value="5" ${app.adminFilterGrade == '5' ? 'selected' : ''}>5º Año</option>
                                                <option value="6" ${app.adminFilterGrade == '6' ? 'selected' : ''}>6º Año</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Grupo</label>
                                            <select class="w-full border rounded-xl p-2.5 text-sm font-bold bg-white" onchange="app.setAdminFilterGroup(this.value)">
                                                <option value="todos" ${app.adminFilterGroup === 'todos' ? 'selected' : ''}>Todos los Grupos</option>
                                                <option value="A" ${app.adminFilterGroup === 'A' ? 'selected' : ''}>Grupo A</option>
                                                <option value="B" ${app.adminFilterGroup === 'B' ? 'selected' : ''}>Grupo B</option>
                                                <option value="C" ${app.adminFilterGroup === 'C' ? 'selected' : ''}>Grupo C</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Maestro Evaluado</label>
                                            <select class="w-full border rounded-xl p-2.5 text-sm font-bold bg-white" onchange="app.setAdminFilterTeacher(this.value)">
                                                <option value="todos" ${app.adminFilterTeacher === 'todos' ? 'selected' : ''}>Seleccionar Maestro...</option>
                                                ${applicableTeachersForSelect.map(t => `<option value="${t.id}" ${app.adminFilterTeacher == t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                                    <div class="bg-white p-4 rounded-xl border flex items-center gap-3">
                                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center text-lg"><i class="fas fa-file-alt"></i></div>
                                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Muestras</p><p class="text-xl font-black">${totalEvaluations}</p></div>
                                    </div>
                                    <div class="bg-white p-4 rounded-xl border flex items-center gap-3">
                                        <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-lg flex items-center justify-center text-lg"><i class="fas fa-users"></i></div>
                                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Plantilla</p><p class="text-xl font-black">${teachersList.length}</p></div>
                                    </div>
                                    <div class="bg-white p-4 rounded-xl border flex items-center gap-3">
                                        <div class="w-10 h-10 bg-green-100 text-green-600 rounded-lg flex items-center justify-center text-lg"><i class="fas fa-percentage"></i></div>
                                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Cobertura</p><p class="text-xl font-black">${completionRate}%</p></div>
                                    </div>
                                    <div class="bg-white p-4 rounded-xl border flex items-center gap-3">
                                        <div class="w-10 h-10 bg-yellow-100 text-yellow-600 rounded-lg flex items-center justify-center text-lg"><i class="fas fa-star"></i></div>
                                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Promedio</p><p class="text-xl font-black">${avgScore}</p></div>
                                    </div>
                                </div>
                    `;

                    // DESGLOSE POR MAESTRO SELECCIONADO
                    if (app.adminFilterTeacher !== 'todos') {
                        const selectedTeacherObj = teachersList.find(t => t.id == app.adminFilterTeacher);
                        if (selectedTeacherObj) {
                            const levelForAnalysis = app.adminFilterLevel !== 'todos' ? app.adminFilterLevel : selectedTeacherObj.levels[0];
                            const questionsList = MOCK_QUESTIONS[levelForAnalysis] || [];

                            html += `
                                <div class="bg-white rounded-xl border p-5 mb-6 fade-in">
                                    <div class="flex items-center gap-3 border-b pb-4 mb-4">
                                        <div class="w-12 h-12 bg-blue-50 border rounded-full flex items-center justify-center text-2xl">
                                            ${selectedTeacherObj.gender === 'F' ? '👩‍🏫' : '👨‍🏫'}
                                        </div>
                                        <div>
                                            <span class="text-[10px] font-bold text-primary uppercase tracking-wide">Reporte Detallado</span>
                                            <h3 class="text-xl font-black text-gray-800">${selectedTeacherObj.name}</h3>
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            `;

                            questionsList.forEach((q, index) => {
                                if (q.isGeneral) return; 
                                let countA = 0; let countB = 0; let countC = 0; let totalQ = 0;

                                filteredSubs.forEach(sub => {
                                    if(sub.answers) {
                                        const ans = sub.answers[`q${index}`];
                                        if (ans) {
                                            totalQ++;
                                            if (['SIEMPRE', 'happy', 'yes'].includes(ans)) countA++;
                                            else if (['A VECES', 'neutral'].includes(ans)) countB++;
                                            else if (['NUNCA', 'sad', 'no'].includes(ans)) countC++;
                                        }
                                    }
                                });

                                const pA = totalQ > 0 ? Math.round((countA / totalQ) * 100) : 0;
                                const pB = totalQ > 0 ? Math.round((countB / totalQ) * 100) : 0;
                                const pC = totalQ > 0 ? Math.round((countC / totalQ) * 100) : 0;

                                html += `
                                    <div class="bg-gray-50 p-4 rounded-xl border">
                                        <p class="text-xs font-bold text-gray-700 mb-3">${q.text || q}</p>
                                        <div class="space-y-2 text-[11px] font-bold">
                                            <div class="flex justify-between"><span>Excelente / Sí: ${pA}%</span><span class="text-gray-400">${countA}</span></div>
                                            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden"><div class="bg-green-500 h-full" style="width: ${pA}%"></div></div>
                                            
                                            ${levelForAnalysis !== 'personal_cgb' ? `
                                            <div class="flex justify-between mt-1"><span>Regular: ${pB}%</span><span class="text-gray-400">${countB}</span></div>
                                            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden"><div class="bg-yellow-400 h-full" style="width: ${pB}%"></div></div>
                                            ` : ''}

                                            <div class="flex justify-between mt-1"><span>Malo / No: ${pC}%</span><span class="text-gray-400">${countC}</span></div>
                                            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden"><div class="bg-red-500 h-full" style="width: ${pC}%"></div></div>
                                        </div>
                                    </div>
                                `;
                            });

                            html += `</div></div>`;
                        }
                    }

                    // TABLA GENERAL DE PROFESORES
                    html += `
                            <div class="bg-white rounded-xl border overflow-hidden">
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left text-xs">
                                        <thead>
                                            <tr class="bg-gray-50 text-gray-500 uppercase tracking-wider border-b">
                                                <th class="p-3 font-bold">Docente</th>
                                                <th class="p-3 font-bold text-center">Evaluaciones</th>
                                                <th class="p-3 font-bold text-center">Puntaje</th>
                                                <th class="p-3 font-bold text-right">Acción</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y">
                                            ${teachersList.map(teacher => {
                                                if (app.adminFilterLevel !== 'todos' && !teacher.levels.includes(app.adminFilterLevel)) return '';

                                                const tSubs = MOCK_SUBMISSIONS.filter(sub => {
                                                    if (sub.teacherId !== teacher.id) return false;
                                                    if (app.adminFilterLevel !== 'todos' && sub.role !== app.adminFilterLevel) return false;
                                                    if (app.adminFilterGrade !== 'todos' && sub.grade != app.adminFilterGrade) return false;
                                                    if (app.adminFilterGroup !== 'todos' && sub.group !== app.adminFilterGroup) return false;
                                                    return true;
                                                });

                                                let tSum = 0; let tCount = 0;
                                                tSubs.forEach(s => {
                                                    for (let q = 0; q < 9; q++) {
                                                        const val = s.answers ? s.answers[`q${q}`] : null;
                                                        if (val === 'SIEMPRE' || val === 'happy' || val === 'yes') { tSum += 5; tCount++; }
                                                        else if (val === 'A VECES' || val === 'neutral') { tSum += 3; tCount++; }
                                                        else if (val === 'NUNCA' || val === 'sad' || val === 'no') { tSum += 1; tCount++; }
                                                    }
                                                });
                                                const score = tCount > 0 ? (tSum / tCount).toFixed(1) : '-';

                                                return `
                                                <tr class="hover:bg-gray-50">
                                                    <td class="p-3 font-bold text-gray-800">${teacher.name}</td>
                                                    <td class="p-3 text-center"><span class="px-2 py-0.5 rounded-full bg-blue-50 text-primary font-bold">${tSubs.length}</span></td>
                                                    <td class="p-3 text-center font-bold text-yellow-600">${score !== '-' ? '★ ' + score : '-'}</td>
                                                    <td class="p-3 text-right">
                                                        <button onclick="app.setAdminFilterTeacher(${teacher.id})" class="text-primary border border-primary px-2 py-1 rounded hover:bg-primary hover:text-white font-bold transition-all">Analizar</button>
                                                    </td>
                                                </tr>`;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            ${renderLightAuthorship()}
                        </div>
                    `;
                    return html;
                }
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
