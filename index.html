    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
            min-height: 100vh;
        }
        /* Cristalografía premium */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        /* Animación para Rombos Rotados (Diamonds Scale 1 al 5) */
        .diamond-pulse {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .diamond-pulse:hover {
            transform: rotate(45deg) scale(1.15);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }
        /* Confeti dinámico para pantalla de éxito en primaria */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            animation: confetti-fall 3s linear infinite;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        /* Brinco interactivo de Bretax y Maestros */
        @keyframes bretax-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.03); }
        }
        .bretax-celebrate {
            animation: bretax-bounce 2s ease-in-out infinite;
        }
        /* Animación de flotación suave para los maestros guías */
        @keyframes teacher-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1.5deg); }
        }
        .animate-teacher-float {
            animation: teacher-float 3.5s ease-in-out infinite;
        }
        .animate-teacher-float-delayed {
            animation: teacher-float 3.5s ease-in-out infinite;
            animation-delay: 1.5s;
        }
        /* Transiciones fluidas para notificaciones Toast */
        .toast-enter {
            animation: slide-in 0.3s ease-out forwards;
        }
        .toast-exit {
            animation: slide-out 0.3s ease-in forwards;
        }
        @keyframes slide-in {
            from { transform: translateY(100%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes slide-out {
            from { transform: translateY(0) scale(1); opacity: 1; }
            to { transform: translateY(100%) scale(0.9); opacity: 0; }
        }
        @keyframes scaleUp {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.3)); }
            50% { filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.6)); }
        }
        .animate-scaleUp {
            animation: scaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-pulseGlow {
            animation: pulseGlow 3s infinite alternate;
        }
    </style>
</head>

            checkTeacherLevel(teacherLevels, userRole) {
                if (!teacherLevels || !userRole) return false;
                const cleanString = (str) => {
                    if (!str) return "";
                    return str.toLowerCase()
                        .normalize("NFD")
                        .replace(/[\u0300-\u036f]/g, "") 
                        .replace(/[^a-z0-9]/g, "");     
                };
                const normUserRole = cleanString(userRole); 
                return teacherLevels.some(level => {
                    if (!level) return false;
                    const normLevel = cleanString(level);
                    if (normLevel === normUserRole) return true;
                    const singLevel = normLevel.endsWith('s') ? normLevel.slice(0, -1) : normLevel;
                    const singUser = normUserRole.endsWith('s') ? normUserRole.slice(0, -1) : normUserRole;
                    if (singLevel === singUser) return true;
                    if (singLevel === "primaria" && (singUser === "primariabaja" || singUser === "primariaalta")) {
                        return true;
                    }
                    if (normLevel.includes(normUserRole) || normUserRole.includes(normLevel)) {
                        return true;
                    }
                    return false;
                });
            },

            getTeacherCleanName(fullName) {
                if (!fullName) return "";
                const match = fullName.match(/^([^(]+)\s*\(([^)]+)\)/);
                return match ? match[1].trim() : fullName.trim();
            },

            getTeacherSubject(fullName) {
                if (!fullName) return "Docente";
                const match = fullName.match(/^([^(]+)\s*\(([^)]+)\)/);
                return match ? match[2].trim() : "Docente";
            },

            getTeacherInitials(name) {
                if (!name) return "DOC";
                let cleanName = this.getTeacherCleanName(name);
                let clean = cleanName.replace(/^(Mr\.|Miss|Prof\.|Profe\.|Dr\.|Dra\.)\s+/i, '').trim();
                let parts = clean.split(/\s+/);
                let initials = "";
                if (parts[0]) initials += parts[0][0];
                if (parts[1]) initials += parts[1][0];
                return initials.toUpperCase() || "CGB";
            },

            fetchWithTimeout(url, options = {}, timeout = 15000) {
                const safeOptions = options === null ? {} : options;
                return Promise.race([
                    fetch(url, safeOptions),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout de red')), timeout))
                ]);
            },

                            responses['aprendiMas'] = dIdx === 0 ? (studentRole === 'secundaria' ? "Español, Matemáticas" : "Cálculo, Cultura digital") : "";
                            responses['clasesMejorar'] = dIdx === 0 ? (studentRole === 'secundaria' ? "Francés, Pintura" : "Francés, Química") : "";
                            responses['comentarioLibre'] = dIdx === 0 ? comments[Math.floor(Math.random() * comments.length)] : "";
                        }

                        MOCK_SUBMISSIONS.push({
                            studentEmail: email,
                            studentRole: studentRole,
                            studentGrade: grade,
                            studentGroup: group,
                            studentName: `Alumno Probeta ${i+1}`,
                            teacherId: teacher.id,
                            teacherName: teacher.name,
                            responses: responses,
                            promedio: (Math.random() * 1.5 + 3.5).toFixed(2),
                            timestamp: new Date(Date.now() - Math.random() * 10 * 24 * 60 * 60 * 1000).toLocaleString('es-MX', { timeZone: 'America/Mexico_City' })
                        });
                    });
                }
            },

            async fetchInitialData() {
                if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.trim() === '' || GOOGLE_SHEETS_API_URL.includes("Pega_Aquí")) {
                    appTeachers = FALLBACK_TEACHERS;
                    appSubmissions = [];
                    showToast("Cargado en modo simulación local", "info");
                    return;
                }
                const spinner = document.getElementById('loading-spinner');
                if (spinner) spinner.classList.remove('hidden');

                try {
                    const response = await this.fetchWithTimeout(GOOGLE_SHEETS_API_URL + "?action=getInitialData", {}, 15000);
                    const data = await response.json();
                    
                    if (data && data.status === "ERROR") {
                        throw new Error(data.message);
                    }

                    if (data && Array.isArray(data.teachers)) {
                        appTeachers = data.teachers;
                        appEmails = data.emails || [];
                        appEmailsLevels = data.emailLevels || {}; 
                        showToast("¡Conectado exitosamente al servidor CGB!", "success");
                    } else {
                        throw new Error("Estructura de datos incorrecta.");
                    }
                } catch (error) {
                    console.warn("Utilizando Fallback local:", error);
                    appTeachers = FALLBACK_TEACHERS;
                    appEmails = [];
                    appEmailsLevels = {};
                    showToast("Modo local: Error de conexión", "info");
                }

                try {
                    const subResponse = await this.fetchWithTimeout(GOOGLE_SHEETS_API_URL + "?action=getSubmissions", {}, 15000);
                    const subData = await subResponse.json();
                    if (subData && subData.status === "SUCCESS" && Array.isArray(subData.submissions)) {
                        appSubmissions = subData.submissions;
                    } else {
                        appSubmissions = [];
                    }
                } catch (e) {
                    appSubmissions = [];
                }

                if (spinner) spinner.classList.add('hidden');
                app.render();
            },

            processLogin() {
                const role = document.getElementById('login-role').value;
                const email = document.getElementById('login-email')?.value.trim() || "";
                const password = document.getElementById('login-password')?.value.trim() || "";
                const grade = document.getElementById('login-grade')?.value || "N/A";
                const group = document.getElementById('login-group')?.value || "N/A";
                const emailNormalized = email.toLowerCase().trim();

                const existingErrBox = document.getElementById('email-error-msg');
                if (existingErrBox) existingErrBox.remove();

                if (!role) {
                    showToast("Por favor selecciona tu nivel o perfil", "error");
                    return;
                }

                let studentName = "Anónimo";
                if (role === 'primaria_baja') {
                    const inputName = document.getElementById('login-student-name')?.value.trim();
                    if (!inputName) {
                        showToast("¡Por favor escribe tu nombre completo para comenzar! 🦖", "error");
                        return;
                    }
                    studentName = inputName.toUpperCase(); 
                }

                if (role === 'admin') {
                    if (!password) {
                        showToast("La contraseña es obligatoria para administradores", "error");
                        return;
                    }
                    const cleanPass = password.replace(/\s+/g, '').toLowerCase();
                    let matchedEmail = emailNormalized;
                    let isValidAdmin = false;

                    if (cleanPass === 'arturo2026') {
                        matchedEmail = emailNormalized || 'sir.artorio@gmail.com';
                        isValidAdmin = true;
                    } else if (cleanPass === 'admin2026') {
                        matchedEmail = emailNormalized || 'coord.academica@cgb.edu.mx';
                        isValidAdmin = true;
                    } else if (cleanPass === 'dir2026') {
                        matchedEmail = emailNormalized || 'direc.general@cgb.edu.mx';
                        isValidAdmin = true;
                    }

                    if (isValidAdmin) {
                        this.currentUser = { role, email: matchedEmail, grade: "N/A", group: "N/A", name: "Administrador" };
                        showToast("Sesión de administrador iniciada con éxito", "success");
                        this.navigate('admin');
                        return;
                    } else {
                        showToast("Contraseña de administrador incorrecta", "error");
                        return;
                    }
                }

                const requiresEmail = ['primaria_alta', 'secundaria', 'bachillerato', 'coordinadores', 'directores'].includes(role);
                if (requiresEmail && !email) {
                    showToast("El correo electrónico es requerido para este perfil", "error");
                    return;
                }

                const isTestBypass = emailNormalized === 'sir.artorio@gmail.com';

                if (requiresEmail && !isTestBypass) {
                    const isRegisteredTeacherInList = appTeachers.some(t => t.email && t.email.toLowerCase().trim() === emailNormalized);
                    const emailLevelVal = (appEmailsLevels[emailNormalized] || "").toLowerCase().trim();
                    const isTeacherByLevelLabel = ['maestro', 'docente', 'profesor', 'coordinadores', 'directores', 'docentes', 'maestros'].includes(emailLevelVal);
                    const isTeacherIdentified = isRegisteredTeacherInList || isTeacherByLevelLabel;

                    if (['coordinadores', 'directores'].includes(role)) {
                        if (!isTeacherIdentified) {
                            showToast("Acceso denegado para este correo.", "error");
                            const errBox = document.createElement('div');
                            errBox.id = 'email-error-msg';
                            errBox.className = 'mt-3 text-xs font-semibold text-red-700 bg-red-50 p-3.5 rounded-xl border border-red-200/60 flex flex-col gap-2 shadow-sm';
                            errBox.innerHTML = `
                                <div class="flex items-start gap-2">
                                    <i class="fas fa-exclamation-triangle text-sm mt-0.5 shrink-0"></i>
                                    <span><strong>Acceso denegado:</strong> El correo ingresado no pertenece a ningún docente registrado o activo en la base de datos actual del CGB.</span>
                                </div>
                            `;
                            document.getElementById('email-container').appendChild(errBox);
                            return;
                        }
                    } else {
                        if (appEmails.length > 0 && !appEmails.includes(emailNormalized)) {
                            showToast("Este correo no se encuentra autorizado para evaluar.", "error");
                            const errBox = document.createElement('div');
                            errBox.id = 'email-error-msg';
                            errBox.className = 'mt-2 text-xs font-semibold text-red-600 bg-red-50 p-2 rounded-lg border border-red-100';
                            errBox.innerText = "Error: El correo electrónico ingresado no coincide con ningún estudiante registrado en la lista oficial CGB.";
                            document.getElementById('email-container').appendChild(errBox);
                            return;
                        }

                        if (appEmailsLevels && Object.keys(appEmailsLevels).length > 0) {
                            const assignedLevel = appEmailsLevels[emailNormalized] || "todos";
                            if (assignedLevel !== "todos") {
                                let isLevelMatch = false;
                                if (role === "secundaria" && assignedLevel.includes("secundaria")) {
                                    isLevelMatch = true;
                                } else if (role === "primaria_alta" && (assignedLevel.includes("primaria_alta") || assignedLevel.includes("primaria alta") || assignedLevel === "primaria")) {
                                    isLevelMatch = true;
                                } else if (role === "bachillerato" && (assignedLevel.includes("bachillerato") || assignedLevel.includes("grupo_"))) {
                                    isLevelMatch = true;
                                    if (assignedLevel.startsWith("grupo_") && assignedLevel !== group) {
                                        isLevelMatch = false;
                                        showToast(`Tu grupo registrado es el ${assignedLevel.replace("grupo_", "").toUpperCase()}`, "error");
                                        return;
                                    }
                                } else if (assignedLevel === role) {
                                    isLevelMatch = true;
                                }
                                if (!isLevelMatch) {
                                    showToast(`Este correo está registrado para otro nivel o grupo`, "error");
                                    return;
                                }
                            }
                        }
                    }
                }

                const allSubs = GOOGLE_SHEETS_API_URL && GOOGLE_SHEETS_API_URL.trim() !== "" && !GOOGLE_SHEETS_API_URL.includes("Pega_Aquí") ? appSubmissions : MOCK_SUBMISSIONS;

                if (['coordinadores', 'directores'].includes(role) && !isTestBypass) {
                    const teachersListToEvaluate = appTeachers.length > 0 ? appTeachers : FALLBACK_TEACHERS;
                    const targetsInLevel = teachersListToEvaluate.filter(t => app.checkTeacherLevel(t.levels, role));
                    const evaluatedIdsForThisRole = allSubs
                        .filter(sub => sub.studentEmail && sub.studentEmail.toLowerCase().trim() === emailNormalized && sub.studentRole === role)
                        .map(sub => parseInt(sub.teacherId));

                    const pendingTargets = targetsInLevel.filter(t => !evaluatedIdsForThisRole.includes(parseInt(t.id)));
                    if (pendingTargets.length === 0 && targetsInLevel.length > 0) {
                        this.showCompletionCelebration = true;
                    }
                } else {
                    const alreadySubmitted = requiresEmail && !isTestBypass && allSubs.some(sub => 
                        sub.studentEmail && 
                        sub.studentEmail.toLowerCase().trim() === emailNormalized &&
                        sub.studentRole === role
                    );
                    if (alreadySubmitted) {
                        showToast("Este correo ya ha realizado su evaluación de este semestre.", "error");
                        return;
                    }
                }

                const finalEmail = (role === 'primaria_baja' && !email) ? `primaria.${grade.replace('º','')}${group.toLowerCase()}@cgb.edu.mx` : emailNormalized;
                this.currentUser = { role, email: finalEmail, grade, group, name: studentName };

                const activeSubs = GOOGLE_SHEETS_API_URL && GOOGLE_SHEETS_API_URL.trim() !== "" && !GOOGLE_SHEETS_API_URL.includes("Pega_Aquí") ? appSubmissions : MOCK_SUBMISSIONS;
                this.evaluatedTeachers = activeSubs
                    .filter(sub => sub.studentEmail && sub.studentEmail.toLowerCase().trim() === finalEmail && sub.studentRole === role)
                    .map(sub => parseInt(sub.teacherId));

                showToast("¡Sesión iniciada correctamente!", "success");
                this.navigate('welcome'); 
            },

            async submitEvaluation() {
                if (this.isSubmitting) return; 

                const teacher = appTeachers.find(t => t.id === this.selectedTeacher);
                const questions = MOCK_QUESTIONS[this.currentUser.role];
                const activeQuestions = questions.filter(q => {
                    if (q.isGeneral && this.hasAnsweredGeneralQuestions) return false;
                    return true;
                });

                for (let q of activeQuestions) {
                    if (q.type === 'textarea') {
                        const val = document.getElementById('text-q-' + q.id).value.trim();
                        this.formResponses[q.id] = val;
                        const isDirectivoOrCoordinador = this.currentUser.role === 'coordinadores' || this.currentUser.role === 'directores';
                        const isRequiredId = q.id === 13 || q.id === 14 || q.id === 15;

                        if (isDirectivoOrCoordinador && isRequiredId) {
                            if (val === '') {
                                showToast(`Por favor responde la pregunta obligatoria: "${q.text.substring(0, 45)}..."`, "error");
                                const element = document.getElementById('text-q-' + q.id);
                                if (element) {
                                    element.focus();
                                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                }
                                return;
                            }
                        }
                        continue;
                    }
                    if (this.formResponses[q.id] === undefined) {
                        showToast(`Por favor responde la pregunta: "${q.text.substring(0, 30)}..."`, "error");
                        return;
                    }
                }

                this.isSubmitting = true;
                const submitBtn = document.querySelector('button[onclick="app.submitEvaluation()"]');
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner animate-spin mr-2"></i> Sincronizando...';
                    submitBtn.classList.add('opacity-60', 'cursor-not-allowed');
                }

                let scoreSum = 0;
                let scoreCount = 0;
                Object.entries(this.formResponses).forEach(([qId, value]) => {
                    const questionObj = questions.find(q => q.id == qId);
                    if (!questionObj) return;
                    const numVal = this.getNumericalValue(questionObj.type, value);
                    if (numVal !== null) {
                        scoreSum += numVal;
                        scoreCount++;
                    }
                });
                const promedioCalculado = scoreCount > 0 ? (scoreSum / scoreCount).toFixed(2) : "0.00";

                const payload = {
                    Fecha: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' }),
                    studentRole: this.currentUser.role,
                    studentEmail: this.currentUser.email || "Anónimo",
                    teacherId: teacher.id,
                    teacherName: teacher.name,
                    promedio: promedioCalculado,
                    responses: this.formResponses,
                    studentGrade: this.currentUser.grade || "N/A",
                    studentGroup: this.currentUser.group || "N/A",
                    studentName: this.currentUser.name || "N/A"
                };

                appSubmissions.push(payload);

                if (GOOGLE_SHEETS_API_URL && GOOGLE_SHEETS_API_URL.trim() !== '' && !GOOGLE_SHEETS_API_URL.includes("Pega_Aquí")) {
                    showToast("Sincronizando evaluación...", "info");
                    try {
                        await fetch(GOOGLE_SHEETS_API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payload)
                        });
                        showToast("¡Evaluación enviada con éxito!", "success");
                    } catch (err) {
                        console.error("Error al sincronizar con Sheets:", err);
                        showToast("Guardado localmente de forma segura.", "info");
                    }
                } else {
                    showToast("¡Evaluación completada con éxito!", "success");
                }

                if (!this.hasAnsweredGeneralQuestions) {
                    this.hasAnsweredGeneralQuestions = true;
                }
                this.evaluatedTeachers.push(teacher.id);

                const activeTeachers = appTeachers.filter(t => this.checkTeacherLevel(t.levels, this.currentUser.role) && !this.hiddenTeachers.includes(t.id));
                const allDone = activeTeachers.every(t => this.evaluatedTeachers.includes(t.id));
                if (allDone && activeTeachers.length > 0) {
                    this.showCompletionCelebration = true;
                }
                this.navigate('portal');
            },

            closeCelebration() {
                this.showCompletionCelebration = false;
                this.hasSeenCelebration = true;
                if (this.currentUser.role === 'primaria_baja' || this.currentUser.role === 'primaria_alta') {
                    this.logout();
                } else {
                    this.render();
                }
            },

            startSecFormFlow() {
                if (this.selectedTeachersSec.length < 1) {
                    showToast("Debes tener al menos 1 profesor activo para comenzar", "error");
                    return;
                }
                this.currentSecTeacherIndex = 0;
                this.secAnswers = {};
                this.navigate('form');
            },

            selectSecOption(questionId, val) {
                const teacherId = this.selectedTeachersSec[this.currentSecTeacherIndex];
                if (!this.secAnswers[teacherId]) {
                    this.secAnswers[teacherId] = {};
                }
                this.secAnswers[teacherId][questionId] = val;

                const secButtons = document.querySelectorAll(`[data-question-sec="${questionId}"]`);
                secButtons.forEach(btn => {
                    const btnVal = btn.getAttribute('data-value');
                    if (btnVal === val) {
                        btn.classList.add('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.remove('border-gray-200', 'bg-white');
                    } else {
                        btn.classList.remove('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.add('border-gray-200', 'bg-white');
                    }
                });
            },

            saveProgressSecTeacher() {
                const teacherId = this.selectedTeachersSec[this.currentSecTeacherIndex];
                const questions = MOCK_QUESTIONS[this.currentUser.role];
                if (!this.secAnswers[teacherId]) {
                    this.secAnswers[teacherId] = {};
                }
                questions.forEach(q => {
                    const btnActivo = document.querySelector(`[data-question-sec="${q.id}"].border-primary`);
                    if (btnActivo) {
                        this.secAnswers[teacherId][q.id] = btnActivo.getAttribute('data-value');
                    }
                });
            },

            jumpToSecTeacher(index) {
                this.saveProgressSecTeacher(); 
                this.currentSecTeacherIndex = index;
                this.render(); 
            },

            nextSecTeacher() {
                this.saveProgressSecTeacher();
                const teacherId = this.selectedTeachersSec[this.currentSecTeacherIndex];
                const questions = MOCK_QUESTIONS[this.currentUser.role];
                for (let q of questions) {
                    if (!this.secAnswers[teacherId] || this.secAnswers[teacherId][q.id] === undefined) {
                        showToast("Responde todas las preguntas de este profesor antes de avanzar", "error");
                        return;
                    }

                if (this.currentSecTeacherIndex < this.selectedTeachersSec.length - 1) {
                    this.currentSecTeacherIndex++;
                    this.render();
                } else {
                    this.navigate('sec_final');
                }

            selectDirOption(val) {

                }

                if (checked.length > 3) {
                    checkbox.checked = false;
                    showToast("Solo puedes seleccionar un máximo de 3 asignaturas", "error");

            async submitSecundariaFinal() {
                if (this.isSubmitting) return; 
                this.saveProgressSecTeacher(); 
                
                const dirOptsSelected = [];
                if (document.getElementById('dir-opt-trabajo')?.checked) dirOptsSelected.push("Su trabajo es cercano y positivo para mí.");
                if (document.getElementById('dir-opt-escucha')?.checked) dirOptsSelected.push("Me escucha.");
                if (document.getElementById('dir-opt-resuelve')?.checked) dirOptsSelected.push("Busca resolver mis necesidades.");
                if (document.getElementById('dir-opt-dialogo')?.checked) dirOptsSelected.push("Se presta al diálogo.");
                if (document.getElementById('dir-opt-todas')?.checked) dirOptsSelected.push("Todas las anteriores");
                if (document.getElementById('dir-opt-ninguna')?.checked) dirOptsSelected.push("Ninguna de las anteriores");

                let aprendiMasTxt = "N/A";
                let clasesMejorarTxt = "N/A";
                const isBach = this.currentUser.role === 'bachillerato';
                const prefix = isBach ? "bach" : "sec";
                const subjects = isBach ? SUBJECTS_BACHILLERATO : SUBJECTS_SECUNDARIA;

                const aprendiList = [];
                const mejorarList = [];
                subjects.forEach((sub, idx) => {
                    if (document.getElementById(`${prefix}-aprendi-${idx}`)?.checked) aprendiList.push(sub);
                    if (document.getElementById(`${prefix}-mejorar-${idx}`)?.checked) mejorarList.push(sub);
                });

                if (aprendiList.length === 0 || mejorarList.length === 0) {
                    showToast("Por favor selecciona al menos 1 asignatura para cada sección (máximo 3)", "error");
                    return;
                }
                if (aprendiList.length > 3 || mejorarList.length > 3) {
                    showToast("Puedes seleccionar un máximo de 3 asignaturas por sección", "error");
                    return;
                }
                aprendiMasTxt = aprendiList.join(", ");
                clasesMejorarTxt = mejorarList.join(", ");

                if (dirOptsSelected.length === 0) {
                    showToast("Por favor responde la Sección de la Dirección", "error");
                    return;
                }

                let maestrosIncompletos = [];
                const questions = MOCK_QUESTIONS[this.currentUser.role];
                
                this.selectedTeachersSec.forEach(teacherId => {
                    const ans = this.secAnswers[teacherId] || {};
                    const respondidas = Object.keys(ans).filter(qId => ans[qId] !== undefined).length;
                    if (respondidas < questions.length) {
                        const tObj = appTeachers.find(t => t.id === teacherId) || FALLBACK_TEACHERS.find(t => t.id === teacherId);
                        maestrosIncompletos.push(app.getTeacherCleanName(tObj.name));
                    }
                });

                if (maestrosIncompletos.length > 0) {
                    showToast("Falta responder todas las preguntas de tus maestros seleccionados.", "error");
                    return;
                }

                this.isSubmitting = true;
                const submitBtn = document.querySelector('button[onclick="app.submitSecundariaFinal()"]');
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner animate-spin mr-2"></i> Procesando todo...';
                    submitBtn.classList.add('opacity-60', 'cursor-not-allowed');
                }

                showToast("Enviando todas tus evaluaciones...", "info");
                let lotePayload = [];

                for (let i = 0; i < this.selectedTeachersSec.length; i++) {
                    const teacherId = this.selectedTeachersSec[i];
                    let teacher = appTeachers.find(t => t.id === teacherId) || FALLBACK_TEACHERS.find(t => t.id === teacherId) || { id: teacherId, name: "Docente #" + teacherId };
                    
                    let sum = 0;
                    const ans = this.secAnswers[teacherId];
                    Object.values(ans).forEach(val => {
                        if (val === 'si') sum += 5;
                        else if (val === 'a_veces') sum += 3;
                        else sum += 1;
                    });
                    const promedioCalculado = (sum / questions.length).toFixed(2);

                    const responsesObj = {
                        ...ans,
                        aprendiMas: i === 0 ? aprendiMasTxt : "",
                        clasesMejorar: i === 0 ? clasesMejorarTxt : "",
                        direccionDesempeno: i === 0 ? dirOptsSelected : [],
                        comentarioLibre: i === 0 ? document.getElementById('sec-final-comentario').value.trim() : ""
                    };

                    lotePayload.push({
                        studentRole: this.currentUser.role,
                        studentEmail: this.currentUser.email || "Anónimo",
                        teacherId: teacher.id,
                        teacherName: teacher.name, 
                        promedio: promedioCalculado,
                        responses: responsesObj,
                        studentGrade: this.currentUser.grade || "N/A",
                        studentGroup: this.currentUser.group || "N/A",
                        studentName: this.currentUser.name || "N/A"
                    });
                }

                const payloadFinal = { evaluacionesLote: lotePayload };

                if (GOOGLE_SHEETS_API_URL && GOOGLE_SHEETS_API_URL.trim() !== '' && !GOOGLE_SHEETS_API_URL.includes("Pega_Aquí")) {
                    try {
                        await fetch(GOOGLE_SHEETS_API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payloadFinal)
                        });
                        showToast("¡Evaluaciones enviadas con éxito!", "success");
                    } catch (err) {
                        console.error("Error al sincronizar lote:", err);
                        showToast("Guardado localmente de forma segura.", "info");
                    }
                }

                lotePayload.forEach(sub => appSubmissions.push(sub));
                this.navigate('sec_thanks'); 
            },

            getFilteredSubmissions() {
                let filtered = this.adminSubmissions || [];
                const filterLevelNorm = String(this.adminFilterLevel).toLowerCase().trim();

                if (this.adminFilterLevel !== 'todos') {
                    filtered = filtered.filter(s => {
                        const subRole = String(s.studentRole || '').toLowerCase().replace(/[^a-z0-9]/g, '');
                        const targetRole = filterLevelNorm.replace(/[^a-z0-9]/g, '');
                        if (targetRole === 'primariaalta' && subRole === 'primaria') return true;
                        return subRole === targetRole;
                    });
                }
                if (this.adminFilterTeacher !== 'todos') {
                    filtered = filtered.filter(s => String(s.teacherId || '').trim() === String(this.adminFilterTeacher).trim());
                }
                if (this.adminFilterGrade !== 'todos') {
                    filtered = filtered.filter(s => String(s.studentGrade || '').toLowerCase().trim() === String(this.adminFilterGrade).toLowerCase().trim());
                }
                if (this.adminFilterGroup !== 'todos') {
                    filtered = filtered.filter(s => String(s.studentGroup || '').toLowerCase().trim() === String(this.adminFilterGroup).toLowerCase().trim());
                }
                return filtered;
            },

                const syncBtn = document.getElementById('sync-nube-btn');

            getNumericalValue(qType, value) {
                if (value === undefined || value === null || value === "") return null;
                let parsed = parseInt(value);
                if (!isNaN(parsed) && parsed >= 1 && parsed <= 5) {
                    return parsed;
                }
                let valStr = String(value).toLowerCase().trim()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "") 
                    .replace(/[^a-z0-9\s]/g, "");    
                if (valStr.includes('siempre') || valStr === 'si' || valStr === 'yes' || valStr === 'always' || valStr === 's') return 5;
                if (valStr.includes('veces') || valStr.includes('regular') || valStr === 'sometimes' || valStr === 'aveces') return 3;
                if (valStr.includes('nunca') || valStr === 'no' || valStr === 'never' || valStr === 'n') return 1;
                return null;
            },

            renderAdminCharts() {
                const resultsContainer = document.getElementById('admin-results');
                if (!resultsContainer) return;

                const findQuestionByKey = (questions, key) => {
                    let cleanKey = String(key).toLowerCase().replace(/[^0-9]/g, '');
                    if (cleanKey !== '') {
                        let idNum = parseInt(cleanKey);
                        let found = questions.find(q => q.id === idNum);
                        if (found) return found;
                    }
                    return questions.find(q => String(q.id).toLowerCase().trim() === String(key).toLowerCase().trim());
                };

                const filteredSubmissions = this.getFilteredSubmissions();
                if (filteredSubmissions.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="p-12 text-center bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                            <i class="fas fa-chart-line text-5xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium text-lg">No hay suficientes registros para el cruce de filtros seleccionado.</p>
                        </div>
                    `;
                    this.logDebug("Consulta vacía: No se encontraron respuestas con los filtros actuales.", "info");
                    return;
                }

                let totalPromedioSum = 0;
                let totalPromedioCount = 0;
                let teacherScores = {}; 
                let questionScores = {}; 
                let teacherVotesCount = {};
                currentGroupedStudents = {};

                filteredSubmissions.forEach(sub => {
                    const cleanRole = String(sub.studentRole || '').toLowerCase().replace(/[^a-z0-9]/g, '');
                    let questionRole = 'secundaria'; 
                    if (cleanRole === 'primariabaja') questionRole = 'primaria_baja';
                    else if (cleanRole === 'primariaalta' || cleanRole === 'primaria') questionRole = 'primaria_alta';
                    else if (cleanRole === 'secundaria') questionRole = 'secundaria';
                    else if (cleanRole === 'bachillerato') questionRole = 'bachillerato';
                    else if (cleanRole === 'coordinadores') questionRole = 'coordinadores';
                    else if (cleanRole === 'directores') questionRole = 'directores';
                    
                    const questions = MOCK_QUESTIONS[questionRole] || [];
                    let rResponses = sub.responses;
                    if (typeof rResponses === 'string') {
                        try { rResponses = JSON.parse(rResponses); } catch (e) { rResponses = {}; }
                    }

                    const teacherName = sub.teacherName || "Docente Desconocido";
                    teacherVotesCount[teacherName] = (teacherVotesCount[teacherName] || 0) + 1;

                    const subPromedio = parseFloat(sub.promedio);
                    if (!isNaN(subPromedio)) {
                        totalPromedioSum += subPromedio;
                        totalPromedioCount++;

                        if (!teacherScores[teacherName]) {
                            teacherScores[teacherName] = { sum: 0, count: 0 };
                        }
                        teacherScores[teacherName].sum += subPromedio;
                        teacherScores[teacherName].count++;
                    }

                    Object.entries(rResponses || {}).forEach(([qId, value]) => {
                        const questionObj = findQuestionByKey(questions, qId);
                        if (!questionObj) return;

                        const numVal = this.getNumericalValue(questionObj.type, value);
                        if (numVal !== null) {
                            const qKey = `Pregunta ${questionObj.id}`;
                            if (!questionScores[qKey]) {
                                questionScores[qKey] = { sum: 0, count: 0 };
                            }
                            questionScores[qKey].sum += numVal;
                            questionScores[qKey].count++;
                        }
                    });

                    const emailKey = String(sub.studentEmail || '').toLowerCase().trim();
                    if (emailKey !== "") {
                        if (!currentGroupedStudents[emailKey]) {
                            currentGroupedStudents[emailKey] = {
                                studentEmail: sub.studentEmail,
                                studentName: sub.studentName || sub.studentEmail.split('@')[0],
                                studentRole: sub.studentRole,
                                studentGrade: sub.studentGrade,
                                studentGroup: sub.studentGroup,
                                scoreSum: 0,
                                scoreCount: 0,
                                evaluaciones: []
                            };
                        }
                        currentGroupedStudents[emailKey].evaluaciones.push(sub);
                        if (!isNaN(subPromedio)) {
                            currentGroupedStudents[emailKey].scoreSum += subPromedio;
                            currentGroupedStudents[emailKey].scoreCount++;
                        }
                    }
                });

                let globalAverage = totalPromedioCount > 0 ? (totalPromedioSum / totalPromedioCount).toFixed(2) : "0.00";
                let topTeacher = "N/A";
                let topTeacherAvg = 0;
                Object.entries(teacherScores).forEach(([name, data]) => {
                    const avg = data.sum / data.count;
                    if (avg > topTeacherAvg) {
                        topTeacherAvg = avg;
                        topTeacher = name;
                    }
                });

                let mostEvaluatedTeacher = "N/A";
                let maxEvaluations = 0;
                Object.entries(teacherVotesCount).forEach(([name, count]) => {
                    if (count > maxEvaluations) {
                        maxEvaluations = count;
                        mostEvaluatedTeacher = name;
                    }
                });

                resultsContainer.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-5 rounded-2xl shadow-md flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-center opacity-85 mb-2 text-xs font-bold uppercase tracking-wider">Promedio Global</div>
                                <div class="flex items-baseline gap-2">
                                    <span class="text-4xl font-extrabold">${globalAverage}</span>
                                    <span class="text-sm opacity-90">/ 5.0</span>

            getOpenQuestionLabel(role, qId) {
                const cleanRole = String(role).toLowerCase().replace(/[^a-z0-9]/g, '');
                if (cleanRole === 'primariabaja' || cleanRole === 'primariaalta' || cleanRole === 'primaria') {
                    if (qId === "12") return "Mensaje libre al docente";
                    if (qId === "10") return "Clase que más le gusta";
                    if (qId === "11") return "Clase que no le gusta mucho";
                }
                if (cleanRole === 'secundaria' || cleanRole === 'bachillerato') {
                    if (qId === "comentarioLibre") return "Comentarios de retroalimentación";
                    if (qId === "aprendiMas") return "Clases en las que ha aprendido más";
                    if (qId === "clasesMejorar") return "Clases por mejorar";
                }
                if (cleanRole === 'coordinadores') {
                    if (qId === "13") return "Relación con Docentes (Trato, respeto y cordialidad)";
                    if (qId === "14") return "Relación con la Comunidad Escolar";
                    if (qId === "15") return "Comentarios adicionales o sugerencias";
                }
                if (cleanRole === 'directores') {
                    if (qId === "14") return "Relación con Docentes (Trato, respeto y cordialidad)";
                    if (qId === "15") return "Relación con la Comunidad Escolar";
                    if (qId === "16") return "Comentarios adicionales o sugerencias";
                }
                return null;
            },

            renderAdminComments(filtered) {
                let commentsHTML = "";
                let hasComments = false;
                filtered.forEach(sub => {
                    let rResponses = sub.responses;
                    if (typeof rResponses === 'string') {
                        try { rResponses = JSON.parse(rResponses); } catch (e) { rResponses = {}; }
                    }
                    Object.entries(rResponses || {}).forEach(([qId, val]) => {
                        const label = this.getOpenQuestionLabel(sub.studentRole, qId);
                        if (label && typeof val === 'string' && val.trim() !== "") {
                            hasComments = true;
                            commentsHTML += `
                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 flex flex-col gap-2 shadow-sm text-left animate-scaleUp">
                                    <div class="flex justify-between items-start border-b border-slate-200/40 pb-2">
                                        <div class="flex flex-col">
                                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Figura Evaluada</span>
                                            <span class="text-sm font-bold text-primary">${sub.teacherName}</span>
                                        </div>
                                        <span class="text-[10px] bg-slate-200 text-slate-700 px-2.5 py-0.5 rounded-full font-mono font-extrabold uppercase tracking-wide">${sub.studentGrade || 'N/A'} - ${(sub.studentGroup || '').replace("grupo_", "").toUpperCase() || 'N/A'}</span>
                                    </div>
                                    <div>
                                        <span class="text-[10px] font-extrabold text-blue-600/80 uppercase tracking-widest block mb-1">${label}</span>
                                        <p class="text-slate-700 text-xs italic bg-white p-3 rounded-lg border border-slate-100 shadow-inner">"${val}"</p>
                                    </div>
                                </div>
                            `;
                        }
                    });
                });
                return hasComments ? commentsHTML : `<p class="text-slate-400 text-sm italic text-center py-8">No se encontraron comentarios abiertos con el criterio de filtrado activo.</p>`;
            },

            initChartDocentes(teacherScores) {
                const ctx = document.getElementById('chart-docentes')?.getContext('2d');
                if (!ctx) return;
                const labels = Object.keys(teacherScores);
                const data = labels.map(name => {
                    const d = teacherScores[name];
                    return (d.sum / d.count).toFixed(2);
                });
                const backgroundColors = data.map(val => {
                    const numVal = parseFloat(val);
                    if (numVal < 2.5) return 'rgba(239, 68, 68, 0.75)';     
                    if (numVal < 4.0) return 'rgba(234, 179, 8, 0.75)';     
                    return 'rgba(16, 185, 129, 0.75)';                     
                });
                const borderColors = data.map(val => {
                    const numVal = parseFloat(val);
                    if (numVal < 2.5) return 'rgba(185, 28, 28, 1)';       
                    if (numVal < 4.0) return 'rgba(202, 138, 4, 1)';       
                    return 'rgba(4, 120, 87, 1)';                         
                });

                if (this.activeCharts.docentes) this.activeCharts.docentes.destroy();
                this.activeCharts.docentes = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Calificación Promedio',
                            data: data,
                            backgroundColor: backgroundColors,
                            borderColor: borderColors,
                            borderWidth: 1.5,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { min: 1, max: 5, ticks: { stepSize: 1 } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            },

            initChartPreguntas(questionScores) {
                const ctx = document.getElementById('chart-preguntas')?.getContext('2d');
                if (!ctx) return;
                const currentLevel = String(this.adminFilterLevel === 'todos' ? 'secundaria' : this.adminFilterLevel).toLowerCase().trim();
                const levelQuestions = MOCK_QUESTIONS[currentLevel] || [];
                
                const keys = Object.keys(questionScores).sort((a, b) => {
                    const idA = parseInt(a.replace('Pregunta ', ''));
                    const idB = parseInt(b.replace('Pregunta ', ''));
                    return idA - idB;
                });

                const labels = keys.map(key => {
                    const id = parseInt(key.replace('Pregunta ', ''));
                    const questionObj = levelQuestions.find(q => q.id === id);
                    let fullText = questionObj ? (typeof questionObj === 'string' ? questionObj : (questionObj.text || "")) : key;
                    if (fullText.length > 30) {
                        return fullText.substring(0, 27) + '...';
                    }
                    return fullText;
                });

                const data = keys.map(q => {
                    const d = questionScores[q];
                    return parseFloat((d.sum / d.count).toFixed(2));
                });

                if (this.activeCharts.preguntas) this.activeCharts.preguntas.destroy();
                this.activeCharts.preguntas = new Chart(ctx, {
                    type: 'line', 
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Promedio de Aceptación',
                            data: data,
                            borderColor: '#3b82f6', 
                            borderWidth: 3,
                            tension: 0.35, 
                            fill: {
                                target: 'origin',
                                above: 'rgba(59, 130, 246, 0.04)' 
                            },
                            pointBackgroundColor: '#3b82f6',
                            pointBorderColor: '#1e40af',
                            pointBorderWidth: 2,
                            pointRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { min: 1, max: 5, ticks: { stepSize: 1 } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            },

            toggleDebugConsole() {
                this.isConsoleExpanded = !this.isConsoleExpanded;
                const body = document.getElementById('debug-console-body');
                const chevron = document.getElementById('debug-chevron');
                if (!body || !chevron) return;
                
                if (this.isConsoleExpanded) {
                    body.style.maxHeight = '240px';
                    chevron.classList.add('rotate-180');

                    body.style.maxHeight = '0px';

            logDebug(msg, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                this.debugLogs.push({ msg, type, timestamp });
                this.renderDebugLogs();
            },

            clearDebugConsole() {
                this.debugLogs = [];
                this.renderDebugLogs();
            },

            renderDebugLogs() {
                const output = document.getElementById('debug-log-output');
                if (!output) return;
                output.innerHTML = '';
                
                if (this.debugLogs.length === 0) {
                    output.innerHTML = `<div class="text-slate-400 text-xs italic text-center py-4">Consola vacía. No hay eventos registrados.</div>`;
                    return;
                }

                this.debugLogs.forEach(log => {
                    let badgeBg = 'bg-slate-100 text-slate-600 border-slate-200';
                    let textClass = 'text-slate-600';
                    let containerBg = 'bg-slate-50/50 border-slate-100';
                    let label = 'INFO';

                    if (log.type === 'error') {
                        badgeBg = 'bg-rose-100 text-rose-700 border-rose-200';
                        textClass = 'text-rose-700 font-semibold';
                        containerBg = 'bg-rose-50/30 border-rose-100/50';
                        label = 'ERROR';
                    } else if (log.type === 'success') {
                        badgeBg = 'bg-emerald-100 text-emerald-700 border-emerald-200';
                        textClass = 'text-emerald-700 font-medium';
                        containerBg = 'bg-emerald-50/30 border-emerald-100/50';
                        label = 'ÉXITO';
                    }

                    output.innerHTML += `
                        <div class="flex items-start gap-2.5 p-2 rounded-xl border ${containerBg} text-xs font-sans">
                            <span class="text-[9px] font-mono text-slate-400 shrink-0 self-center">${log.timestamp}</span>
                            <span class="px-1.5 py-0.5 border ${badgeBg} rounded-md text-[9px] font-extrabold uppercase tracking-wider shrink-0 self-center">${label}</span>
                            <span class="leading-relaxed ${textClass}">${log.msg}</span>
                        </div>
                    `;
                });
                output.scrollTop = output.scrollHeight;
            },

                const header = document.getElementById('main-header');

                const previousScrollTop = container ? container.scrollTop : 0;

                    header.classList.add('hidden');

                    header.classList.remove('hidden');

                switch(this.currentView) {

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast-enter p-4 rounded-xl shadow-lg border text-xs sm:text-sm font-semibold flex items-center gap-3 pointer-events-auto bg-white transition-all max-w-sm ml-auto`;

            let icon = '<i class="fas fa-check-circle text-success text-base sm:text-lg"></i>';
            if (type === 'error') {
                icon = '<i class="fas fa-exclamation-circle text-accent text-base sm:text-lg"></i>';
                toast.classList.add('border-red-100');
            } else if (type === 'info') {
                icon = '<i class="fas fa-info-circle text-secondary text-base sm:text-lg"></i>';
                toast.classList.add('border-blue-100');
            } else {
                toast.classList.add('border-emerald-100');
            }

            toast.innerHTML = `
                <div class="shrink-0">${icon}</div>
                <div class="text-slate-700 flex-grow leading-relaxed">${message}</div>
                <button class="text-slate-400 hover:text-slate-600 shrink-0 ml-1" onclick="this.parentElement.remove()"><i class="fas fa-times text-xs"></i></button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                if (toast) {
                    toast.classList.remove('toast-enter');
                    toast.classList.add('toast-exit');
                    toast.addEventListener('animationend', () => toast.remove());
                }
            }, 4500);
        }
