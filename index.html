<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Evaluación - CGB</title>
    <!-- Tailwind CSS para diseño rápido y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos de FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Fuente Inter de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js para Dashboards interactivos y profesionales -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#1e40af', 
                        secondary: '#3b82f6',
                        accent: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .toast-enter { animation: toastSlideIn 0.3s forwards; }
        .toast-exit { animation: toastSlideOut 0.3s forwards; }
        @keyframes toastSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes toastSlideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            100% { opacity: 1; transform: scale(1) rotate(-12deg); }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        
        /* Animaciones para la cortinilla */
        @keyframes scaleUp {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }
            50% { filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.8)); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <!-- Encabezado de la Aplicación -->
    <header id="main-header" class="bg-primary text-white shadow-md z-10 hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-graduation-cap text-2xl text-accent"></i>
                <div class="flex items-baseline">
                    <h1 class="font-bold text-xl tracking-tight">CGB Evalúa</h1>
                    <span class="text-[10px] bg-blue-800 text-blue-200 px-1.5 py-0.5 rounded ml-2 font-mono uppercase tracking-wide">v1.9</span>
                </div>
            </div>
            <div id="user-info" class="hidden flex items-center gap-4">
                <span id="header-role" class="text-sm bg-blue-800 px-3 py-1 rounded-full font-medium"></span>
                <span id="header-email" class="text-sm hidden sm:block"></span>
                <button onclick="app.logout()" class="text-sm hover:text-red-300 transition-colors flex items-center gap-1">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </div>
    </header>

    <!-- Contenedor Principal Dinámico -->
    <main id="app-container" class="flex-grow overflow-y-auto relative">
    </main>

    <!-- Pie de Página de la Aplicación -->
    <footer id="main-footer" class="bg-white border-t border-slate-200 py-3 text-center text-xs text-slate-500 hidden z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-2">
            <span>Colegio Gran Bretaña © 2026</span>
            <div class="text-slate-400">
                Desarrollado por: <strong class="text-slate-700 font-semibold">L.I.E. Arturo Palacios González</strong> | <span class="text-primary font-medium">Innovación Tecnológica</span>
            </div>
        </div>
    </footer>

    <!-- Contenedor de Notificaciones (Toasts) -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <script>
        // =====================================================================

        // =====================================================================

        // --- DATOS GLOBALES ---
        let appTeachers = [];

        // --- PLAN B (MOCK DATA / DATOS DE RESPALDO) ---
        const FALLBACK_TEACHERS = [

            { id: 5, name: "Elena Rojas", gender: "F", levels: ['bachillerato'] },

        ];

        const SUBJECT_OPTIONS_BAJA = [
            { label: 'Español', emoji: '📖' },

            { label: 'Cultura Física', emoji: '⚽' },
            { label: 'Música', emoji: '🎵' },

        ];

        const SUBJECT_OPTIONS_ALTA = [

            { label: 'Inglés', emoji: '🗣️' },
            { label: 'Cultura Física', emoji: '⚽' },
            { label: 'Música', emoji: '🎵' },
            { label: 'Escultura', emoji: '🗿' },
            { label: 'Baile', emoji: '🩰' },
            { label: 'Teatro', emoji: '🎭' }
        ];

        // Preguntas configuradas para cada perfil
        const MOCK_QUESTIONS = {

                { id: 1, type: 'faces', text: "1. Sí le entiendo a su clase y cuando me cuesta trabajo, me explica." },

                { id: 9, type: 'faces', text: "9. Me invita a vivir los valores de honestidad, respeto, amistad, justicia y compromiso." },
                { id: 10, type: 'subjects', text: "10. La clase que más me gusta es:", isGeneral: true, options: SUBJECT_OPTIONS_BAJA },
                { id: 11, type: 'subjects', text: "11. La clase que no me gusta mucho es:", isGeneral: true, options: SUBJECT_OPTIONS_BAJA },
                { id: 12, type: 'textarea', text: "12. Escribe algo que le quieras decir a uno de tus maestros o maestras.", isGeneral: true }
            ],
            primaria_alta: [
                { id: 1, type: 'faces', text: "1. Sí le entiendo a su clase y cuando me cuesta trabajo, me explica." },
                { id: 2, type: 'faces', text: "2. La tarea que me deja se me hace fácil porque ya lo vi en clase." },
                { id: 3, type: 'faces', text: "3. Sí me alcanza el tiempo para hacer la tarea." },
                { id: 4, type: 'faces', text: "4. Califica los trabajos y tareas." },
                { id: 5, type: 'faces', text: "5. Siempre está conmigo en el salón y me acompaña a mis actividades." },
                { id: 6, type: 'faces', text: "6. Hacemos muchas cosas diferentes en la clase y me gustan." },
                { id: 7, type: 'faces', text: "7. Me trata siempre con respeto." },
                { id: 8, type: 'faces', text: "8. Me dice lo que tengo que estudiar más para mejorar y cómo voy en clase." },
                { id: 9, type: 'faces', text: "9. Me invita a vivir los valores de honestidad, respeto, amistad, justicia y compromiso." },
                { id: 10, type: 'subjects', text: "10. La clase que más me gusta es:", isGeneral: true, options: SUBJECT_OPTIONS_ALTA },
                { id: 11, type: 'subjects', text: "11. La clase que no me gusta mucho es:", isGeneral: true, options: SUBJECT_OPTIONS_ALTA },
                { id: 12, type: 'textarea', text: "12. Escribe algo que le quieras decir a uno de tus maestros o maestras.", isGeneral: true }
            ],
            secundaria: [
                { id: 1, type: 'numbers', text: "1. El docente domina los temas de la asignatura." },
                { id: 2, type: 'numbers', text: "2. Fomenta la participación activa y el pensamiento crítico." },
                { id: 3, type: 'numbers', text: "3. Utiliza herramientas y recursos didácticos variados." },
                { id: 4, type: 'numbers', text: "4. La evaluación es justa y acorde a lo enseñado." },
                { id: 5, type: 'numbers', text: "5. El trato es respetuoso y fomenta un buen ambiente." },
                { id: 6, type: 'textarea', text: "6. Comentarios adicionales o sugerencias de mejora:" }
            ],
            bachillerato: [
                { id: 1, type: 'numbers', text: "1. Demuestra un alto nivel de dominio en su disciplina." },
                { id: 2, type: 'numbers', text: "2. Promueve el análisis, la investigación y el debate en clase." },
                { id: 3, type: 'numbers', text: "3. Proporciona retroalimentación útil y oportuna en los trabajos." },
                { id: 4, text: "4. Las metodologías empleadas son adecuadas para el nivel educativo." },
                { id: 5, type: 'numbers', text: "5. Muestra disposición para asesorías y resolución de dudas." },
                { id: 6, type: 'textarea', text: "6. Comentarios o sugerencias para el docente:" }
            ],
            personal_cgb: [
                { id: 1, type: 'numbers', text: "1. ¿Muestra liderazgo y organización en sus actividades cotidianas?" },
                { id: 2, type: 'numbers', text: "2. ¿La comunicación con el equipo de trabajo es efectiva y constante?" },
                { id: 3, type: 'numbers', text: "3. ¿Cumple con los objetivos y tiempos establecidos en el plan de trabajo?" },
                { id: 4, type: 'numbers', text: "4. ¿Fomenta un clima laboral positivo, colaborativo y de apoyo mutuo?" },
                { id: 5, type: 'textarea', text: "5. Comentarios adicionales sobre el desempeño de este integrante del personal:" }
            ]
        };

        // Arreglo para almacenar temporalmente los envíos locales
        let MOCK_SUBMISSIONS = [];

        // --- ESTADO DE LA APLICACIÓN ---
        const app = {
            currentUser: null,
            currentView: 'splash', // Inicia en la cortinilla de presentación
            lastView: null,       // Rastrea la última pantalla para controlar el scroll de forma inteligente
            selectedTeacher: null,
            hasAnsweredGeneralQuestions: false, 
            hiddenTeachers: [],
            evaluatedTeachers: [],
            showCompletionCelebration: false,
            hasSeenCelebration: false,
            // Filtros de Administrador
            adminFilterLevel: 'todos',
            adminFilterTeacher: 'todos', 
            adminFilterGrade: 'todos',
            adminFilterGroup: 'todos',
            formResponses: {}, // Almacena respuestas temporales del formulario activo
            activeCharts: {}, // Guardado de instancias de Chart.js

            async init() {
                this.generateRealisticMockData(); // Autogenerar base de datos simulada y robusta para el administrador
                this.render(); // Mostramos la cortinilla de inmediato
                await this.fetchInitialData(); // Cargamos datos de Sheets en segundo plano
            },

            // Generador de datos simulados realistas para tener la radiografía lista en Demo
            generateRealisticMockData() {
                const levels = ['primaria_baja', 'primaria_alta', 'secundaria', 'bachillerato', 'personal_cgb'];
                const groups = ['A', 'B', 'C'];
                const comments = [
                    "Excelente clase, me divierto mucho.",
                    "Explica muy bien cuando tengo dudas.",
                    "Deja tareas que a veces son un poco largas.",
                    "Muy paciente y dinámico en las dinámicas.",
                    "Me gustaría que use más presentaciones o juegos.",
                    "Nos enseña con mucho respeto siempre.",
                    "Las evaluaciones son retadoras pero justas.",
                    "Fomenta mucho el trabajo en equipo y el orden en el salón."
                ];

                // Crear 60 registros distribuidos
                for (let i = 0; i < 60; i++) {
                    const studentRole = levels[Math.floor(Math.random() * levels.length)];
                    const teachersInLevel = FALLBACK_TEACHERS.filter(t => t.levels.includes(studentRole));
                    if (teachersInLevel.length === 0) continue;

                    const teacher = teachersInLevel[Math.floor(Math.random() * teachersInLevel.length)];
                    const group = groups[Math.floor(Math.random() * groups.length)];
                    
                    let grade = "1º";
                    if (studentRole === 'primaria_baja') grade = ['1º', '2º', '3º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'primaria_alta') grade = ['4º', '5º', '6º'][Math.floor(Math.random() * 3)];
                    else if (studentRole === 'secundaria' || studentRole === 'bachillerato') grade = ['1º', '2º', '3º'][Math.floor(Math.random() * 3)];

                    // Respuestas según formato de preguntas
                    const responses = {};
                    const questions = MOCK_QUESTIONS[studentRole];
                    questions.forEach(q => {
                        if (q.type === 'faces') {
                            responses[q.id] = ['si', 'a_veces', 'no'][Math.floor(Math.random() * 3)];
                        } else if (q.type === 'numbers') {
                            responses[q.id] = Math.floor(Math.random() * 3) + 3; // Calificaciones entre 3 y 5
                        } else if (q.type === 'subjects') {
                            const opts = q.options;
                            responses[q.id] = opts[Math.floor(Math.random() * opts.length)].label;
                        } else if (q.type === 'textarea') {
                            responses[q.id] = comments[Math.floor(Math.random() * comments.length)];
                        }
                    });

                    MOCK_SUBMISSIONS.push({
                        studentEmail: `alumno.${i+1}@cgb.edu.mx`,
                        studentRole: studentRole,
                        studentGrade: grade,
                        studentGroup: group,
                        teacherId: teacher.id,
                        teacherName: teacher.name,
                        responses: responses,
                        timestamp: new Date(Date.now() - Math.random() * 10 * 24 * 60 * 60 * 1000).toISOString()
                    });
                }
            },

            async fetchInitialData() {
                if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_ESTA_CADENA')) {
                    console.warn("Sin URL válida de Apps Script. Usando Fallback local de respaldo.");
                    appTeachers = FALLBACK_TEACHERS;
                    appEmails = []; 
                    return;
                }
                try {
                    const response = await fetch(GOOGLE_SHEETS_API_URL + "?action=getInitialData");
                    const data = await response.json();
                    
                    // Si el Google Script arroja un error controlado por no encontrar la pestaña o de código
                    if (data && data.status === "ERROR") {
                        throw new Error(data.message);
                    }

                    // Validación de la lista de maestros devuelta
                    if (data && Array.isArray(data.teachers) && data.teachers.length > 0) {
                        appTeachers = data.teachers;
                        appEmails = data.emails || [];
                        console.log("¡Éxito! Maestros cargados dinámicamente desde Sheets:", appTeachers.length);
                    } else if (data && Array.isArray(data.teachers)) {
                        console.warn("La hoja de cálculo 'Maestros' no tiene registros. Usando datos de respaldo locales.");
                        appTeachers = FALLBACK_TEACHERS;
                        appEmails = [];
                    } else {
                        throw new Error("Estructura de respuesta incorrecta.");
                    }
                } catch (error) {
                    console.error("Error al cargar la base de datos de Google Sheets. Usando Fallback local:", error);
                    appTeachers = FALLBACK_TEACHERS;
                    appEmails = [];
                    showToast("Cargado de respaldo (Verifica la URL de tu Apps Script)", "info");
                }
            },

            navigate(view) {
                this.currentView = view;
                this.render();
            },

            handleRoleChange() {
                const role = document.getElementById('login-role').value;
                const emailContainer = document.getElementById('email-container');
                const gradeGroupContainer = document.getElementById('grade-group-container');
                const gradeSelect = document.getElementById('login-grade');

                // Validar visibilidad de campos
                if (['secundaria', 'bachillerato', 'personal_cgb', 'admin'].includes(role)) {
                    emailContainer.classList.remove('hidden');
                } else {
                    emailContainer.classList.add('hidden');
                }

                if (role && role !== 'admin' && role !== 'personal_cgb') {
                    gradeGroupContainer.classList.remove('hidden');
                    // Rellenar dinámicamente grados escolares
                    gradeSelect.innerHTML = '';
                    if (role === 'primaria_baja') {
                        gradeSelect.innerHTML = `<option value="1º">1º Primaria</option><option value="2º">2º Primaria</option><option value="3º">3º Primaria</option>`;
                    } else if (role === 'primaria_alta') {
                        gradeSelect.innerHTML = `<option value="4º">4º Primaria</option><option value="5º">5º Primaria</option><option value="6º">6º Primaria</option>`;
                    } else if (role === 'secundaria') {
                        gradeSelect.innerHTML = `<option value="1º">1º Secundaria</option><option value="2º">2º Secundaria</option><option value="3º">3º Secundaria</option>`;
                    } else if (role === 'bachillerato') {
                        gradeSelect.innerHTML = `<option value="1º">1º Bachillerato</option><option value="2º">2º Bachillerato</option><option value="3º">3º Bachillerato</option>`;
                    }
                } else {
                    gradeGroupContainer.classList.add('hidden');
                }
            },

            processLogin() {
                const role = document.getElementById('login-role').value;
                const email = document.getElementById('login-email')?.value.trim() || "";
                const grade = document.getElementById('login-grade')?.value || "N/A";
                const group = document.getElementById('login-group')?.value || "N/A";

                if (!role) {
                    showToast("Por favor selecciona tu nivel o perfil", "error");
                    return;
                }

                if (['secundaria', 'bachillerato', 'personal_cgb', 'admin'].includes(role) && !email) {
                    showToast("El correo electrónico es requerido para este perfil", "error");
                    return;
                }

                this.currentUser = { role, email, grade, group };
                showToast("¡Sesión iniciada correctamente!", "success");

                if (role === 'admin') {
                    this.navigate('admin');
                } else if (['primaria_baja', 'primaria_alta'].includes(role)) {
                    this.navigate('welcome'); 
                } else {
                    this.navigate('portal'); 
                }
            },

            logout() {
                this.currentUser = null;
                this.selectedTeacher = null;
                this.hasAnsweredGeneralQuestions = false; 
                this.hiddenTeachers = []; 
                this.evaluatedTeachers = []; 
                this.showCompletionCelebration = false;
                this.hasSeenCelebration = false;
                this.formResponses = {};
                this.lastView = null;
                
                // Destruir instancias de gráficos para evitar fugas de memoria
                Object.values(this.activeCharts).forEach(chart => {
                    if (chart) chart.destroy();
                });
                this.activeCharts = {};

                this.navigate('splash');
                showToast('Sesión cerrada correctamente', 'info');
            },

            toggleTeacher(id) {
                if (this.hiddenTeachers.includes(id)) {
                    this.hiddenTeachers = this.hiddenTeachers.filter(tId => tId !== id);
                } else {
                    this.hiddenTeachers.push(id);
                }
                this.render();
            },

            startEvaluation(teacherId) {
                this.selectedTeacher = teacherId;
                this.formResponses = {}; 
                this.navigate('form');
            },

            selectFaceOption(questionId, val) {
                this.formResponses[questionId] = val;
                const faceButtons = document.querySelectorAll(`[data-question-face="${questionId}"]`);
                faceButtons.forEach(btn => {
                    const btnVal = btn.getAttribute('data-value');
                    if (btnVal === val) {
                        btn.classList.add('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.remove('border-gray-200', 'bg-white');
                    } else {
                        btn.classList.remove('border-primary', 'bg-blue-50', 'scale-110');
                        btn.classList.add('border-gray-200', 'bg-white');
                    }
                });
            },

            selectNumberOption(questionId, val) {
                this.formResponses[questionId] = parseInt(val);
                const numButtons = document.querySelectorAll(`[data-question-num="${questionId}"]`);
                numButtons.forEach(btn => {
                    const btnVal = parseInt(btn.getAttribute('data-value'));
                    if (btnVal === parseInt(val)) {
                        btn.classList.add('bg-primary', 'text-white', 'scale-105');
                        btn.classList.remove('bg-gray-100', 'text-gray-700', 'hover:bg-gray-200');
                    } else {
                        btn.classList.remove('bg-primary', 'text-white', 'scale-105');
                        btn.classList.add('bg-gray-100', 'text-gray-700', 'hover:bg-gray-200');
                    }
                });
            },

            selectSubjectOption(questionId, val) {
                this.formResponses[questionId] = val;
                const subButtons = document.querySelectorAll(`[data-question-sub="${questionId}"]`);
                subButtons.forEach(btn => {
                    const btnVal = btn.getAttribute('data-value');
                    if (btnVal === val) {
                        btn.classList.add('border-primary', 'bg-blue-50', 'scale-105');
                        btn.classList.remove('border-gray-200', 'bg-white');
                    } else {
                        btn.classList.remove('border-primary', 'bg-blue-50', 'scale-105');
                        btn.classList.add('border-gray-200', 'bg-white');
                    }
                });
            },

            async submitEvaluation() {
                const teacher = appTeachers.find(t => t.id === this.selectedTeacher);
                const questions = MOCK_QUESTIONS[this.currentUser.role];

                const activeQuestions = questions.filter(q => {
                    if (q.isGeneral && this.hasAnsweredGeneralQuestions) return false;
                    return true;
                });

                for (let q of activeQuestions) {
                    if (q.type === 'textarea') {
                        const val = document.getElementById(`text-q-${q.id}`).value.trim();
                        this.formResponses[q.id] = val;
                        continue;
                    }
                    if (this.formResponses[q.id] === undefined) {
                        showToast(`Por favor responde la pregunta: "${q.text.substring(0, 30)}..."`, "error");
                        return;
                    }
                }

                // Cálculo automático del promedio pedagógico en tiempo real
                let scoreSum = 0;
                let scoreCount = 0;
                Object.entries(this.formResponses).forEach(([qId, value]) => {
                    const questionObj = questions.find(q => q.id == qId);
                    if (!questionObj) return;
                    const numVal = this.getNumericalValue(questionObj.type, value);
                    if (numVal !== null) {
                        scoreSum += numVal;
                        scoreCount++;
                    }
                });
                const promedioCalculado = scoreCount > 0 ? (scoreSum / scoreCount).toFixed(2) : "0.00";

                // PAYLOAD OPTIMIZADO PARA TU GOOGLE SHEETS
                const payload = {
                    Fecha: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' }),
                    Nivel: this.currentUser.role,
                    "Correo Evaluador": this.currentUser.email || "Anónimo",
                    "ID Maestro": teacher.id,
                    Maestro: teacher.name,
                    Promedio: promedioCalculado,
                    "Respuestas Completas": JSON.stringify(this.formResponses),
                    
                    studentGrade: this.currentUser.grade || "N/A",
                    studentGroup: this.currentUser.group || "N/A",
                    studentEmail: this.currentUser.email || "Anónimo",
                    studentRole: this.currentUser.role,
                    teacherId: teacher.id,
                    teacherName: teacher.name,
                    responses: this.formResponses,
                    timestamp: new Date().toISOString()
                };

                MOCK_SUBMISSIONS.push(payload);

                if (GOOGLE_SHEETS_API_URL && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_ESTA_CADENA')) {
                    showToast("Sincronizando evaluación con la nube...", "info");
                    try {
                        await fetch(GOOGLE_SHEETS_API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        showToast("¡Evaluación enviada con éxito!", "success");
                    } catch (err) {
                        console.error("Error al sincronizar con Sheets:", err);
                        showToast("Guardado localmente de forma segura.", "info");
                    }
                } else {
                    showToast("¡Evaluación completada con éxito (Modo Local)!", "success");
                }

                if (!this.hasAnsweredGeneralQuestions) {
                    this.hasAnsweredGeneralQuestions = true;
                }

                this.evaluatedTeachers.push(teacher.id);

                const activeTeachers = appTeachers.filter(t => t.levels.includes(this.currentUser.role) && !this.hiddenTeachers.includes(t.id));
                const allDone = activeTeachers.every(t => this.evaluatedTeachers.includes(t.id));

                if (allDone && activeTeachers.length > 0) {
                    this.showCompletionCelebration = true;
                }

                this.navigate('portal');
            },

            closeCelebration() {
                this.showCompletionCelebration = false;
                this.hasSeenCelebration = true;
                this.render();
            },

            // --- SISTEMA DEL DASHBOARD DEL ADMINISTRADOR ---
            adminSubmissions: [],
            
            setAdminFilterLevel(level) {
                this.adminFilterLevel = level;
                this.renderAdminCharts();
            },

            setAdminFilterTeacher(teacherId) {
                this.adminFilterTeacher = teacherId;
                this.renderAdminCharts();
            },

            setAdminFilterGrade(grade) {
                this.adminFilterGrade = grade;
                this.renderAdminCharts();
            },

            setAdminFilterGroup(group) {
                this.adminFilterGroup = group;
                this.renderAdminCharts();
            },

            async fetchAdminData() {
                if (GOOGLE_SHEETS_API_URL && !GOOGLE_SHEETS_API_URL.startsWith('REEMPLAZA_ESTA_CADENA')) {
                    try {
                        const response = await fetch(GOOGLE_SHEETS_API_URL + "?action=getSubmissions");
                        const data = await response.json();
                        if (data && data.submissions) {
                            this.adminSubmissions = data.submissions;
                        } else {
                            this.adminSubmissions = MOCK_SUBMISSIONS;
                        }
                    } catch (e) {
                        this.adminSubmissions = MOCK_SUBMISSIONS;
                    }
                } else {
                    this.adminSubmissions = MOCK_SUBMISSIONS;
                }
                this.renderAdminCharts();
            },

            // Motor de conversión numérica para realizar promedios
            getNumericalValue(qType, value) {
                if (qType === 'faces') {
                    if (value === 'si') return 5;
                    if (value === 'a_veces') return 3;
                    if (value === 'no') return 1;
                }
                if (qType === 'numbers') {
                    return parseInt(value) || 0;
                }
                return null;
            },

            renderAdminCharts() {
                const resultsContainer = document.getElementById('admin-results');
                if (!resultsContainer) return;

                // 1. Filtrar los datos en base a los 4 niveles de segmentación
                let filtered = this.adminSubmissions;
                if (this.adminFilterLevel !== 'todos') {
                    filtered = filtered.filter(s => s.studentRole === this.adminFilterLevel);
                }
                if (this.adminFilterTeacher !== 'todos') {
                    filtered = filtered.filter(s => s.teacherId == this.adminFilterTeacher);
                }
                if (this.adminFilterGrade !== 'todos') {
                    filtered = filtered.filter(s => s.studentGrade === this.adminFilterGrade);
                }
                if (this.adminFilterGroup !== 'todos') {
                    filtered = filtered.filter(s => s.studentGroup === this.adminFilterGroup);
                }

                if (filtered.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="p-12 text-center bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                            <i class="fas fa-chart-line text-5xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium text-lg">No hay suficientes registros para el cruce de filtros seleccionado.</p>
                            <p class="text-xs text-gray-400 mt-1">Prueba seleccionando "Todos" en algunos de los filtros.</p>
                        </div>
                    `;
                    return;
                }

                // 2. Procesamiento de promedios pedagógicos generales
                let totalScore = 0;
                let validAnswersCount = 0;
                let teacherScores = {}; // Promedios por maestro
                let questionScores = {}; // Promedios por pregunta
                let teacherVotesCount = {};

                filtered.forEach(sub => {
                    const studentRole = sub.studentRole;
                    const questions = MOCK_QUESTIONS[studentRole] || [];
                    let subSum = 0;
                    let subCount = 0;

                    // Si las respuestas vienen como cadena JSON desde el Google Sheets, las parseamos
                    let rResponses = sub.responses;
                    if (typeof rResponses === 'string') {
                        try {
                            rResponses = JSON.parse(rResponses);
                        } catch (e) {
                            rResponses = {};
                        }
                    }

                    Object.entries(rResponses || {}).forEach(([qId, value]) => {
                        const questionObj = questions.find(q => q.id == qId);
                        if (!questionObj) return;

                        const numVal = this.getNumericalValue(questionObj.type, value);
                        if (numVal !== null) {
                            totalScore += numVal;
                            validAnswersCount++;
                            subSum += numVal;
                            subCount++;

                            // Acumular por pregunta
                            const qKey = `Pregunta ${qId}`;
                            if (!questionScores[qKey]) {
                                questionScores[qKey] = { sum: 0, count: 0, text: questionObj.text };
                            }
                            questionScores[qKey].sum += numVal;
                            questionScores[qKey].count++;
                        }
                    });

                    if (subCount > 0) {
                        const subAverage = subSum / subCount;
                        if (!teacherScores[sub.teacherName]) {
                            teacherScores[sub.teacherName] = { sum: 0, count: 0 };
                        }
                        teacherScores[sub.teacherName].sum += subAverage;
                        teacherScores[sub.teacherName].count++;
                    }

                    // Tally de evaluaciones enviadas
                    teacherVotesCount[sub.teacherName] = (teacherVotesCount[sub.teacherName] || 0) + 1;
                });

                // Promedio Global
                const globalAverage = validAnswersCount > 0 ? (totalScore / validAnswersCount).toFixed(2) : "0.00";

                // Encontrar docente mejor valorado y con más participación
                let topTeacher = "N/A";
                let topTeacherAvg = 0;
                Object.entries(teacherScores).forEach(([name, data]) => {
                    const avg = data.sum / data.count;
                    if (avg > topTeacherAvg) {
                        topTeacherAvg = avg;
                        topTeacher = name;
                    }
                });

                let mostEvaluatedTeacher = "N/A";
                let maxEvaluations = 0;
                Object.entries(teacherVotesCount).forEach(([name, count]) => {
                    if (count > maxEvaluations) {
                        maxEvaluations = count;
                        mostEvaluatedTeacher = name;
                    }
                });

                // 3. Renderizar la estructura del Dashboard en el HTML
                resultsContainer.innerHTML = `
                    <!-- Fila de Tarjetas KPI -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-5 rounded-2xl shadow-md">
                            <div class="flex justify-between items-center opacity-80 mb-2 text-xs font-bold uppercase tracking-wider">Promedio Global</div>
                            <div class="flex items-baseline gap-2">
                                <span class="text-4xl font-extrabold">${globalAverage}</span>
                                <span class="text-sm opacity-90">/ 5.0</span>
                            </div>
                            <p class="text-[10px] opacity-75 mt-2">En base a ${validAnswersCount} respuestas métricas</p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                            <div class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Evaluaciones Hechas</div>
                            <span class="text-4xl font-extrabold text-slate-900">${filtered.length}</span>
                            <p class="text-[10px] text-slate-400 mt-2">Muestreo activo en tiempo real</p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                            <div class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Máximo Desempeño</div>
                            <span class="text-lg font-bold text-emerald-600 block truncate">${topTeacher}</span>
                            <p class="text-[10px] text-slate-400 mt-2">Promedio pedagógico de ${(topTeacherAvg).toFixed(2)}</p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                            <div class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Mayor Participación</div>
                            <span class="text-lg font-bold text-blue-600 block truncate">${mostEvaluatedTeacher}</span>
                            <p class="text-[10px] text-slate-400 mt-2">Con ${maxEvaluations} encuestas finalizadas</p>
                        </div>
                    </div>

                    <!-- Sección de Gráficos de Radiografía -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <!-- Promedios por Docente -->
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h4 class="font-bold text-slate-800 text-base mb-4">Promedio de Desempeño por Docente</h4>
                            <div class="relative h-64 w-full">
                                <canvas id="chart-docentes"></canvas>
                            </div>
                        </div>

                        <!-- Fortalezas por Pregunta -->
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h4 class="font-bold text-slate-800 text-base mb-4">Análisis por Pregunta (Fortalezas)</h4>
                            <div class="relative h-64 w-full">
                                <canvas id="chart-preguntas"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Retroalimentación Cualitativa (Comentarios Libres) -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
                        <h4 class="font-bold text-slate-800 text-base mb-4 flex items-center gap-2">
                            <i class="fas fa-comment-dots text-primary"></i> Buzón de Sugerencias y Comentarios Libres
                        </h4>
                        <div class="max-h-60 overflow-y-auto space-y-3 pr-2">
                            ${this.renderAdminComments(filtered)}
                        </div>
                    </div>
                `;

                // 4. Inicialización de gráficos con Chart.js
                this.initChartDocentes(teacherScores);
                this.initChartPreguntas(questionScores);
            },

            // Renderizado estético de comentarios libres para el administrador
            renderAdminComments(filtered) {
                let commentsHTML = "";
                let hasComments = false;

                filtered.forEach(sub => {
                    let rResponses = sub.responses;
                    if (typeof rResponses === 'string') {
                        try {
                            rResponses = JSON.parse(rResponses);
                        } catch (e) {
                            rResponses = {};
                        }
                    }

                    Object.entries(rResponses || {}).forEach(([qId, val]) => {
                        // Buscar si es un comentario cualitativo de texto libre
                        if (typeof val === 'string' && val.trim() !== "" && val.length > 5 && !['si', 'no', 'a_veces', 'Español', 'Inglés', 'Cultura Física', 'Música', 'Arte', 'Escultura', 'Baile', 'Teatro'].includes(val)) {
                            hasComments = true;
                            commentsHTML += `
                                <div class="bg-slate-50 p-3.5 rounded-xl border border-slate-100">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-xs font-bold text-primary">${sub.teacherName}</span>
                                        <span class="text-[10px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-mono">${sub.studentGrade || 'N/A'} - Grp ${sub.studentGroup || 'N/A'}</span>
                                    </div>
                                    <p class="text-slate-600 text-xs italic">"${val}"</p>
                                </div>
                            `;
                        }
                    });
                });

                return hasComments ? commentsHTML : `<p class="text-gray-400 text-sm italic text-center py-6">No se encontraron comentarios abiertos en el filtro de búsqueda.</p>`;
            },

            // Renderizar gráfico de rendimiento comparativo entre maestros
            initChartDocentes(teacherScores) {
                const ctx = document.getElementById('chart-docentes')?.getContext('2d');
                if (!ctx) return;

                const labels = Object.keys(teacherScores);
                const data = labels.map(name => {
                    const d = teacherScores[name];
                    return (d.sum / d.count).toFixed(2);
                });

                if (this.activeCharts.docentes) this.activeCharts.docentes.destroy();

                this.activeCharts.docentes = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Calificación Promedio',
                            data: data,
                            backgroundColor: 'rgba(59, 130, 246, 0.75)',
                            borderColor: 'rgba(30, 64, 175, 1)',
                            borderWidth: 1.5,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                min: 1,
                                max: 5,
                                ticks: { stepSize: 1 }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            },

            // Renderizar radiografía por pregunta
            initChartPreguntas(questionScores) {
                const ctx = document.getElementById('chart-preguntas')?.getContext('2d');
                if (!ctx) return;

                const labels = Object.keys(questionScores);
                const data = labels.map(q => {
                    const d = questionScores[q];
                    return (d.sum / d.count).toFixed(2);
                });

                if (this.activeCharts.preguntas) this.activeCharts.preguntas.destroy();

                this.activeCharts.preguntas = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Promedio de Respuesta',
                            data: data,
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            borderColor: 'rgba(245, 158, 11, 1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointBackgroundColor: 'rgba(30, 64, 175, 1)'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                min: 1,
                                max: 5,
                                ticks: { stepSize: 1 }
                            }
                        }
                    }
                });
            },

            render() {
                const container = document.getElementById('app-container');
                const header = document.getElementById('main-header');
                const footer = document.getElementById('main-footer');
                const userInfo = document.getElementById('user-info');
                
                // GUARDAR POSICIÓN DE SCROLL PREVIA antes de limpiar y regenerar el HTML
                const previousScrollTop = container ? container.scrollTop : 0;
                const previousWindowY = window.scrollY;
                
                // Comprobamos si la pantalla ha cambiado realmente
                const viewChanged = this.currentView !== this.lastView;
                this.lastView = this.currentView;

                container.innerHTML = '';

                // Ocultar cabecera y footer en la vista splash
                if (this.currentView === 'splash') {
                    header.classList.add('hidden');
                    if (footer) footer.classList.add('hidden');
                } else {
                    header.classList.remove('hidden');
                    if (footer) footer.classList.remove('hidden');
                }

                switch(this.currentView) {
                    case 'splash': container.innerHTML = this.views.splash(); break;
                    case 'login': container.innerHTML = this.views.login(); break;
                    case 'welcome': container.innerHTML = this.views.welcome(); break;
                    case 'portal': container.innerHTML = this.views.portal(); break;
                    case 'form': container.innerHTML = this.views.form(); break;
                    case 'admin': container.innerHTML = this.views.admin(); this.fetchAdminData(); break;
                }

                // GESTIÓN INTELIGENTE DE SCROLL:
                if (viewChanged) {
                    if (container) {
                        container.scrollTop = 0;
                    }
                    window.scrollTo(0, 0);
                } else {
                    if (container) {
                        container.scrollTop = previousScrollTop;
                    }
                    window.scrollTo(0, previousWindowY);
                }

                if (this.currentUser && this.currentView !== 'splash') {
                    userInfo.classList.remove('hidden');
                    const roleNames = {
                        'primaria_baja': 'Primaria Baja', 'primaria_alta': 'Primaria Alta',
                        'secundaria': 'Secundaria', 'bachillerato': 'Bachillerato',
                        'personal_cgb': 'Personal CGB', 'admin': 'Administrador'
                    };
                    document.getElementById('header-role').innerText = roleNames[this.currentUser.role] || this.currentUser.role;
                    document.getElementById('header-email').innerText = this.currentUser.email || '';
                } else {
                    userInfo.classList.add('hidden');
                }
            },

            views: {
                splash: () => `
                    <div class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-br from-[#0b132b] via-[#1e3a8a] to-[#0f172a] overflow-hidden">
                        <!-- Luces de fondo dinámicas -->
                        <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-30 pointer-events-none">
                            <div class="absolute -top-24 -left-24 w-[30rem] h-[30rem] bg-blue-500 rounded-full mix-blend-screen filter blur-[100px] animate-pulse"></div>
                            <div class="absolute top-1/2 -right-20 w-[25rem] h-[25rem] bg-orange-600 rounded-full mix-blend-screen filter blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
                        </div>

                        <div class="relative z-10 flex flex-col items-center px-4 w-full" style="animation: scaleUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
                            <!-- Escudo -->
                            <div class="w-64 sm:w-80 md:w-96 mb-8" style="animation: pulseGlow 3s infinite alternate;">
                                <img src="./guardianes.png" alt="Escudo Guardianes CGB" class="w-full h-auto object-contain drop-shadow-2xl" onerror="this.src='https://placehold.co/400x400/1e3a8a/ffffff?text=CGB+Guardianes'">
                            </div>
                            
                            <!-- Textos Institucionales -->
                            <h1 class="text-3xl sm:text-5xl font-extrabold text-white mb-2 tracking-widest text-center drop-shadow-lg">
                                PORTAL DE EVALUACIÓN
                            </h1>
                            <p class="text-blue-200 text-lg sm:text-xl mb-4 font-light tracking-[0.2em] text-center uppercase">
                                Colegio Gran Bretaña
                            </p>

                            <!-- Crédito de Autoría en la Cortinilla -->
                            <div class="text-slate-400 text-xs sm:text-sm font-medium tracking-wide text-center mb-10">
                                Desarrollado por: <span class="text-white font-semibold">L.I.E. Arturo Palacios González</span>
                                <span class="block text-[10px] text-blue-300 font-mono mt-0.5 uppercase tracking-wider">Innovación Tecnológica</span>
                            </div>
                            
                            <!-- Botón de Ingreso -->
                            <button onclick="app.navigate('login')" class="group relative px-10 py-4 bg-transparent overflow-hidden rounded-full border border-white/50 text-white font-bold text-lg tracking-widest uppercase hover:border-white hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-all duration-300">
                                <div class="absolute inset-0 w-0 bg-white transition-all duration-[400ms] ease-out group-hover:w-full"></div>
                                <span class="relative group-hover:text-primary transition-colors duration-300 flex items-center gap-3">
                                    Ingresar <i class="fas fa-chevron-right transform group-hover:translate-x-2 transition-transform"></i>
                                </span>
                            </button>
                        </div>
                    </div>
                `,

                login: () => `
                    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden fade-in mt-12 md:mt-20 p-1">
                        <div class="bg-primary p-6 text-center text-white rounded-t-2xl">
                            <i class="fas fa-user-circle text-5xl mb-3"></i>
                            <h2 class="text-2xl font-bold">Selección de Perfil</h2>
                            <p class="text-blue-200 text-sm mt-1">Elige tus datos para comenzar</p>
                        </div>
                        <div class="p-6">
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nivel Educativo o Rol</label>
                                <select id="login-role" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-primary focus:ring-primary p-2.5 border outline-none bg-white font-medium" onchange="app.handleRoleChange()">
                                    <option value="" disabled selected>Selecciona tu perfil...</option>
                                    <option value="primaria_baja">Primaria Baja (1º a 3º)</option>
                                    <option value="primaria_alta">Primaria Alta (4º a 6º)</option>

                                    <option value="bachillerato">Bachillerato</option>
                                    <option value="personal_cgb">Personal CGB (Autoevaluación/Pares)</option>
                                    <option value="admin">Administrador (Resultados)</option>
                                </select>
                            </div>

                            <!-- Campos interactivos de Grado y Grupo para los alumnos -->
                            <div id="grade-group-container" class="grid grid-cols-2 gap-4 mb-4 hidden">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Grado</label>
                                    <select id="login-grade" class="w-full border-gray-300 rounded-lg p-2.5 border outline-none bg-white font-medium">
                                        <!-- Rellenado dinámicamente mediante JS -->
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Grupo</label>
                                    <select id="login-group" class="w-full border-gray-300 rounded-lg p-2.5 border outline-none bg-white font-medium">

                                        <option value="B">Grupo B</option>
                                        <option value="C">Grupo C</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div id="email-container" class="mb-6 hidden">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Correo Institucional</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-envelope text-gray-400"></i>

                                    <input type="email" id="login-email" placeholder="tu.nombre@cgb.edu.mx" class="w-full pl-10 border-gray-300 rounded-lg shadow-sm focus:border-primary focus:ring-primary p-2.5 border outline-none">
                                </div>
